<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF裁剪/分割 - Web工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .3s,background .3s;background:#FAFAFA}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:#E3F2FD}
.drop-zone .icon{font-size:48px;margin-bottom:12px}
.drop-zone p{color:var(--text-secondary);font-size:14px;margin:4px 0}
.info-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px}
.info-item{background:var(--bg);padding:10px 16px;border-radius:8px;font-size:14px}
.info-item strong{color:var(--primary-dark)}
.preview-box{position:relative;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:200px;margin-bottom:16px;overflow:hidden}
.preview-box canvas{max-width:100%;max-height:400px}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.controls label{font-size:14px;font-weight:500;white-space:nowrap}
.frame-slider{flex:1;min-width:150px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;height:40px;transition:background .2s,transform .1s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#388E3C}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.resize-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.resize-grid{grid-template-columns:1fr}}
.frames-strip{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:thin}
.frame-thumb{flex-shrink:0;width:72px;height:72px;border:2px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .2s;position:relative}
.frame-thumb.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(30,136,229,.3)}
.frame-thumb canvas{width:100%;height:100%;object-fit:contain}
.frame-thumb .fnum{position:absolute;bottom:1px;right:2px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;padding:0 4px;border-radius:3px}
.breadcrumb{margin-bottom:20px;font-size:14px;color:var(--text-secondary)}
.breadcrumb a{color:var(--primary);text-decoration:none}
.tool-header{margin-bottom:24px}
.tool-header h1{font-size:24px;font-weight:700;color:var(--primary-dark);margin-bottom:6px}
.tool-header p{color:var(--text-secondary);font-size:15px}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-container"><a href="../../index.html" class="navbar-brand">🛠️ Web工具箱</a></div></nav>
<div class="main-wrapper">
<div class="container">
<div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>GIF裁剪/分割</span></div>
<div class="tool-header"><h1>🎬 GIF裁剪/分割</h1><p>上传GIF文件，浏览帧、提取单帧为PNG、调整尺寸</p></div>
<div class="card">
<div class="drop-zone" id="dropZone">
<div class="icon">🎞️</div>
<p><strong>点击上传</strong> 或拖拽GIF文件到此处</p>
<p style="color:#999;font-size:12px">支持 .gif 文件</p>
<input type="file" id="fileInput" accept="image/gif" style="display:none">
</div>
</div>
<div id="mainSection" style="display:none">
<div class="card">
<div class="card-title">📊 GIF信息</div>
<div class="info-row" id="infoRow">
<div class="info-item">帧数: <strong id="infoFrames">-</strong></div>
<div class="info-item">尺寸: <strong id="infoSize">-</strong></div>
<div class="info-item">总时长: <strong id="infoDuration">-</strong></div>
</div>
</div>
<div class="card">
<div class="card-title">🔍 帧预览</div>
<div class="preview-box"><canvas id="previewCanvas"></canvas></div>
<div class="controls">
<button class="btn btn-primary" id="btnPlay">▶ 播放</button>
<label>帧: <span id="frameLabel">1</span></label>
<input type="range" class="frame-slider form-input" id="frameSlider" min="0" max="0" value="0">
</div>
<h4 style="font-size:14px;margin-bottom:8px">所有帧：</h4>
<div class="frames-strip" id="framesStrip"></div>
</div>
<div class="card">
<div class="card-title">📐 调整尺寸</div>
<div class="resize-grid">
<div class="form-group"><label class="form-label">宽度 (px)</label>
<input class="form-input" type="number" id="resizeW" min="1" max="4096"></div>
<div class="form-group"><label class="form-label">高度 (px)</label>
<input class="form-input" type="number" id="resizeH" min="1" max="4096"></div>
</div>
<label style="font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:12px">
<input type="checkbox" id="lockRatio" checked> 锁定宽高比
</label>
<div class="btn-group">
<button class="btn btn-primary" id="btnResize">📐 应用尺寸</button>
<button class="btn btn-success" id="btnDownloadAll">📦 下载所有帧 (ZIP)</button>
</div>
</div>
<div class="card">
<div class="card-title">💾 导出单帧</div>
<div class="btn-group">
<button class="btn btn-success" id="btnDownloadFrame">⬇ 下载当前帧 PNG</button>
<button class="btn btn-secondary" id="btnReset">🔄 重新上传</button>
</div>
</div>
</div>
</div>
</div>
<footer class="footer"><div class="footer-container"><p>Web工具箱 © 2024</p></div></footer>
<script src="../../assets/js/common.js"></script>
<script>
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const mainSection=document.getElementById('mainSection');
const previewCanvas=document.getElementById('previewCanvas');
const frameSlider=document.getElementById('frameSlider');
const frameLabel=document.getElementById('frameLabel');
const btnPlay=document.getElementById('btnPlay');
const framesStrip=document.getElementById('framesStrip');

let frames=[];//{canvas,delay}
let currentFrame=0;
let playing=false;
let playTimer=null;
let origW=0,origH=0;

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)loadGif(e.dataTransfer.files[0])});
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files.length)loadGif(e.target.files[0]);fileInput.value=''});

function loadGif(file){
  if(!file||!file.type.includes('gif')){showMessage('error','请上传GIF文件');return}
  stopPlay();
  frames=[];
  currentFrame=0;
  framesStrip.innerHTML='';

  const reader=new FileReader();
  reader.onload=ev=>{
    const buf=new Uint8Array(ev.target.result);
    parseGif(buf);
  };
  reader.readAsArrayBuffer(file);
}

/* Minimal GIF89a frame parser using canvas */
function parseGif(buf){
  // Use an offscreen approach: draw gif on canvas frame by frame
  // We'll leverage the browser's GIF decoder by drawing the full gif
  // then extract frames via a trick: create an <img>, draw to canvas
  // For true frame extraction, we parse GCE blocks.
  // Simpler reliable approach: use the built-in decoder with a Blob + Image.
  const blob=new Blob([buf],{type:'image/gif'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=async()=>{
    origW=img.naturalWidth;origH=img.naturalHeight;
    aspectRatio=origW/origH;
    document.getElementById('resizeW').value=origW;
    document.getElementById('resizeH').value=origH;
    document.getElementById('infoSize').textContent=origW+' × '+origH+'px';
    // Extract frames using canvas by leveraging OffscreenCanvas or layered approach
    await extractFrames(img,blob);
    URL.revokeObjectURL(url);
  };
  img.onerror=()=>{showMessage('error','GIF解析失败');URL.revokeObjectURL(url)};
  img.src=url;
}

async function extractFrames(img,blob){
  // Try using the frames property or fall back to parsing delays from binary
  // We parse delays from GCE blocks
  const delays=parseDelays(new Uint8Array(await blob.arrayBuffer()));
  
  // Use a canvas approach: draw the image, but browser only shows first frame.
  // To get all frames, we'll parse the GIF binary and render each frame.
  // For simplicity, we parse frame image data blocks.
  
  // Alternative reliable approach: read all frames by parsing GIF89a binary
  const allFrames=await parseGifFrames(new Uint8Array(await blob.arrayBuffer()));
  
  if(allFrames.length===0){
    // fallback: just show the single decoded image
    const c=document.createElement('canvas');c.width=origW;c.height=origH;
    c.getContext('2d').drawImage(img,0,0);
    frames=[{canvas:c,delay:delays[0]||100}];
  }else{
    frames=allFrames.map((fc,i)=>({canvas:fc,delay:delays[i]||100}));
  }
  
  document.getElementById('infoFrames').textContent=frames.length;
  const totalMs=frames.reduce((s,f)=>s+f.delay,0);
  document.getElementById('infoDuration').textContent=(totalMs/1000).toFixed(2)+'s';
  
  frameSlider.max=frames.length-1;
  frameSlider.value=0;
  
  buildStrip();
  showFrame(0);
  mainSection.style.display='';
  showMessage('success','GIF解析完成，共 '+frames.length+' 帧');
}

function parseDelays(buf){
  const delays=[];
  let i=6;// skip GIF89a
  i+=7;// LSD(7)
  if(buf[10]&0x80){i+=3*((buf[10]&7)+1)}// GCT
  // skip LSD
  i=13;
  if(buf[10]&0x80){i+=3*(1<<((buf[10]&7)+1))}
  while(i<buf.length){
    if(buf[i]===0x21){// extension
      if(buf[i+1]===0xF9){// GCE
        const blockSize=buf[i+2];
        const delay=(buf[i+4]|(buf[i+5]<<8))*10;
        delays.push(delay||100);
        i+=2+blockSize+1+1;// ext intro + size + block + terminator
      }else{
        i+=2;
        while(buf[i]!==0&&i<buf.length)i+=buf[i]+1;
        i++;// skip terminator
      }
    }else if(buf[i]===0x2C){// image descriptor
      i+=9;
      if(buf[i-1]&0x80){i+=3*(1<<((buf[i-1]&7)+1))}
      i++;// LZW min code size
      while(buf[i]!==0&&i<buf.length)i+=buf[i]+1;
      i++;
    }else if(buf[i]===0x3B){break}
    else{i++}
  }
  // Ensure at least one delay
  if(delays.length===0)delays.push(100);
  return delays;
}

async function parseGifFrames(buf){
  // Full frame extraction using createImageBitmap and OffscreenCanvas
  // We'll use a different approach: render the entire GIF to canvas via an
  // animated image won't help. Instead, parse each image block and decode.
  // This is complex; we use a simpler method: iterate via ImageDecoder if available.
  if(typeof ImageDecoder!=='undefined'){
    try{
      const blob=new Blob([buf],{type:'image/gif'});
      const decoder=new ImageDecoder({data:blob,type:'image/gif'});
      const frames=[];
      for(let i=0;;i++){
        try{
          const result=await decoder.decode({frameIndex:i});
          const c=document.createElement('canvas');
          c.width=result.image.width;c.height=result.image.height;
          const ctx=c.getContext('2d');
          ctx.drawImage(result.image,0,0);
          result.image.close();
          frames.push(c);
        }catch(e){break}
      }
      if(frames.length>0)return frames;
    }catch(e){}
  }
  // Fallback: just return the first frame
  return[];
}

function buildStrip(){
  framesStrip.innerHTML='';
  frames.forEach((f,i)=>{
    const div=document.createElement('div');
    div.className='frame-thumb'+(i===0?' active':'');
    div.dataset.idx=i;
    const c=document.createElement('canvas');
    c.width=f.canvas.width;c.height=f.canvas.height;
    c.getContext('2d').drawImage(f.canvas,0,0);
    div.appendChild(c);
    const num=document.createElement('span');
    num.className='fnum';num.textContent=i+1;
    div.appendChild(num);
    div.addEventListener('click',()=>{stopPlay();showFrame(i)});
    framesStrip.appendChild(div);
  });
}

function showFrame(idx){
  if(idx<0||idx>=frames.length)return;
  currentFrame=idx;
  const f=frames[idx];
  previewCanvas.width=f.canvas.width;
  previewCanvas.height=f.canvas.height;
  previewCanvas.getContext('2d').drawImage(f.canvas,0,0);
  frameSlider.value=idx;
  frameLabel.textContent=(idx+1)+'/'+frames.length;
  // highlight strip
  framesStrip.querySelectorAll('.frame-thumb').forEach((d,i)=>d.classList.toggle('active',i===idx));
  // scroll strip
  const active=framesStrip.querySelector('.frame-thumb.active');
  if(active)active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

frameSlider.addEventListener('input',()=>{stopPlay();showFrame(parseInt(frameSlider.value))});

btnPlay.addEventListener('click',()=>{
  if(playing)stopPlay();
  else startPlay();
});
function startPlay(){
  if(!frames.length)return;
  playing=true;
  btnPlay.textContent='⏸ 暂停';
  tick();
}
function tick(){
  if(!playing)return;
  showFrame(currentFrame);
  const delay=frames[currentFrame].delay||100;
  currentFrame=(currentFrame+1)%frames.length;
  playTimer=setTimeout(tick,delay);
}
function stopPlay(){
  playing=false;
  btnPlay.textContent='▶ 播放';
  if(playTimer){clearTimeout(playTimer);playTimer=null}
}

/* Resize */
const resizeW=document.getElementById('resizeW');
const resizeH=document.getElementById('resizeH');
const lockRatio=document.getElementById('lockRatio');
let aspectRatio=1;
resizeW.addEventListener('input',()=>{if(lockRatio.checked){resizeH.value=Math.round(resizeW.value/aspectRatio)}});
resizeH.addEventListener('input',()=>{if(lockRatio.checked){resizeW.value=Math.round(resizeH.value*aspectRatio)}});

document.getElementById('btnResize').addEventListener('click',()=>{
  const w=parseInt(resizeW.value),h=parseInt(resizeH.value);
  if(!w||!h||w<1||h<1){showMessage('error','请输入有效的尺寸');return}
  frames.forEach(f=>{
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(f.canvas,0,0,w,h);
    f.canvas.width=w;f.canvas.height=h;
    f.canvas.getContext('2d').drawImage(c,0,0);
  });
  origW=w;origH=h;
  aspectRatio=w/h;
  document.getElementById('infoSize').textContent=w+' × '+h+'px';
  buildStrip();
  showFrame(currentFrame);
  showMessage('success','尺寸已调整为 '+w+'×'+h);
});

/* Download current frame */
document.getElementById('btnDownloadFrame').addEventListener('click',()=>{
  if(!frames.length)return;
  const c=frames[currentFrame].canvas;
  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download='frame_'+(currentFrame+1)+'.png';a.click();
    URL.revokeObjectURL(url);
  },'image/png');
});

/* Download all frames as individual PNGs */
document.getElementById('btnDownloadAll').addEventListener('click',()=>{
  if(!frames.length)return;
  frames.forEach((f,i)=>{
    f.canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;
      a.download='frame_'+String(i+1).padStart(3,'0')+'.png';
      setTimeout(()=>{a.click();URL.revokeObjectURL(url)},i*200);
    },'image/png');
  });
  showMessage('success','正在下载 '+frames.length+' 帧...');
});

document.getElementById('btnReset').addEventListener('click',()=>{
  stopPlay();frames=[];currentFrame=0;framesStrip.innerHTML='';
  mainSection.style.display='none';fileInput.value='';
  previewCanvas.getContext('2d').clearRect(0,0,previewCanvas.width,previewCanvas.height);
});
</script>
</body>
</html>
