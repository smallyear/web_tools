<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转PDF - Web工具箱</title>
  <meta name="description" content="多张图片合并为PDF">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .3s,background .3s;background:#FAFAFA}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:#E3F2FD}
.drop-zone .icon{font-size:48px;margin-bottom:12px}
.drop-zone p{color:var(--text-secondary);font-size:14px;margin:4px 0}
.preview-area{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.thumb{position:relative;width:100px;height:100px;border-radius: 10px;overflow:hidden;border:2px solid var(--border);cursor:grab;user-select:none;transition:border-color .2s}
.thumb.dragging{opacity:.4;border-color:var(--primary)}
.thumb.drag-over{border-color:var(--primary);transform:scale(1.05)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .remove{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(244,67,54,.85);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;line-height:20px;text-align:center;padding:0}
.thumb .index{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:1px 6px;border-radius: 10px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:500px){.options-grid{grid-template-columns:1fr}}
.progress-wrap{display:none;margin-bottom:16px}
.progress-bar{width:100%;height:24px;background:var(--border);border-radius:12px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:12px;width:0;transition:width .3s}
.progress-text{position:absolute;top:0;left:0;right:0;text-align:center;line-height:24px;font-size:12px;font-weight:600;color:var(--text)}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border:none;border-radius: 10px;cursor:pointer;font-size:14px;font-weight:500;height:40px;transition:background .2s,transform .1s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;transform:none}
.btn-secondary{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.breadcrumb{margin-bottom:20px;font-size:14px;color:var(--text-secondary)}
.breadcrumb a{color:var(--primary);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.tool-header{margin-bottom:24px}
.tool-header h1{font-size:24px;font-weight:700;color:var(--primary-dark);margin-bottom:6px}
.tool-header p{color:var(--text-secondary);font-size:15px}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-container"><a href="../../index.html" class="navbar-brand">🛠️ Web工具箱</a></div></nav>
<div class="main-wrapper">
<div class="container">
<div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>图片转PDF</span></div>
<div class="tool-header"><h1>🖼️ 图片转PDF</h1><p>上传多张图片，合并生成PDF文件，支持拖拽排序</p></div>
<div class="card">
<div class="drop-zone" id="dropZone">
<div class="icon">📁</div>
<p><strong>点击上传</strong> 或拖拽图片到此处</p>
<p style="color:#999;font-size:12px">支持 JPG / PNG / WebP，可多选</p>
<input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
</div>
<div id="previewSection" style="display:none">
<h3 style="font-size:15px;font-weight:600;margin-bottom:10px">📸 已选择图片 <span id="imgCount" style="color:var(--primary)">(0)</span></h3>
<div class="preview-area" id="previewArea"></div>
</div>
</div>
<div class="card">
<div class="card-title">⚙️ 转换选项</div>
<div class="options-grid">
<div class="form-group"><label class="form-label">页面大小</label>
<select class="form-select" id="pageSize"><option value="A4">A4 (210×297mm)</option><option value="Letter">Letter (8.5×11in)</option><option value="Auto-fit">自适应图片</option></select></div>
<div class="form-group"><label class="form-label">页面方向</label>
<select class="form-select" id="orientation"><option value="portrait">纵向</option><option value="landscape">横向</option></select></div>
<div class="form-group"><label class="form-label">页边距 (mm)</label>
<input class="form-input" type="number" id="margin" value="10" min="0" max="50"></div>
<div class="form-group"><label class="form-label">每页图片数</label>
<select class="form-select" id="perPage"><option value="1">1 张</option><option value="2">2 张</option><option value="4">4 张</option></select></div>
</div>
<div class="btn-group">
<button class="btn btn-primary" id="btnGenerate" disabled>📄 生成PDF</button>
<button class="btn btn-secondary" id="btnClear">🗑️ 清空</button>
</div>
</div>
<div class="card progress-wrap" id="progressWrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div><div class="progress-text" id="progressText">0%</div></div>
</div>
</div>
</div>
<footer class="footer"><div class="footer-container"><p>Web工具箱 © 2024</p></div></footer>
<script src="../../assets/js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const previewArea=document.getElementById('previewArea');
const previewSection=document.getElementById('previewSection');
const imgCountEl=document.getElementById('imgCount');
const btnGenerate=document.getElementById('btnGenerate');
const btnClear=document.getElementById('btnClear');
const progressWrap=document.getElementById('progressWrap');
const progressFill=document.getElementById('progressFill');
const progressText=document.getElementById('progressText');
let images=[];
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{addFiles(e.target.files);fileInput.value=''});
function addFiles(fileList){
  const valid=['image/jpeg','image/png','image/webp'];
  let added=0;
  for(const f of fileList){
    if(!valid.includes(f.type))continue;
    const entry={file:f,dataUrl:null,img:null};
    images.push(entry);
    const reader=new FileReader();
    reader.onload=ev=>{
      entry.dataUrl=ev.target.result;
      const im=new Image();
      im.onload=()=>{entry.img=im};
      im.src=entry.dataUrl;
      renderPreviews();
    };
    reader.readAsDataURL(f);
    added++;
  }
  if(added)showMessage('success','已添加 '+added+' 张图片');
  else showMessage('warning','没有有效的图片文件');
}
function renderPreviews(){
  previewSection.style.display=images.length?'':'none';
  imgCountEl.textContent='('+images.length+')';
  btnGenerate.disabled=images.length===0;
  previewArea.innerHTML='';
  images.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='thumb';div.draggable=true;div.dataset.idx=i;
    if(item.dataUrl)div.innerHTML='<img src="'+item.dataUrl+'"><button class="remove" data-idx="'+i+'">×</button><span class="index">'+(i+1)+'</span>';
    else div.innerHTML='<button class="remove" data-idx="'+i+'">×</button><span class="index">'+(i+1)+'</span>';
    previewArea.appendChild(div);
  });
  initDragSort();
}
previewArea.addEventListener('click',e=>{
  if(e.target.classList.contains('remove')){images.splice(parseInt(e.target.dataset.idx),1);renderPreviews()}
});
btnClear.addEventListener('click',()=>{images=[];renderPreviews();progressWrap.style.display='none'});
let dragSrcIdx=null;
function initDragSort(){
  const thumbs=previewArea.querySelectorAll('.thumb');
  thumbs.forEach(t=>{
    t.addEventListener('dragstart',e=>{dragSrcIdx=parseInt(t.dataset.idx);t.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    t.addEventListener('dragend',()=>{t.classList.remove('dragging');thumbs.forEach(x=>x.classList.remove('drag-over'))});
    t.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';t.classList.add('drag-over')});
    t.addEventListener('dragleave',()=>t.classList.remove('drag-over'));
    t.addEventListener('drop',e=>{
      e.preventDefault();
      const toIdx=parseInt(t.dataset.idx);
      if(dragSrcIdx!==null&&dragSrcIdx!==toIdx){const moved=images.splice(dragSrcIdx,1)[0];images.splice(toIdx,0,moved);renderPreviews()}
    });
  });
}
btnGenerate.addEventListener('click',async()=>{
  if(!images.length)return;
  btnGenerate.disabled=true;btnGenerate.innerHTML='<span class="spinner"></span> 生成中...';
  progressWrap.style.display='block';setProgress(0);
  try{
    const{PDFDocument}=PDFLib;
    const pdf=await PDFDocument.create();
    const pageSize=document.getElementById('pageSize').value;
    const orient=document.getElementById('orientation').value;
    const marginMM=parseInt(document.getElementById('margin').value)||0;
    const perPage=parseInt(document.getElementById('perPage').value);
    const marginPt=marginMM*2.83465;
    const sizes={A4:{w:595.28,h:841.89},Letter:{w:612,h:792}};
    await Promise.all(images.map(item=>new Promise(r=>{if(item.img)r();else{const iv=setInterval(()=>{if(item.img){clearInterval(iv);r()}},50)}})));
    const total=Math.ceil(images.length/perPage);
    for(let p=0;p<total;p++){
      const pageImages=images.slice(p*perPage,(p+1)*perPage);
      let pageW,pageH;
      if(pageSize==='Auto-fit'){const first=pageImages[0].img;pageW=first.width+marginPt*2;pageH=first.height+marginPt*2}
      else{const s=sizes[pageSize];if(orient==='landscape'){pageW=Math.max(s.w,s.h);pageH=Math.min(s.w,s.h)}else{pageW=Math.min(s.w,s.h);pageH=Math.max(s.w,s.h)}}
      const page=pdf.addPage([pageW,pageH]);
      const usableW=pageW-marginPt*2,usableH=pageH-marginPt*2;
      let cols=1,rows=1;
      if(perPage===2){cols=1;rows=2}
      if(perPage===4){cols=2;rows=2}
      const cellW=usableW/cols,cellH=usableH/rows;
      for(let i=0;i<pageImages.length;i++){
        const item=pageImages[i],im=item.img;
        const col=i%cols,row=Math.floor(i/cols);
        const scale=Math.min(cellW/im.width,cellH/im.height);
        const drawW=im.width*scale,drawH=im.height*scale;
        const x=marginPt+col*cellW+(cellW-drawW)/2;
        const y=pageH-marginPt-row*cellH-cellH+(cellH-drawH)/2;
        const ab=await fetch(item.dataUrl).then(r=>r.arrayBuffer());
        const imgObj=item.file.type==='image/png'?await pdf.embedPng(ab):await pdf.embedJpg(ab);
        page.drawImage(imgObj,{x,y,width:drawW,height:drawH});
      }
      setProgress(Math.round(((p+1)/total)*100));
      await new Promise(r=>setTimeout(r,10));
    }
    const pdfBytes=await pdf.save();
    const blob=new Blob([pdfBytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='images.pdf';a.click();
    URL.revokeObjectURL(url);
    showMessage('success','PDF生成成功！');
  }catch(err){console.error(err);showMessage('error','生成失败: '+err.message)}
  finally{btnGenerate.disabled=false;btnGenerate.innerHTML='📄 生成PDF'}
});
function setProgress(pct){progressFill.style.width=pct+'%';progressText.textContent=pct+'%'}
</script>
</body>
</html>
