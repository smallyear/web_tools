<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简体繁体转换 - 在线工具箱</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .convert-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .convert-container {
        grid-template-columns: 1fr;
      }
    }
    .convert-box {
      display: flex;
      flex-direction: column;
    }
    .convert-box textarea {
      width: 100%;
      min-height: 300px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
    }
    .convert-box textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.15);
    }
    .convert-box label {
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }
    .btn-group-center {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0;
    }
    .char-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ 在线工具箱</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <!-- 面包屑 -->
      <div style="margin-bottom: 20px; font-size: 14px; color: var(--text-secondary);">
        <a href="../../index.html" style="color: var(--primary); text-decoration: none;">首页</a>
        <span style="margin: 0 8px;">›</span>
        <span>简体繁体转换</span>
      </div>

      <!-- 工具标题 -->
      <div style="margin-bottom: 24px;">
        <h1 style="font-size: 28px; color: var(--primary-dark); margin-bottom: 8px;">📝 简体繁体转换</h1>
        <p style="color: var(--text-secondary);">快速实现简体中文与繁体中文的互相转换，支持大段文本处理</p>
      </div>

      <!-- 转换区域 -->
      <div class="card">
        <div class="convert-container">
          <div class="convert-box">
            <label>简体中文</label>
            <textarea id="simplified" placeholder="请输入简体中文文本..."></textarea>
            <div class="char-count">字数：<span id="simplifiedCount">0</span></div>
          </div>
          <div class="convert-box">
            <label>繁体中文</label>
            <textarea id="traditional" placeholder="請輸入繁體中文文本..."></textarea>
            <div class="char-count">字數：<span id="traditionalCount">0</span></div>
          </div>
        </div>

        <div class="btn-group-center">
          <button class="btn btn-primary" onclick="s2t()">简体 → 繁体 →</button>
          <button class="btn btn-primary" onclick="t2s()">← 繁体 → 简体</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
          <button class="btn btn-secondary" onclick="swapText()">交换</button>
        </div>
      </div>

      <!-- 使用说明 -->
      <div class="card" style="margin-top: 24px;">
        <div class="card-title">📖 使用说明</div>
        <ul style="list-style: none; padding: 0;">
          <li style="padding: 8px 0; border-bottom: 1px solid var(--border);">
            <strong>1.</strong> 在左侧输入框输入简体中文文本
          </li>
          <li style="padding: 8px 0; border-bottom: 1px solid var(--border);">
            <strong>2.</strong> 点击"简体 → 繁体"按钮进行转换
          </li>
          <li style="padding: 8px 0; border-bottom: 1px solid var(--border);">
            <strong>3.</strong> 转换结果将显示在右侧输入框
          </li>
          <li style="padding: 8px 0;">
            <strong>4.</strong> 也可以从繁体转换为简体，支持双向转换
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-container">
      <p>© 2024 在线工具箱 - 免费、实用的在线工具集合</p>
    </div>

    for (const [s, t] of Object.entries(s2tMap)) {
      if (!t2sMap[t]) t2sMap[t] = s;
    }

    // 简体转繁体
    function s2t() {
      const input = document.getElementById('simplified').value;
      let result = '';
      for (const char of input) {
        result += s2tMap[char] || char;
      }
      document.getElementById('traditional').value = result;
      updateCount();
    }

    // 繁体转简体
    function t2s() {
      const input = document.getElementById('traditional').value;
      let result = '';
      for (const char of input) {
        result += t2sMap[char] || char;
      }
      document.getElementById('simplified').value = result;
      updateCount();
    }

    // 清空
    function clearAll() {
      document.getElementById('simplified').value = '';
      document.getElementById('traditional').value = '';
      updateCount();
    }

    // 复制结果
    function copyResult() {
      const traditional = document.getElementById('traditional').value;
      const simplified = document.getElementById('simplified').value;
      const text = traditional || simplified;
      if (text) {
        copyToClipboard(text);
        showMessage('success', '已复制到剪贴板');
      }
    }

    // 交换文本
    function swapText() {
      const simplified = document.getElementById('simplified').value;
      const traditional = document.getElementById('traditional').value;
      document.getElementById('simplified').value = traditional;
      document.getElementById('traditional').value = simplified;
      updateCount();
    }

    // 更新字数
    function updateCount() {
      document.getElementById('simplifiedCount').textContent = document.getElementById('simplified').value.length;
      document.getElementById('traditionalCount').textContent = document.getElementById('traditional').value.length;
    }

    // 监听输入
    document.getElementById('simplified').addEventListener('input', updateCount);
    document.getElementById('traditional').addEventListener('input', updateCount);
