<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片格式转换 - Web工具箱</title>
  <meta name="description" content="JPG/PNG/WebP/BMP互转，支持质量调节">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.upload-area{border:2px dashed #ccc;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .3s,background .3s;margin-bottom:16px}
.upload-area:hover,.upload-area.dragover{border-color:#4a90d9;background:#f0f6ff}
.upload-area .icon{font-size:48px;margin-bottom:12px}
.upload-area p{color:#666;font-size:14px;margin:4px 0}
.preview-wrap{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.preview-item{flex:1;min-width:200px;text-align:center}
.preview-item img{max-width:100%;max-height:300px;border:1px solid #ddd;border-radius: 10px;display:block;margin:0 auto 8px}
.preview-label{font-weight:600;font-size:14px;color:#333;margin-bottom:6px}
.size-info{background:#f5f5f5;border-radius: 10px;padding:12px;margin-bottom:16px;font-size:14px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.size-info span{display:inline-flex;align-items:center;gap:4px}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.controls .form-group{margin-bottom:0}
.range-wrap{display:flex;align-items:center;gap:8px}
.range-wrap input[type=range]{width:160px}
.range-val{min-width:40px;font-size:13px;color:#555}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.hidden{display:none}
@media(max-width:768px){.preview-wrap{flex-direction:column}.controls{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<nav class="navbar"><div class="container"><a href="../../" class="logo">🛠️ Web工具箱</a></div></nav>
<div class="container">
<div class="breadcrumb"><a href="../../">首页</a> &gt; <span>图片格式转换</span></div>
<div class="card tool-header"><h1>🖼️ 图片格式转换</h1><p>上传图片，转换为 PNG、JPEG、WebP、BMP 格式</p></div>
<div class="card">
<div class="upload-area" id="dropZone">
<div class="icon">📤</div>
<p><strong>点击上传</strong> 或 拖拽图片到此处</p>
<p style="color:#999;font-size:12px">支持 PNG、JPEG、WebP、BMP、GIF 等格式</p>
<input type="file" id="fileInput" accept="image/*" style="display:none">
</div>
<div id="controlsSection" class="hidden">
<div class="controls">
<div class="form-group">
<label class="form-label">输出格式</label>
<select id="formatSelect" class="form-select" style="width:140px">
<option value="image/png">PNG</option>
<option value="image/jpeg" selected>JPEG</option>
<option value="image/webp">WebP</option>
<option value="image/bmp">BMP</option>
</select>
</div>
<div class="form-group" id="qualityGroup">
<label class="form-label">质量</label>
<div class="range-wrap">
<input type="range" id="qualitySlider" min="0.1" max="1" step="0.05" value="0.85">
<span class="range-val" id="qualityVal">0.85</span>
</div>
</div>
<div class="form-group">
<button class="btn btn-primary" onclick="convertImage()">🔄 转换</button>
</div>
</div>
</div>
<div id="resultSection" class="hidden">
<div class="size-info">
<span>📄 原始: <strong id="origSize">-</strong></span>
<span>📦 转换后: <strong id="convSize">-</strong></span>
<span id="sizeDiff"></span>
</div>
<div class="preview-wrap">
<div class="preview-item">
<div class="preview-label">原图</div>
<img id="origPreview" src="" alt="原图">
</div>
<div class="preview-item">
<div class="preview-label">转换结果</div>
<img id="convPreview" src="" alt="转换结果">
</div>
</div>
<div class="btn-row">
<button class="btn btn-success" onclick="downloadResult()">📥 下载转换图片</button>
<button class="btn btn-secondary" onclick="resetAll()">🔄 重新上传</button>
</div>
</div>
</div>
</div>
<footer class="footer"><p>Web工具箱 © 2024</p></footer>
<script src="../../assets/js/common.js"></script>
<script>
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const formatSelect=document.getElementById('formatSelect');
const qualitySlider=document.getElementById('qualitySlider');
const qualityVal=document.getElementById('qualityVal');
const qualityGroup=document.getElementById('qualityGroup');
let originalFile=null,convertedBlob=null,originalImg=null;

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});

qualitySlider.addEventListener('input',()=>{qualityVal.textContent=qualitySlider.value});
formatSelect.addEventListener('change',()=>{
const f=formatSelect.value;
qualityGroup.style.display=(f==='image/jpeg'||f==='image/webp')?'':'none';
});

function handleFile(file){
if(!file||!file.type.startsWith('image/')){showMessage('error','请选择图片文件');return}
originalFile=file;
const reader=new FileReader();
reader.onload=function(e){
originalImg=new Image();
originalImg.onload=function(){
document.getElementById('origPreview').src=e.target.result;
document.getElementById('origSize').textContent=formatFileSize(file.size);
document.getElementById('controlsSection').classList.remove('hidden');
document.getElementById('resultSection').classList.add('hidden');
};
originalImg.src=e.target.result;
};
reader.readAsDataURL(file);
}

function convertImage(){
if(!originalImg){showMessage('error','请先上传图片');return}
const canvas=document.createElement('canvas');
canvas.width=originalImg.width;
canvas.height=originalImg.height;
const ctx=canvas.getContext('2d');
ctx.drawImage(originalImg,0,0);
const format=formatSelect.value;
const quality=parseFloat(qualitySlider.value);
canvas.toBlob(function(blob){
if(!blob){showMessage('error','转换失败');return}
convertedBlob=blob;
const url=URL.createObjectURL(blob);
document.getElementById('convPreview').src=url;
document.getElementById('convSize').textContent=formatFileSize(blob.size);
const diff=blob.size-originalFile.size;
const pct=((diff/originalFile.size)*100).toFixed(1);
const diffEl=document.getElementById('sizeDiff');
if(diff>0){diffEl.innerHTML='📈 增大 <strong>'+pct+'%</strong>';diffEl.style.color='#e67e22'}
else{diffEl.innerHTML='📉 缩小 <strong>'+Math.abs(pct)+'%</strong>';diffEl.style.color='#27ae60'}
document.getElementById('resultSection').classList.remove('hidden');
showMessage('success','转换完成！');
},format,quality);
}

function downloadResult(){
if(!convertedBlob)return;
const ext={image/png:'.png',image/jpeg:'.jpg',image/webp:'.webp',image/bmp:'.bmp'};
const format=formatSelect.value;
const a=document.createElement('a');
a.href=URL.createObjectURL(convertedBlob);
a.download=(originalFile.name.replace(/\.[^.]+$/,'')||'image')+(ext[format]||'.png');
a.click();
}

function resetAll(){
originalFile=null;convertedBlob=null;originalImg=null;
fileInput.value='';
document.getElementById('controlsSection').classList.add('hidden');
document.getElementById('resultSection').classList.add('hidden');
document.getElementById('origPreview').src='';
document.getElementById('convPreview').src='';
}
</script>
</body>
</html>
