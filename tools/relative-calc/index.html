  <meta charset="UTF-8">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .chain-builder { display: flex; flex-direction: column; gap: 12px; }
    .chain-step { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .chain-step .step-num { background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .chain-step .arrow { color: var(--text-secondary); font-size: 18px; flex-shrink: 0; }
    .chain-step .form-select { min-width: 120px; }
    .chain-step .btn-remove { background: none; border: none; color: var(--error); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 10px; transition: background 0.2s; }
    .chain-step .btn-remove:hover { background: #FFEBEE; }
    .result-box { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); border-radius: 12px; padding: 32px; text-align: center; margin: 20px 0; }
    .result-box .path { font-size: 16px; color: var(--text-secondary); margin-bottom: 12px; }
    .result-box .term { font-size: 48px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
    .result-box .pinyin { font-size: 16px; color: var(--text-secondary); margin-bottom: 16px; }
    .reverse-box { background: white; border: 2px solid var(--primary-light); border-radius: 12px; padding: 24px; text-align: center; margin-top: 16px; }
    .reverse-box .label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
    .reverse-box .value { font-size: 28px; font-weight: 700; color: var(--primary); }
    .quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .quick-link { padding: 6px 14px; background: #F5F5F5; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .quick-link:hover { background: #E3F2FD; border-color: var(--primary); color: var(--primary); }
    .error-msg { color: var(--error); padding: 16px; text-align: center; background: #FFEBEE; border-radius: 10px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ 在线工具箱</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div style="margin-bottom: 20px; font-size: 14px; color: var(--text-secondary);">
        <a href="../../index.html" style="color: var(--primary); text-decoration: none;">首页</a>
        <span style="margin: 0 8px;">›</span>
        <span>亲戚称谓计算器</span>
      </div>

      <div style="margin-bottom: 24px;">
        <h1 style="font-size: 28px; color: var(--primary-dark); margin-bottom: 8px;">👨‍👩‍👧‍👦 亲戚称谓计算器</h1>
        <p style="color: var(--text-secondary);">逐级选择亲属关系，自动计算正确称谓，再也不怕叫错人</p>
      </div>

      <div class="card">
        <div class="card-title">🔗 关系链构建</div>
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
          从"我"出发，逐级添加亲属关系。例如：爸爸的妈妈的弟弟 = 我的舅爷爷
        </p>
        <div class="chain-builder" id="chainBuilder">
          <div class="chain-step" data-index="0">
            <span class="step-num">1</span>
            <span style="font-weight:500;">我的</span>
            <span class="arrow">→</span>
            <select class="form-select" onchange="calculate()">
              <option value="">请选择</option>
              <option value="father">爸爸</option>
              <option value="mother">妈妈</option>
              <option value="elder_brother">哥哥</option>
              <option value="elder_sister">姐姐</option>
              <option value="younger_brother">弟弟</option>
              <option value="younger_sister">妹妹</option>
              <option value="son">儿子</option>
              <option value="daughter">女儿</option>
              <option value="husband">丈夫</option>
              <option value="wife">妻子</option>
              <option value="paternal_grandfather">爷爷</option>
              <option value="paternal_grandmother">奶奶</option>
              <option value="maternal_grandfather">外公</option>
              <option value="maternal_grandmother">外婆</option>
            </select>
          </div>
        </div>
        <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="addStep()">➕ 添加关系</button>
          <button class="btn btn-danger" onclick="removeLastStep()">➖ 移除最后</button>
          <button class="btn btn-secondary" onclick="resetChain()">🔄 重置</button>
        </div>

        <div style="margin-top: 20px;">
          <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;">💡 常用关系快捷添加：</p>
          <div class="quick-links">
            <span class="quick-link" onclick="quickSet('father')">爸爸</span>
            <span class="quick-link" onclick="quickSet('father,paternal_grandmother')">爸爸的妈妈</span>
            <span class="quick-link" onclick="quickSet('father,paternal_grandmother,elder_brother')">爸爸的妈妈的哥哥</span>
            <span class="quick-link" onclick="quickSet('father,paternal_grandmother,younger_brother')">爸爸的妈妈的弟弟</span>
            <span class="quick-link" onclick="quickSet('mother,maternal_grandfather')">妈妈的爸爸</span>
            <span class="quick-link" onclick="quickSet('father,elder_brother')">爸爸的哥哥</span>
            <span class="quick-link" onclick="quickSet('father,younger_sister')">爸爸的妹妹</span>
            <span class="quick-link" onclick="quickSet('mother,younger_brother')">妈妈的弟弟</span>
            <span class="quick-link" onclick="quickSet('father,elder_brother,son')">爸爸的哥哥的儿子</span>
            <span class="quick-link" onclick="quickSet('husband,father')">丈夫的爸爸</span>
            <span class="quick-link" onclick="quickSet('wife,mother')">妻子的妈妈</span>
          </div>
        </div>
      </div>

      <div id="resultSection" style="display: none;">
        <div class="result-box" id="resultBox"></div>
      </div>
<button class="btn btn-secondary" onclick="copyResult()" style="margin-top:8px;padding:6px 12px;font-size:12px;height:30px;">📋 复制结果</button>

      <div id="errorSection" style="display: none;">
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>© 2024 在线工具箱 - 免费、实用的在线工具集合</p>
    </div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    const RELATIONS = {
      father: { label: '爸爸', gender: 'M', genDelta: 1 },
      mother: { label: '妈妈', gender: 'F', genDelta: 1 },
      elder_brother: { label: '哥哥', gender: 'M', genDelta: 0 },
      elder_sister: { label: '姐姐', gender: 'F', genDelta: 0 },
      younger_brother: { label: '弟弟', gender: 'M', genDelta: 0 },
      younger_sister: { label: '妹妹', gender: 'F', genDelta: 0 },
      son: { label: '儿子', gender: 'M', genDelta: -1 },
      daughter: { label: '女儿', gender: 'F', genDelta: -1 },
      husband: { label: '丈夫', gender: 'M', genDelta: 0 },
      wife: { label: '妻子', gender: 'F', genDelta: 0 },
      paternal_grandfather: { label: '爷爷', gender: 'M', genDelta: 2 },
      paternal_grandmother: { label: '奶奶', gender: 'F', genDelta: 2 },
      maternal_grandfather: { label: '外公', gender: 'M', genDelta: 2 },
      maternal_grandmother: { label: '外婆', gender: 'F', genDelta: 2 }
    };

    // 亲属称谓规则表
    // key: relation chain description, value: { call: how to call them, reverse: how they call you }
    // We'll use a computational approach based on generation, gender, and lineal/collateral
    const RELATION_SELECT = `
      <option value="">请选择</option>
      <option value="father">爸爸</option>
      <option value="mother">妈妈</option>
      <option value="elder_brother">哥哥</option>
      <option value="elder_sister">姐姐</option>
      <option value="younger_brother">弟弟</option>
      <option value="younger_sister">妹妹</option>
      <option value="son">儿子</option>
      <option value="daughter">女儿</option>
      <option value="husband">丈夫</option>
      <option value="wife">妻子</option>
      <option value="paternal_grandfather">爷爷</option>
      <option value="paternal_grandmother">奶奶</option>
      <option value="maternal_grandfather">外公</option>
      <option value="maternal_grandmother">外婆</option>
    `;

    function addStep() {
      const builder = document.getElementById('chainBuilder');
      const steps = builder.querySelectorAll('.chain-step');
      const idx = steps.length;
      if (idx >= 8) {
        showMessage('warning', '最多支持8层关系');
        return;
      }
      const div = document.createElement('div');
      div.className = 'chain-step';
      div.dataset.index = idx;
      div.innerHTML = `
        <span class="step-num">${idx + 1}</span>
        <span style="font-weight:500;">的</span>
        <span class="arrow">→</span>
        <select class="form-select" onchange="calculate()">
          ${RELATION_SELECT}
        </select>
      `;
      builder.appendChild(div);
    }

    function removeLastStep() {
      const builder = document.getElementById('chainBuilder');
      const steps = builder.querySelectorAll('.chain-step');
      if (steps.length > 1) {
        steps[steps.length - 1].remove();
        calculate();
      }
    }

    function resetChain() {
      const builder = document.getElementById('chainBuilder');
      builder.innerHTML = `
        <div class="chain-step" data-index="0">
          <span class="step-num">1</span>
          <span style="font-weight:500;">我的</span>
          <span class="arrow">→</span>
          <select class="form-select" onchange="calculate()">
            ${RELATION_SELECT}
          </select>
        </div>
      `;
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('errorSection').style.display = 'none';
    }

    function quickSet(path) {
      const keys = path.split(',');
      const builder = document.getElementById('chainBuilder');
      builder.innerHTML = '';
      keys.forEach((key, i) => {
        const div = document.createElement('div');
        div.className = 'chain-step';
        div.dataset.index = i;
        div.innerHTML = `
          <span class="step-num">${i + 1}</span>
          <span style="font-weight:500;">${i === 0 ? '我的' : '的'}</span>
          <span class="arrow">→</span>
          <select class="form-select" onchange="calculate()">
            ${RELATION_SELECT}
          </select>
        `;
        div.querySelector('select').value = key;
        builder.appendChild(div);
      });
      calculate();
    }

    function getChainPath() {
      const selects = document.querySelectorAll('#chainBuilder select');
      const path = [];
      selects.forEach(s => {
        if (s.value) path.push(s.value);
      });
      return path;
    }

    function calculate() {
      const path = getChainPath();
      if (path.length === 0) {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('errorSection').style.display = 'none';
        return;
      }

      const result = resolveKinship(path);
      if (!result) {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('errorSection').style.display = 'block';
        document.getElementById('errorMsg').textContent = '⚠️ 无法计算该关系称谓，请检查关系链是否正确';
        return;
      }

      const pathLabels = path.map(k => RELATIONS[k].label).join('的');
      document.getElementById('resultBox').innerHTML = `
        <div class="path">我的${pathLabels}</div>
        <div class="term">${result.call}</div>
        <div class="pinyin">关系链：${pathLabels}</div>
        <div class="reverse-box">
          <div class="label">TA 叫你</div>
          <div class="value">${result.reverse}</div>
        </div>
      `;
      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('errorSection').style.display = 'none';
    }

    function resolveKinship(path) {
      // Simplified kinship resolution
      // Track: generation (0=self, +1=parent, -1=child, etc.), side (paternal/maternal/spouse), gender
      let gen = 0; // relative to self
      let side = 'self'; // 'paternal', 'maternal', 'spouse', 'self'
      let gender = 'M'; // gender of the target person
      let isOlder = null; // for siblings

      for (let i = 0; i < path.length; i++) {
        const rel = RELATIONS[path[i]];
        if (!rel) return null;
        
        gender = rel.gender;
        gen += rel.genDelta;
        
        // Track side
        if (i === 0) {
          if (path[i] === 'father') side = 'paternal';
          else if (path[i] === 'mother') side = 'maternal';
          else if (path[i] === 'husband' || path[i] === 'wife') side = 'spouse';
          else side = 'self';
        } else {
          if (path[i] === 'father' || path[i] === 'mother') {
            if (side === 'self') side = gender === 'M' ? 'paternal' : 'maternal';
            // If already has a side, keep it (father's father is paternal)
            if (side === 'paternal' && path[i] === 'mother') side = 'paternal'; // father's mother is still paternal side
            if (side === 'maternal' && path[i] === 'father') side = 'maternal'; // mother's father is still maternal side
          }
        }

        // Sibling older/younger
        if (path[i] === 'elder_brother' || path[i] === 'elder_sister') isOlder = true;
        if (path[i] === 'younger_brother' || path[i] === 'younger_sister') isOlder = false;
      }

      return getTerm(gen, side, gender, isOlder, path);
    }

    function getTerm(gen, side, gender, isOlder, path) {
      const pathStr = path.join(',');
      
      // Direct lookup for common patterns
      const directMap = {
        'father': { call: '爸爸', reverse: '孩子' },
        'mother': { call: '妈妈', reverse: '孩子' },
        'elder_brother': { call: '哥哥', reverse: '弟弟/妹妹' },
        'elder_sister': { call: '姐姐', reverse: '弟弟/妹妹' },
        'younger_brother': { call: '弟弟', reverse: '哥哥/姐姐' },
        'younger_sister': { call: '妹妹', reverse: '哥哥/姐姐' },
        'son': { call: '儿子', reverse: '爸爸/妈妈' },
        'daughter': { call: '女儿', reverse: '爸爸/妈妈' },
        'husband': { call: '丈夫', reverse: '妻子' },
        'wife': { call: '妻子', reverse: '丈夫' },
        'paternal_grandfather': { call: '爷爷', reverse: '孙子/孙女' },
        'paternal_grandmother': { call: '奶奶', reverse: '孙子/孙女' },
        'maternal_grandfather': { call: '外公', reverse: '外孙/外孙女' },
        'maternal_grandmother': { call: '外婆', reverse: '外孙/外孙女' },
      };
      
      if (path.length === 1 && directMap[path[0]]) return directMap[path[0]];

      // Two-level relationships
      const twoLevel = {
        'father,father': { call: '爷爷', reverse: '孙子/孙女' },
        'father,mother': { call: '奶奶', reverse: '孙子/孙女' },
        'mother,father': { call: '外公', reverse: '外孙/外孙女' },
        'mother,mother': { call: '外婆', reverse: '外孙/外孙女' },
        'father,elder_brother': { call: '伯伯', reverse: '侄子/侄女' },
        'father,younger_brother': { call: '叔叔', reverse: '侄子/侄女' },
        'father,elder_sister': { call: '姑姑', reverse: '侄子/侄女' },
        'father,younger_sister': { call: '姑姑', reverse: '侄子/侄女' },
        'mother,elder_brother': { call: '舅舅', reverse: '外甥/外甥女' },
        'mother,younger_brother': { call: '舅舅', reverse: '外甥/外甥女' },
        'mother,elder_sister': { call: '姨妈', reverse: '外甥/外甥女' },
        'mother,younger_sister': { call: '姨妈', reverse: '外甥/外甥女' },
        'father,son': { call: '哥哥/弟弟', reverse: '哥哥/弟弟' },
        'father,daughter': { call: '姐姐/妹妹', reverse: '姐姐/妹妹' },
        'mother,son': { call: '哥哥/弟弟', reverse: '哥哥/弟弟' },
        'mother,daughter': { call: '姐姐/妹妹', reverse: '姐姐/妹妹' },
        'son,son': { call: '孙子', reverse: '爷爷/奶奶' },
        'son,daughter': { call: '孙女', reverse: '爷爷/奶奶' },
        'daughter,son': { call: '外孙', reverse: '外公/外婆' },
        'daughter,daughter': { call: '外孙女', reverse: '外公/外婆' },
        'husband,father': { call: '公公', reverse: '儿媳妇' },
        'husband,mother': { call: '婆婆', reverse: '儿媳妇' },
        'wife,father': { call: '岳父', reverse: '女婿' },
        'wife,mother': { call: '岳母', reverse: '女婿' },
        'husband,elder_brother': { call: '大伯子', reverse: '弟媳妇' },
        'husband,younger_brother': { call: '小叔子', reverse: '嫂子' },
        'husband,elder_sister': { call: '大姑姐', reverse: '弟媳妇' },
        'husband,younger_sister': { call: '小姑子', reverse: '嫂子' },
        'wife,elder_brother': { call: '大舅子', reverse: '妹夫' },
        'wife,younger_brother': { call: '小舅子', reverse: '姐夫' },
        'wife,elder_sister': { call: '大姨子', reverse: '妹夫' },
        'wife,younger_sister': { call: '小姨子', reverse: '姐夫' },
        'elder_brother,wife': { call: '嫂子', reverse: '小叔子/小姑子' },
        'younger_brother,wife': { call: '弟媳妇', reverse: '大伯子/大姑姐' },
        'elder_sister,husband': { call: '姐夫', reverse: '小舅子/小姨子' },
        'younger_sister,husband': { call: '妹夫', reverse: '大舅子/大姨子' },
        'son,wife': { call: '儿媳妇', reverse: '公公/婆婆' },
        'daughter,husband': { call: '女婿', reverse: '岳父/岳母' },
      };

      if (twoLevel[pathStr]) return twoLevel[pathStr];

      // Three-level common patterns
      const threeLevel = {
        'father,father,father': { call: '曾祖父', reverse: '曾孙/曾孙女' },
        'father,father,mother': { call: '曾祖母', reverse: '曾孙/曾孙女' },
        'mother,mother,father': { call: '外曾祖父', reverse: '外曾孙/外曾孙女' },
        'father,father,elder_brother': { call: '伯公/伯祖父', reverse: '侄孙/侄孙女' },
        'father,father,younger_brother': { call: '叔公/叔祖父', reverse: '侄孙/侄孙女' },
        'father,father,elder_sister': { call: '姑婆/姑祖母', reverse: '侄孙/侄孙女' },
        'father,father,younger_sister': { call: '姑婆/姑祖母', reverse: '侄孙/侄孙女' },
        'father,mother,elder_brother': { call: '舅公/舅祖父', reverse: '外甥孙/外甥孙女' },
        'father,mother,younger_brother': { call: '舅公/舅祖父', reverse: '外甥孙/外甥孙女' },
        'father,mother,elder_sister': { call: '姨婆/姨祖母', reverse: '外甥孙/外甥孙女' },
        'father,mother,younger_sister': { call: '姨婆/姨祖母', reverse: '外甥孙/外甥孙女' },
        'mother,father,elder_brother': { call: '外伯公', reverse: '侄外孙/侄外孙女' },
        'mother,father,younger_brother': { call: '外叔公', reverse: '侄外孙/侄外孙女' },
        'mother,father,elder_sister': { call: '外姑婆', reverse: '侄外孙/侄外孙女' },
        'mother,father,younger_sister': { call: '外姑婆', reverse: '侄外孙/侄外孙女' },
        'mother,mother,elder_brother': { call: '外舅公', reverse: '外甥外孙/外甥外孙女' },
        'mother,mother,younger_brother': { call: '外舅公', reverse: '外甥外孙/外甥外孙女' },
        'mother,mother,elder_sister': { call: '外姨婆', reverse: '外甥外孙/外甥外孙女' },
        'mother,mother,younger_sister': { call: '外姨婆', reverse: '外甥外孙/外甥外孙女' },
        'father,elder_brother,son': { call: '堂兄/堂弟', reverse: '堂兄/堂弟' },
        'father,elder_brother,daughter': { call: '堂姐/堂妹', reverse: '堂姐/堂妹' },
        'father,younger_brother,son': { call: '堂兄/堂弟', reverse: '堂兄/堂弟' },
        'father,younger_brother,daughter': { call: '堂姐/堂妹', reverse: '堂姐/堂妹' },
        'father,elder_sister,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'father,elder_sister,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'father,younger_sister,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'father,younger_sister,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'mother,elder_brother,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'mother,elder_brother,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'mother,younger_brother,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'mother,younger_brother,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'mother,elder_sister,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'mother,elder_sister,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'mother,younger_sister,son': { call: '表兄/表弟', reverse: '表兄/表弟' },
        'mother,younger_sister,daughter': { call: '表姐/表妹', reverse: '表姐/表妹' },
        'husband,father,mother': { call: '婆婆(奶奶)', reverse: '孙媳妇' },
        'wife,father,father': { call: '岳祖父', reverse: '孙女婿' },
        'wife,father,mother': { call: '岳祖母', reverse: '孙女婿' },
      };

      if (threeLevel[pathStr]) return threeLevel[pathStr];

      // Generic computation for longer chains
      return genericKinship(gen, side, gender, isOlder, path);
    }

    function genericKinship(gen, side, gender, isOlder, path) {
      // Simple fallback based on generation and gender
      const absGen = Math.abs(gen);
      
      if (gen === 0) {
        if (gender === 'M') return { call: isOlder ? '兄' : '弟', reverse: isOlder ? '弟' : '兄' };
        return { call: isOlder ? '姐' : '妹', reverse: isOlder ? '妹' : '姐' };
      }
      
      if (gen > 0) {
        // Ancestor
        const prefix = side === 'paternal' ? '' : side === 'maternal' ? '外' : '';
        const suffix = gender === 'M' ? '祖父' : '祖母';
        if (absGen === 1) return { call: gender === 'M' ? '父亲' : '母亲', reverse: '子女' };
        if (absGen === 2) return { call: prefix + suffix, reverse: '孙辈' };
        if (absGen === 3) return { call: prefix + '曾' + suffix, reverse: '曾孙辈' };
        return { call: prefix + '高' + suffix, reverse: '玄孙辈' };
      }
      
      // Descendant
      const prefix = side === 'paternal' ? '' : '外';
      const suffix = gender === 'M' ? '孙' : '孙女';
      if (absGen === 1) return { call: gender === 'M' ? '儿子' : '女儿', reverse: '父母' };
      if (absGen === 2) return { call: prefix + suffix, reverse: '祖父母' };
      if (absGen === 3) return { call: prefix + '曾' + suffix, reverse: '曾祖父母' };
      return { call: prefix + '玄' + suffix, reverse: '高祖父母' };
    }
