<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特殊符号大全 - 在线工具箱</title>
  <meta name="description" content="数学符号、箭头、货币等300+符号">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.container { max-width: 960px; margin: 0 auto; padding: 16px; }
.breadcrumb { font-size: 14px; color: var(--text-secondary, #666); margin-bottom: 12px; }
.breadcrumb a { color: var(--primary, #4a90d9); text-decoration: none; }
.tool-header { margin-bottom: 20px; }
.tool-header h1 { font-size: 1.6em; margin: 0 0 6px; }
.tool-header p { color: var(--text-secondary, #666); margin: 0; }
.card { background: var(--card-bg, #fff); border: 1px solid var(--border, #e0e0e0); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.search-wrap { position: relative; }
.search-wrap input { width: 100%; padding: 10px 10px 10px 36px; border: 1px solid var(--border, #e0e0e0); border-radius: 10px; font-size: 14px; box-sizing: border-box; }
.search-wrap input:focus { outline: none; border-color: var(--primary, #4a90d9); }
.search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; }
.category { margin-bottom: 20px; }
.category h3 { font-size: 1em; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border, #e0e0e0); }
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 6px; }
.char-item { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; border: 1px solid var(--border, #e0e0e0); border-radius: 10px; font-size: 20px; cursor: pointer; transition: all .15s; background: var(--card-bg, #fff); user-select: all; position: relative; }
.char-item:hover { background: #e8f0fe; border-color: var(--primary, #4a90d9); transform: scale(1.1); }
.char-item:active { transform: scale(0.95); }
.char-item .fav-badge { position: absolute; top: 2px; right: 2px; font-size: 8px; color: #FFD600; pointer-events: none; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
footer { text-align: center; padding: 24px 16px; font-size: 13px; color: var(--text-secondary, #999); }

/* 字符信息面板 */
.info-panel { background: var(--card-bg, #fff); border: 1px solid var(--border, #e0e0e0); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: none; }
.info-panel.visible { display: block; }
.info-panel h4 { margin: 0 0 10px; font-size: 14px; }
.info-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; }
.info-grid .label { color: var(--text-secondary, #666); font-weight: 600; }
.info-grid .value { font-family: 'Menlo', 'Consolas', monospace; }
.info-panel .big-char { font-size: 48px; text-align: center; margin-bottom: 10px; }
.info-actions { display: flex; gap: 8px; margin-top: 10px; }
.info-actions button { padding: 5px 14px; border: 1px solid var(--border, #e0e0e0); border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; transition: all .15s; }
.info-actions button:hover { background: var(--primary, #4a90d9); color: #fff; border-color: var(--primary, #4a90d9); }

/* 特殊区域 */
.special-section { margin-bottom: 16px; }
.special-section h3 { font-size: 1em; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border, #e0e0e0); }
.special-section h3 span { font-size: 12px; color: var(--text-secondary, #666); font-weight: normal; }
</style>
</head>
<body>
<nav style="background:var(--primary,#4a90d9);color:#fff;padding:12px 16px;">
  <a href="../../index.html" style="color:#fff;text-decoration:none;font-weight:600;">← 返回工具箱</a>
</nav>
<div class="container">
  <div class="breadcrumb"><a href="../../index.html">首页</a> / 特殊符号大全</div>
  <div class="tool-header">
    <h1>✦ 特殊符号大全</h1>
    <p>点击任意符号即可复制到剪贴板，右键查看详情</p>
  </div>

  <div class="card">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="搜索符号或分类名称..." autocomplete="off">
    </div>
  </div>

  <!-- 字符信息面板 -->
  <div class="info-panel" id="infoPanel">
    <div class="big-char" id="infoBigChar"></div>
    <h4>字符信息</h4>
    <div class="info-grid">
      <span class="label">字符:</span><span class="value" id="infoChar"></span>
      <span class="label">Unicode:</span><span class="value" id="infoUnicode"></span>
      <span class="label">HTML实体:</span><span class="value" id="infoHtml"></span>
      <span class="label">CSS content:</span><span class="value" id="infoCss"></span>
      <span class="label">JS转义:</span><span class="value" id="infoJs"></span>
    </div>
    <div class="info-actions">
      <button onclick="copyInfo('char')">📋 复制字符</button>
      <button onclick="copyInfo('html')">🔤 复制HTML</button>
      <button onclick="copyInfo('css')">🎨 复制CSS</button>
      <button onclick="addFavoriteFromInfo()">⭐ 加入收藏</button>
      <button onclick="closeInfoPanel()">✖ 关闭</button>
    </div>
  </div>

  <!-- 收藏 -->
  <div class="special-section" id="favoritesSection" style="display:none;">
    <h3>⭐ 收藏符号 <span>（点击复制，长按移除）</span></h3>
    <div class="char-grid" id="favoritesGrid"></div>
  </div>

  <!-- 最近使用 -->
  <div class="special-section" id="recentSection" style="display:none;">
    <h3>🕐 最近使用 <span>（最近20个）</span></h3>
    <div class="char-grid" id="recentGrid"></div>
  </div>

  <div id="charContainer"></div>
</div>

<div class="toast" id="toast"></div>
<footer>© 2025 在线工具箱 · 特殊符号大全</footer>

<script src="../../assets/js/common.js"></script>
<script>
const symbolData = {
  '数学符号': ['±','×','÷','≠','≈','≤','≥','∞','∑','∏','√','∫','∂','∇','∈','∉','⊂','⊃','∪','∩','∅','∝','∠','⊥','∥','∧','∨','¬','∀','∃','∴','∵','≡','≅','∼','⊕','⊗','‰','‱','ℂ','ℕ','ℚ','ℝ','ℤ','½','⅓','⅔','¼','¾','⅛','⅜','⅝','⅞'],
  '箭头': ['←','→','↑','↓','↔','↕','⇐','⇒','⇑','⇓','⇔','⇕','⟵','⟶','⟷','⟸','⟹','⟺','↩','↪','↻','↺','↻','⇈','⇊','⇄','⇅','⇵','⇝','⇜','↝','↜','▸','◂','▴','▾','►','◄','▲','▼','△','▽','▷','◁','▻','◅','➤','➜','➤','➥','➦','➧','➨'],
  '货币符号': ['¥','€','£','$','₩','₹','₽','₫','฿','¢','₣','₤','₧','₨','₯','₠','₣','₢','₥','₦','₧','₨','₩','₪','₫','₭','₮','₯','₰','₱','₲','₳','₴','₵','₶','₷','₸','₺','₻','₼','₽','₾','₿'],
  '括号': ['（）','〔〕','【】','〖〗','｛｝','〈〉','《》','「」','『』','﹙﹚','﹛﹜','﹝﹞','⁽⁾','₍₎','❨❩','❪❫','❴❵','❬❭','❮❯','❰❱','❲❳','⟨⟩','⟪⟫','⟬⟭','⟮⟯','⌈⌉','⌊⌋','⌌⌍','⌎⌏','⌜⌝','⌞⌟','〈〉'],
  '希腊字母': ['α','β','γ','δ','ε','ζ','η','θ','ι','κ','λ','μ','ν','ξ','ο','π','ρ','σ','τ','υ','φ','χ','ψ','ω','Α','Β','Γ','Δ','Ε','Ζ','Η','Θ','Ι','Κ','Λ','Μ','Ν','Ξ','Ο','Π','Ρ','Σ','Τ','Υ','Φ','Χ','Ψ','Ω'],
  '中文标点': ['，','。','？','！','：','；','、','…','——','～','·','「」','『』','〈〉','《》','【】','〖〗','〔〕','（）','﹏','﹑','﹐','﹒','﹔','﹕','﹗','﹖','﹘','︱','︳','︴'],
  '制表符': ['┌','┐','└','┘','├','┤','┬','┴','┼','─','│','╔','╗','╚','╝','╠','╣','╦','╩','╬','═','║','╒','╕','╘','╛','╞','╡','╤','╧','╪','╫','╭','╮','╰','╯','╱','╲','╳'],
  '序号': ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','❶','❷','❸','❹','❺','❻','❼','❽','❾','❿','㈠','㈡','㈢','㈣','㈤','㈥','㈦','㈧','㈨','㈩','Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ','Ⅺ','Ⅻ','㊀','㊁','㊂','㊃','㊄','㊅','㊆','㊇','㊈','㊉','⑴','⑵','⑶','⑷','⑸','⑹','⑺','⑻','⑼','⑽','⒈','⒉','⒊','⒋','⒌','⒍','⒎','⒏','⒐','⒑'],
  '网络符号': ['☆','★','♡','♥','♢','♦','♣','♠','♤','♧','☀','☁','☂','☃','☄','☉','☼','☽','☾','♨','♩','♪','♫','♬','♭','♮','♯','✓','✗','✘','✔','✖','✗','✘','❣','❤','❥','❦','❧','✉','☏','✁','✂','✃','✄','✆','✎','✏','✐','✑','✒','⚾','⛳','⚽','⚡','⚑','⚐','⚕','⚖','⚙','⚛','⚜','⚝','⚞','⚟','⚠','⚡','⚥','⚦','⚧','⚨','⚩','⚪','⚫','⚬','⚭','⚮','⚯','⚰','⚱','⚲','⚳','⚴','⚵','⚶','⚷','⚸','⚹','❛','❜','❝','❝','❞','❟','❝','❞'],
  '货币&数字': ['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹','₀','₁','₂','₃','₄','₅','₆','₇','₈','₉','⁺','⁻','⁼','⁽','⁾','ⁿ','ⁱ','₀','₁','₂','₃','₄','₅','₆','₇','₈','₉','₊','₋','₌'],
  '制表符（Box Drawing）': ['─','│','┌','┐','└','┘','├','┤','┬','┴','┼','═','║','╔','╗','╚','╝','╠','╣','╦','╩','╬','╭','╮','╰','╯','╱','╲','╳','╴','╵','╶','╷','╸','╹','╺','╻','╼','╽','╾','╿'],
  '块元素': ['█','▓','▒','░','▀','▄','▌','▐','▂','▃','▄','▅','▆','▇','▉','▊','▋','▌','▍','▎','▏','▐','▕','▖','▗','▘','▙','▚','▛','▜','▝','▞','▟'],
  '音符': ['♩','♪','♫','♬','♭','♮','♯','𝄞','𝄡','𝄢','𝄟','𝄠'],
  '棋子': ['♔','♕','♖','♗','♘','♙','♚','♛','♜','♝','♞','♟'],
  '天气符号': ['☀','☁','☂','☃','☄','☉','☼','🌡','🌤','🌥','🌦','🌧','🌨','🌩','🌪','🌫','🌬','⛅','⛈','❄','❅','❆','❇','❈','❉','❊','❋'],
  '星座符号': ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','⛎','♓','⚹','⚺','⚻','⚼','♎','⚿']
};

const container = document.getElementById('charContainer');
const searchInput = document.getElementById('search');
const toast = document.getElementById('toast');
let currentInfoChar = '';

function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1200);
}

function copyChar(ch) {
  if (typeof copyToClipboard === 'function') copyToClipboard(ch);
  else navigator.clipboard.writeText(ch);
  showToast('已复制：' + ch);
  addRecent(ch);
}

// --- 最近使用 ---
function getRecent() {
  try { return JSON.parse(localStorage.getItem('specialCharsRecent') || '[]'); } catch { return []; }
}
function addRecent(ch) {
  let recent = getRecent();
  recent = recent.filter(c => c !== ch);
  recent.unshift(ch);
  if (recent.length > 20) recent = recent.slice(0, 20);
  localStorage.setItem('specialCharsRecent', JSON.stringify(recent));
  renderRecent();
}
function renderRecent() {
  const recent = getRecent();
  const section = document.getElementById('recentSection');
  const grid = document.getElementById('recentGrid');
  if (recent.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = '';
  recent.forEach(ch => {
    const item = createCharItem(ch, false);
    grid.appendChild(item);
  });
}

// --- 收藏 ---
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('specialCharsFavorites') || '[]'); } catch { return []; }
}
function saveFavorites(favs) {
  localStorage.setItem('specialCharsFavorites', JSON.stringify(favs));
}
function toggleFavorite(ch) {
  let favs = getFavorites();
  const i = favs.indexOf(ch);
  if (i >= 0) { favs.splice(i, 1); showToast('已取消收藏'); }
  else { favs.push(ch); showToast('已收藏：' + ch); }
  saveFavorites(favs);
  renderFavorites();
  render(searchInput.value);
}
function addFavoriteFromInfo() {
  if (currentInfoChar) toggleFavorite(currentInfoChar);
}
function renderFavorites() {
  const favs = getFavorites();
  const section = document.getElementById('favoritesSection');
  const grid = document.getElementById('favoritesGrid');
  if (favs.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = '';
  favs.forEach(ch => {
    const item = createCharItem(ch, true);
    grid.appendChild(item);
  });
}

// --- 字符信息面板 ---
function showInfoPanel(ch) {
  currentInfoChar = ch;
  const panel = document.getElementById('infoPanel');
  const code = ch.codePointAt(0);
  document.getElementById('infoBigChar').textContent = ch;
  document.getElementById('infoChar').textContent = ch;
  document.getElementById('infoUnicode').textContent = 'U+' + code.toString(16).toUpperCase().padStart(4, '0');
  document.getElementById('infoHtml').textContent = '&#' + code + ';';
  document.getElementById('infoCss').textContent = "'\\" + code.toString(16) + "'";
  document.getElementById('infoJs').textContent = '\\u{' + code.toString(16) + '}';
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function closeInfoPanel() {
  document.getElementById('infoPanel').classList.remove('visible');
}
function copyInfo(type) {
  const code = currentInfoChar.codePointAt(0);
  let text = '';
  if (type === 'char') text = currentInfoChar;
  else if (type === 'html') text = '&#' + code + ';';
  else if (type === 'css') text = "'\\" + code.toString(16) + "'";
  if (text) {
    if (typeof copyToClipboard === 'function') copyToClipboard(text);
    else navigator.clipboard.writeText(text);
    showToast('已复制：' + text);
  }
}

// --- 创建字符项 ---
function createCharItem(ch, isFavSection) {
  const item = document.createElement('div');
  item.className = 'char-item';
  item.textContent = ch;
  item.title = '点击复制 · 右键查看详情';
  if (isFavSection || getFavorites().includes(ch)) {
    const badge = document.createElement('span');
    badge.className = 'fav-badge';
    badge.textContent = '★';
    item.appendChild(badge);
  }
  item.addEventListener('click', (e) => {
    e.preventDefault();
    copyChar(ch);
  });
  item.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showInfoPanel(ch);
  });
  return item;
}

function render(filter) {
  container.innerHTML = '';
  const f = (filter || '').toLowerCase();
  Object.entries(symbolData).forEach(([cat, chars]) => {
    const filtered = f ? chars.filter(c => c.includes(f) || cat.toLowerCase().includes(f)) : chars;
    if (filtered.length === 0) return;
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `<h3>${cat}（${filtered.length}）</h3>`;
    const grid = document.createElement('div');
    grid.className = 'char-grid';
    filtered.forEach(ch => {
      const item = createCharItem(ch, false);
      grid.appendChild(item);
    });
    div.appendChild(grid);
    container.appendChild(div);
  });
}

searchInput.addEventListener('input', () => render(searchInput.value));
render('');
renderRecent();
renderFavorites();
</script>
</body>
</html>
