<html lang="zh-CN">

.io-row{display:flex;gap:12px;margin-bottom:12px}
.io-row>div{flex:1;display:flex;flex-direction:column}
.io-row textarea,.io-row .output{flex:1;min-height:300px;font-family:monospace;font-size:13px;padding:10px;border:1px solid #ddd;border-radius:6px;resize:vertical}
.io-row .output{background:#f9f9f9;overflow:auto;white-space:pre-wrap;word-break:break-all}
.btn-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#4a90d9;color:#fff}.btn-primary:hover{background:#357abd}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
.btn-secondary{background:#6c757d;color:#fff}
select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px}

<body>
<nav class="navbar"><div class="container"><a href="../../" class="logo">🛠️ Web工具箱</a></div></nav>
<div class="container">
<div class="breadcrumb"><a href="../../">首页</a> &gt; <span>HTML格式化工具</span></div>
<div class="card tool-header"><h1>HTML格式化工具</h1><p>格式化美化或压缩HTML代码</p></div>
<div class="card">
<div class="btn-row">
<button class="btn btn-primary" onclick="beautify()">✨ 格式化</button>
<button class="btn btn-primary" onclick="minify()">📦 压缩</button>
<select id="indentSize"><option value="2">2空格</option><option value="4">4空格</option><option value="tab">Tab</option></select>
<button class="btn btn-success" onclick="copyOutput()">📋 复制结果</button>
<button class="btn btn-secondary" onclick="clearAll()">清空</button>
</div>
<div class="io-row">
<div><label style="font-weight:600;margin-bottom:4px">输入 HTML</label><textarea id="input" placeholder="粘贴 HTML 代码..."></textarea></div>
<div><label style="font-weight:600;margin-bottom:4px">输出结果</label><div class="output" id="output">结果将显示在这里...</div></div>
</div>
</div>
</div>
<footer class="footer"><p>Web工具箱 © 2024</p></footer>
<script src="../../assets/js/common.js"></script>
<script>
function getIndent(){
const v=document.getElementById('indentSize').value;
return v==='tab'?'\t':' '.repeat(parseInt(v));
}

const VOID_TAGS=new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
const INLINE_TAGS=new Set(['a','abbr','b','bdo','br','cite','code','dfn','em','i','img','input','kbd','label','map','object','output','q','samp','select','small','span','strong','sub','sup','textarea','time','var']);
const NO_INDENT_CONTENT=new Set(['pre','textarea','script','style']);
const BLOCK_TAGS=new Set(['html','body','div','p','ul','ol','li','table','thead','tbody','tfoot','tr','td','th','form','fieldset','nav','header','footer','main','section','article','aside','h1','h2','h3','h4','h5','h6','dl','dt','dd','blockquote','figure','figcaption']);

function tokenize(html){
const tokens=[];
const re=/(<!\-\-[\s\S]*?\-\->)|(<!\[CDATA\[[\s\S]*?\]\]>)|(<!DOCTYPE[^>]*>)|(<\/?\w[\s\S]*?>)/gi;
let lastIndex=0;
let m;
while((m=re.exec(html))!==null){
if(m.index>lastIndex)tokens.push({type:'text',value:html.slice(lastIndex,m.index)});
if(m[1])tokens.push({type:'comment',value:m[1]});
else if(m[2])tokens.push({type:'cdata',value:m[2]});
else if(m[3])tokens.push({type:'doctype',value:m[3]});
else tokens.push({type:'tag',value:m[4]});
lastIndex=re.lastIndex;
}
if(lastIndex<html.length)tokens.push({type:'text',value:html.slice(lastIndex)});
return tokens;
}

function parseTag(tagStr){
const m=tagStr.match(/^<\/?([a-zA-Z][a-zA-Z0-9]*)/);
if(!m)return null;
const name=m[1].toLowerCase();
const isClosing=tagStr.startsWith('</');
const isSelfClose=tagStr.endsWith('/>');
return{name,isClosing,isSelfClose};
}

function beautify(){
const html=document.getElementById('input').value;
if(!html.trim()){showMessage('请输入HTML');return}
const indent=getIndent();
const tokens=tokenize(html);
let result='',level=0;

for(let i=0;i<tokens.length;i++){
const tk=tokens[i];
if(tk.type==='comment'||tk.type==='cdata'||tk.type==='doctype'){
result+=indent.repeat(level)+tk.value.trim()+'\n';
continue;
}
if(tk.type==='text'){
const text=tk.value.trim();
if(!text)continue;
// Check if inside pre/textarea etc
result+=indent.repeat(level)+text+'\n';
continue;
}
if(tk.type==='tag'){
const info=parseTag(tk.value);
if(!info){result+=indent.repeat(level)+tk.value+'\n';continue}
// Closing tag: dedent first
if(info.isClosing){
level=Math.max(0,level-1);
result+=indent.repeat(level)+tk.value+'\n';
continue;
}
// Self-closing or void tag
if(info.isSelfClose||VOID_TAGS.has(info.name)){
result+=indent.repeat(level)+tk.value+'\n';
continue;
}
// Opening tag
result+=indent.repeat(level)+tk.value+'\n';
level++;
}
}
result=result.replace(/\n{3,}/g,'\n\n').replace(/[ \t]+\n/g,'\n');
if(result.endsWith('\n\n'))result=result.slice(0,-1);
document.getElementById('output').textContent=result;
}

function minify(){
let html=document.getElementById('input').value;
if(!html.trim()){showMessage('请输入HTML');return}
// Remove comments
html=html.replace(/<!\-\-[\s\S]*?\-\->/g,'');
// Remove extra whitespace between tags
html=html.replace(/>\s+</g,'><');
// Collapse whitespace in text nodes
html=html.replace(/\s{2,}/g,' ');
// Remove whitespace at start/end of tags
html=html.replace(/\s*\/>/g,'/>');
html=html.trim();
document.getElementById('output').textContent=html;
}

function copyOutput(){const t=document.getElementById('output').textContent;if(!t||t==='结果将显示在这里...')return;copyToClipboard(t);showMessage('已复制结果')}
function clearAll(){document.getElementById('input').value='';document.getElementById('output').textContent='结果将显示在这里...'}
</script>
</body>
</html>
