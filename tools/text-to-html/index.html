<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本转HTML工具 - Web工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.io-row{display:flex;gap:12px;margin-bottom:12px}
.io-row>div{flex:1;display:flex;flex-direction:column}
.io-row textarea{flex:1;min-height:250px;font-family:monospace;font-size:13px;padding:12px;border:1px solid #ddd;border-radius:6px;resize:vertical;box-sizing:border-box}
.preview-frame{flex:1;min-height:250px;border:1px solid #ddd;border-radius:6px;padding:14px;overflow:auto;background:#fff;font-size:14px;line-height:1.7}
.options-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.options-row label{font-size:14px;display:flex;align-items:center;gap:4px;cursor:pointer}
.options-row select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#4a90d9;color:#fff}.btn-primary:hover{background:#357abd}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
.btn-secondary{background:#6c757d;color:#fff}
.tab-row{display:flex;gap:0;margin-bottom:-1px}
.tab{padding:8px 20px;border:1px solid #ddd;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:14px;background:#f5f5f5}
.tab.active{background:#fff;font-weight:600;border-bottom:1px solid #fff}
.output-area{border:1px solid #ddd;border-radius:0 6px 6px 6px;display:none}
.output-area.active{display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:6px;z-index:9999;opacity:0;transition:opacity .3s}.toast.show{opacity:1}
@media(max-width:768px){.io-row{flex-direction:column}.io-row textarea,.preview-frame{min-height:200px}}
</style>
</head>
<body>
<nav class="navbar"><div class="container"><a href="../../" class="logo">🛠️ Web工具箱</a></div></nav>
<div class="container">
<div class="breadcrumb"><a href="../../">首页</a> &gt; <span>文本转HTML工具</span></div>
<div class="card tool-header"><h1>文本转HTML工具</h1><p>将纯文本转换为HTML代码，支持段落、换行、链接和图片检测</p></div>
<div class="card">
<div class="options-row">
<div><label>换行模式：</label>
<select id="wrapMode">
<option value="p">&lt;p&gt; 段落标签</option>
<option value="br">&lt;br&gt; 换行标签</option>
</select>
</div>
<label><input type="checkbox" id="convertUrls" checked> URL转为链接</label>
<label><input type="checkbox" id="convertImages"> 检测图片URL</label>
</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="convert()">🔄 转换</button>
<button class="btn btn-success" onclick="copyHTML()">📋 复制HTML源码</button>
<button class="btn btn-secondary" onclick="clearAll()">清空</button>
</div>
<div class="io-row">
<div><label style="font-weight:600;margin-bottom:4px">输入文本</label><textarea id="input" placeholder="请输入纯文本..."></textarea></div>
<div>
<div class="tab-row">
<div class="tab active" onclick="switchTab('code',this)">HTML源码</div>
<div class="tab" onclick="switchTab('preview',this)">预览效果</div>
</div>
<div class="output-area active" id="codePanel"><textarea id="output" readonly style="min-height:250px;font-family:monospace;font-size:13px;padding:12px;border:none;width:100%;box-sizing:border-box;resize:vertical"></textarea></div>
<div class="output-area" id="previewPanel"><div class="preview-frame" id="preview"></div></div>
</div>
</div>
</div>
</div>
<footer class="footer"><p>Web工具箱 © 2024</p></footer>
<script src="../../assets/js/common.js"></script>
<script>
function escapeHTML(s){
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isImageURL(url){
return /\.(png|jpg|jpeg|gif|svg|webp|bmp|ico)(\?.*)?$/i.test(url);
}

function processText(text,convertUrls,convertImages){
// First escape HTML
let escaped=escapeHTML(text);

// URL regex
const urlRegex=/(https?:\/\/[^\s<>"']+)/g;

if(convertImages){
escaped=escaped.replace(urlRegex,function(url){
if(isImageURL(url)){
const decoded=url.replace(/&amp;/g,'&');
return '&lt;img src="'+url+'" alt="image" style="max-width:100%"&gt;';
}
return url;
});
}

if(convertUrls){
escaped=escaped.replace(urlRegex,function(url){
// Don't wrap if it's already inside an img src
if(/src=&quot;$/.test(escaped.substring(0,escaped.indexOf(url))))return url;
return '&lt;a href="'+url+'" target="_blank" rel="noopener"&gt;'+url+'&lt;/a&gt;';
});
}

return escaped;
}

function convert(){
const text=document.getElementById('input').value;
if(!text.trim()){showMessage('请输入文本');return}

const mode=document.getElementById('wrapMode').value;
const convertUrls=document.getElementById('convertUrls').checked;
const convertImages=document.getElementById('convertImages').checked;

let html;
if(mode==='p'){
// Split by double newlines into paragraphs
const paragraphs=text.split(/\n\s*\n/);
html=paragraphs.map(p=>{
const processed=processText(p.trim(),convertUrls,convertImages);
// Single newlines within paragraph become <br>
const withBr=processed.replace(/\n/g,'&lt;br&gt;');
return '&lt;p&gt;'+withBr+'&lt;/p&gt;';
}).join('\n');
}else{
// br mode: all single newlines become <br>
html=processText(text.trim(),convertUrls,convertImages).replace(/\n/g,'&lt;br&gt;');
}

document.getElementById('output').value=html;
// Decode for preview
const previewHTML=html.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
document.getElementById('preview').innerHTML=previewHTML;
}

function switchTab(tab,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.output-area').forEach(a=>a.classList.remove('active'));
el.classList.add('active');
document.getElementById(tab+'Panel').classList.add('active');
}

function copyHTML(){
const val=document.getElementById('output').value;
if(!val){showMessage('请先转换文本');return}
copyToClipboard(val);
showMessage('已复制HTML源码');
}

function clearAll(){
document.getElementById('input').value='';
document.getElementById('output').value='';
document.getElementById('preview').innerHTML='';
}
</script>
</body>
</html>
