<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML格式化工具 - Web Tools</title>
  <meta name="description" content="YAML在线格式化、压缩、语法高亮显示">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .yaml-layout {
      display: grid;
      gap: 24px;
    }
    @media (min-width: 768px) {
      .yaml-layout { grid-template-columns: 1fr 1fr; }
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .editor-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .editor-title .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .badge-success { background: #e8f5e9; color: #2e7d32; }
    .badge-error { background: #ffebee; color: #c62828; }
    .badge-info { background: #e3f2fd; color: #1565c0; }
    .editor-actions {
      display: flex;
      gap: 6px;
    }
    .editor-actions .btn {
      padding: 6px 12px;
      height: 32px;
      font-size: 12px;
    }

    /* 输入区 */
    .code-area {
      width: 100%;
      height: 500px;
      font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      tab-size: 2;
      background: #fff;
      color: #1e293b;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .code-area:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.1);
    }
    .code-area::placeholder {
      color: #94a3b8;
    }

    /* 输出区 - 语法高亮 */
    .output-area {
      width: 100%;
      height: 500px;
      font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: #f8fafc;
      white-space: pre;
      word-wrap: normal;
      overflow-wrap: normal;
      tab-size: 2;
      color: #1e293b;
    }
    .output-area:empty::before {
      content: '格式化结果将在这里显示...';
      color: #94a3b8;
      font-style: italic;
    }

    /* YAML 语法高亮颜色 */
    .yaml-key { color: #0550ae; font-weight: 500; }
    .yaml-string { color: #0a3069; }
    .yaml-number { color: #953800; }
    .yaml-boolean { color: #cf222e; font-weight: 600; }
    .yaml-comment { color: #6e7781; font-style: italic; }
    .yaml-anchor { color: #8250df; }
    .yaml-list { color: #6e7781; }
    .yaml-pipe { color: #6e7781; }
    .yaml-doc { color: #6e7781; }

    /* 行号 */
    .output-wrapper {
      position: relative;
    }
    .line-numbers {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      padding: 16px 8px 16px 0;
      text-align: right;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #94a3b8;
      background: #f1f5f9;
      border-right: 1px solid var(--border);
      border-radius: 10px 0 0 10px;
      overflow: hidden;
      user-select: none;
      white-space: pre;
    }
    .output-area.with-lines {
      margin-left: 49px;
      border-radius: 0 10px 10px 0;
    }

    /* 操作栏 */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .action-bar .spacer { flex: 1; }

    /* 统计信息 */
    .stats-bar {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .stats-bar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 暗黑模式语法颜色 */
    body.dark-mode .yaml-key { color: #79c0ff; }
    body.dark-mode .yaml-string { color: #a5d6ff; }
    body.dark-mode .yaml-number { color: #ffa657; }
    body.dark-mode .yaml-boolean { color: #ff7b72; }
    body.dark-mode .yaml-comment { color: #8b949e; }
    body.dark-mode .yaml-anchor { color: #d2a8ff; }
    body.dark-mode .yaml-list { color: #8b949e; }
    body.dark-mode .yaml-pipe { color: #8b949e; }
    body.dark-mode .yaml-doc { color: #8b949e; }
    body.dark-mode .output-area { background: #0d1117; color: #c9d1d9; }
    body.dark-mode .line-numbers { background: #161b22; border-color: #30363d; color: #484f58; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ Web Tools</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="tool-header">
      <div class="breadcrumb">
        <a href="../../index.html">首页</a> / YAML格式化工具
      </div>
      <h1>📄 YAML格式化工具</h1>
      <p style="color: var(--text-secondary); margin-top: 8px;">YAML格式化、压缩、语法高亮显示，支持大文件</p>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
      <button class="btn btn-primary" id="formatBtn">✨ 格式化</button>
      <button class="btn btn-secondary" id="compressBtn">📦 压缩</button>
      <select class="form-select" id="indentSelect" style="width:auto;height:40px;font-size:13px;padding:8px 32px 8px 12px;">
        <option value="2">2 空格</option>
        <option value="4">4 空格</option>
      </select>
      <div class="spacer"></div>
      <button class="btn btn-secondary" id="clearBtn">🗑️ 清空</button>
    </div>

    <!-- 提示消息 -->
    <div id="errorMessage" class="message message-error" style="display: none; margin-bottom: 16px;"></div>
    <div id="successMessage" class="message message-success" style="display: none; margin-bottom: 16px;"></div>

    <!-- 编辑器布局 -->
    <div class="yaml-layout">
      <!-- 输入 -->
      <div class="card" style="padding-bottom: 0;">
        <div class="editor-header">
          <span class="editor-title">
            📥 输入
            <span class="badge badge-info" id="inputSize"></span>
          </span>
          <div class="editor-actions">
            <button class="btn btn-secondary" id="pasteBtn">📋 粘贴</button>
          </div>
        </div>
        <textarea class="code-area" id="yamlInput" placeholder="在此粘贴或输入 YAML 文本...&#10;&#10;例如：&#10;name: test&#10;items:&#10;  - one&#10;  - two&#10;enabled: true"></textarea>
      </div>

      <!-- 输出 -->
      <div class="card" style="padding-bottom: 0;">
        <div class="editor-header">
          <span class="editor-title">
            📤 输出
            <span class="badge badge-success" id="outputInfo" style="display:none;"></span>
          </span>
          <div class="editor-actions">
            <button class="btn btn-secondary" id="copyBtn">📋 复制</button>
          </div>
        </div>
        <div class="output-wrapper">
          <div class="line-numbers" id="lineNumbers"></div>
          <div class="output-area with-lines" id="yamlOutput"></div>
        </div>
        <div class="stats-bar" id="statsBar" style="display:none;">
          <span>📊 行数: <strong id="statLines">0</strong></span>
          <span>📏 字符: <strong id="statChars">0</strong></span>
          <span>📦 大小: <strong id="statSize">0 B</strong></span>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Web Tools - 纯前端工具，数据安全</p>
    </div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function() {
      const yamlInput = document.getElementById('yamlInput');
      const yamlOutput = document.getElementById('yamlOutput');
      const lineNumbers = document.getElementById('lineNumbers');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const indentSelect = document.getElementById('indentSelect');
      const inputSize = document.getElementById('inputSize');
      const outputInfo = document.getElementById('outputInfo');
      const statsBar = document.getElementById('statsBar');

      function showMsg(el, type, text) {
        el.textContent = `${type === 'error' ? '❌' : '✅'} ${text}`;
        el.className = `message message-${type}`;
        el.style.display = 'flex';
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
      }

      function getIndent() {
        return parseInt(indentSelect.value);
      }

      function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      function updateLineNumbers(text) {
        const count = text.split('\n').length;
        const nums = [];
        for (let i = 1; i <= count; i++) nums.push(i);
        lineNumbers.textContent = nums.join('\n');
      }

      function updateStats(text) {
        const lines = text.split('\n').length;
        const chars = text.length;
        const bytes = new Blob([text]).size;
        document.getElementById('statLines').textContent = lines.toLocaleString();
        document.getElementById('statChars').textContent = chars.toLocaleString();
        document.getElementById('statSize').textContent = formatFileSize(bytes);
        statsBar.style.display = 'flex';
      }

      function updateInputSize() {
        const text = yamlInput.value;
        if (!text) {
          inputSize.style.display = 'none';
          return;
        }
        const size = new Blob([text]).size;
        inputSize.textContent = formatFileSize(size);
        inputSize.style.display = 'inline';
      }

      function setOutput(text, highlighted) {
        if (highlighted) {
          yamlOutput.innerHTML = highlighted;
        } else {
          yamlOutput.textContent = text;
        }
        updateLineNumbers(text);
        updateStats(text);
      }

      // YAML 语法高亮
      function highlightYAML(yaml) {
        // 大文件跳过高亮
        if (yaml.length > 500000) {
          return escapeHtml(yaml);
        }
        var lines = yaml.split('\n');
        var result = [];
        for (var i = 0; i < lines.length; i++) {
          result.push(highlightYAMLLine(lines[i]));
        }
        return result.join('\n');
      }

      function highlightYAMLLine(line) {
        var escaped = escapeHtml(line);

        // 文档分隔符
        if (/^\s*(---|\.\.\.)\s*$/.test(line)) {
          return '<span class="yaml-doc">' + escaped + '</span>';
        }

        // 注释
        if (/^\s*#/.test(line)) {
          return '<span class="yaml-comment">' + escaped + '</span>';
        }

        // 处理行内注释
        var commentIdx = -1;
        var inSingle = false, inDouble = false;
        for (var ci = 0; ci < line.length; ci++) {
          if (line[ci] === "'" && !inDouble) inSingle = !inSingle;
          if (line[ci] === '"' && !inSingle) inDouble = !inDouble;
          if (line[ci] === '#' && !inSingle && !inDouble) {
            commentIdx = ci;
            break;
          }
        }

        var mainPart = line;
        var commentPart = '';
        if (commentIdx > 0) {
          mainPart = line.substring(0, commentIdx);
          commentPart = line.substring(commentIdx);
        } else if (commentIdx === 0) {
          return '<span class="yaml-comment">' + escaped + '</span>';
        }

        // 对主部分进行高亮
        var highlighted = escapeHtml(mainPart);

        // 列表标记
        highlighted = highlighted.replace(/^(\s*)(- )/, function(m, sp, marker) {
          return sp + '<span class="yaml-list">' + marker + '</span>';
        });

        // 键:值
        highlighted = highlighted.replace(/^(\s*)([\w._/-]+(?:\[[^\]]*\])?)(\s*:\s*)(.*)/, function(m, sp, key, colon, value) {
          var h = sp + '<span class="yaml-key">' + key + '</span>' + colon;
          h += highlightYAMLValue(value);
          return h;
        });

        // 锚点 & 和 *
        highlighted = highlighted.replace(/(&amp;[\w._-]+)/g, '<span class="yaml-anchor">$1</span>');
        highlighted = highlighted.replace(/(\*[\w._-]+)/g, '<span class="yaml-anchor">$1</span>');

        // 管道/折叠标记
        highlighted = highlighted.replace(/(\|[-+]?\d*|&gt;[-+]?\d*)/, '<span class="yaml-pipe">$1</span>');

        // 添加注释部分
        if (commentPart) {
          highlighted += '<span class="yaml-comment">' + escapeHtml(commentPart) + '</span>';
        }

        return highlighted;
      }

      function highlightYAMLValue(value) {
        if (!value) return '';
        var v = value.trim();
        if (!v) return value;

        // 布尔值和null
        if (/^(true|false|yes|no|null|~)$/i.test(v)) {
          return '<span class="yaml-boolean">' + value + '</span>';
        }
        // 数字
        if (/^-?\d+\.?\d*([eE][+-]?\d+)?$/.test(v) || /^(0x[0-9a-fA-F]+|0o[0-7]+|0b[01]+)$/.test(v)) {
          return '<span class="yaml-number">' + value + '</span>';
        }
        // 字符串（带引号）
        if (/^["']/.test(v)) {
          return '<span class="yaml-string">' + value + '</span>';
        }
        // 普通值
        return value;
      }

      // YAML 格式化
      function parseYamlLines(text) {
        var lines = text.split('\n');
        var result = [];
        var i = 0;
        while (i < lines.length) {
          var line = lines[i];
          var blockMatch = line.match(/^(\s*)([\w._-]+(?:\[.*?\])?:(?:\s*#.*)?)\s*[|>][-+]?\s*\d*\s*(#.*)?$/);
          if (blockMatch) {
            var keyLine = line;
            var baseIndent = blockMatch[1].length;
            result.push(keyLine);
            i++;
            while (i < lines.length) {
              var nextLine = lines[i];
              var trimmed = nextLine.replace(/\s*$/, '');
              if (trimmed === '') {
                result.push(nextLine);
                i++;
                continue;
              }
              var nextIndent = nextLine.search(/\S/);
              if (nextIndent > baseIndent) {
                result.push(nextLine);
                i++;
              } else {
                break;
              }
            }
          } else {
            result.push(line);
            i++;
          }
        }
        return result;
      }

      function isInsideQuotes(str, idx) {
        var inSingle = false, inDouble = false;
        for (var i = 0; i < idx; i++) {
          if (str[i] === "'" && !inDouble) inSingle = !inSingle;
          if (str[i] === '"' && !inSingle) inDouble = !inDouble;
        }
        return inSingle || inDouble;
      }

      function repeatStr(ch, n) {
        var s = '';
        for (var i = 0; i < n; i++) s += ch;
        return s;
      }

      function beautifyYaml() {
        var input = yamlInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入YAML内容');
          return;
        }
        var indentSize = getIndent();
        var lines = parseYamlLines(input);
        var output = [];
        var indentLevel = 0;

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var trimmed = line.replace(/\s+$/, '');
          var leadingSpaces = line.search(/\S/);
          if (leadingSpaces === -1) {
            output.push('');
            continue;
          }

          if (trimmed.match(/^\s*#/)) {
            output.push(trimmed);
            continue;
          }

          var listMatch = trimmed.match(/^(\s*)-\s+(.+)$/);
          var keyMatch = trimmed.match(/^(\s*)([\w._-]+(?:\[.*?\])?):\s*(.*)$/);

          if (keyMatch) {
            var key = keyMatch[2];
            var value = keyMatch[3].trim();
            var comment = '';
            var commentIdx = value.indexOf('#');
            if (commentIdx > -1 && !isInsideQuotes(value, commentIdx)) {
              comment = ' ' + value.substring(commentIdx);
              value = value.substring(0, commentIdx).trim();
            }
            if (value === '' || value === '|' || value === '>' || value.match(/^[|>][-+]?\d*$/)) {
              indentLevel = Math.round(leadingSpaces / 2);
              output.push(repeatStr(' ', indentLevel * indentSize) + key + ':' + (value ? ' ' + value : '') + comment);
            } else {
              output.push(repeatStr(' ', indentLevel * indentSize) + key + ': ' + value + comment);
            }
          } else if (listMatch) {
            var content = listMatch[2];
            var kvMatch = content.match(/^([\w._-]+):\s*(.*)$/);
            if (kvMatch) {
              indentLevel = Math.round(leadingSpaces / 2);
              output.push(repeatStr(' ', indentLevel * indentSize) + '- ' + kvMatch[1] + ': ' + kvMatch[2]);
            } else {
              indentLevel = Math.round(leadingSpaces / 2);
              output.push(repeatStr(' ', indentLevel * indentSize) + '- ' + content);
            }
          } else {
            indentLevel = Math.max(0, Math.round(leadingSpaces / 2));
            output.push(repeatStr(' ', indentLevel * indentSize) + trimmed.trimStart());
          }
        }

        var cleaned = output.join('\n').replace(/\n{3,}/g, '\n\n').trim();
        const highlighted = highlightYAML(cleaned);
        setOutput(cleaned, highlighted);
        outputInfo.textContent = '✅ 格式化成功';
        outputInfo.className = 'badge badge-success';
        outputInfo.style.display = 'inline';
        showMsg(successMessage, 'success', 'YAML格式化成功');
      }

      function compressYaml() {
        var input = yamlInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入YAML内容');
          return;
        }
        var lines = input.split('\n');
        var output = [];
        var prevBlank = false;

        for (var i = 0; i < lines.length; i++) {
          var trimmed = lines[i].replace(/\s+$/, '');
          if (trimmed.trim() === '') {
            if (!prevBlank) {
              prevBlank = true;
              output.push('');
            }
            continue;
          }
          prevBlank = false;
          output.push(trimmed);
        }

        var result = output.join('\n').trim();
        result = result.replace(/\n\s*\n/g, '\n');
        setOutput(result, null);
        showMsg(successMessage, 'success', `YAML压缩成功 (${formatFileSize(result.length)})`);
      }

      // 事件绑定
      document.getElementById('formatBtn').addEventListener('click', beautifyYaml);
      document.getElementById('compressBtn').addEventListener('click', compressYaml);

      document.getElementById('clearBtn').addEventListener('click', () => {
        yamlInput.value = '';
        yamlOutput.innerHTML = '';
        lineNumbers.textContent = '';
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
        statsBar.style.display = 'none';
        outputInfo.style.display = 'none';
        inputSize.style.display = 'none';
      });

      document.getElementById('copyBtn').addEventListener('click', () => {
        const text = yamlOutput.textContent;
        if (!text) {
          showMsg(errorMessage, 'error', '输出为空，无法复制');
          return;
        }
        copyToClipboard(text);
        showMsg(successMessage, 'success', '已复制到剪贴板');
      });

      document.getElementById('pasteBtn').addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          yamlInput.value = text;
          updateInputSize();
          showMsg(successMessage, 'success', '已粘贴');
        } catch (err) {
          showMsg(errorMessage, 'error', '无法读取剪贴板内容');
        }
      });

      // 快捷键
      yamlInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          beautifyYaml();
        }
        // Tab 缩进
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = yamlInput.selectionStart;
          const end = yamlInput.selectionEnd;
          yamlInput.value = yamlInput.value.substring(0, start) + '  ' + yamlInput.value.substring(end);
          yamlInput.selectionStart = yamlInput.selectionEnd = start + 2;
        }
      });

      // 实时显示输入大小
      yamlInput.addEventListener('input', updateInputSize);
    })();
  </script>
</body>
