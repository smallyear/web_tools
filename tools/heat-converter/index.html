<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热量换算器 - 在线工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.input-row { display: flex; gap: 16px; align-items: end; margin-bottom: 24px; flex-wrap: wrap; }
.input-row .form-group { flex: 1; min-width: 150px; }
.result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.result-card {
  background: var(--bg); border-radius: 8px; padding: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.result-card .info { flex: 1; min-width: 0; }
.result-card .label { color: var(--text-secondary); font-size: 13px; }
.result-card .value { font-weight: 600; font-size: 16px; color: var(--primary-dark); word-break: break-all; margin-top: 2px; }
.copy-btn {
  background: none; border: none; cursor: pointer; font-size: 18px;
  padding: 4px 8px; opacity: .6; transition: opacity .2s; flex-shrink: 0;
}
.copy-btn:hover { opacity: 1; }
.result-card.highlight { border: 2px solid var(--primary); background: #f0f7ff; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="../../index.html" class="navbar-brand">🛠️ 在线工具箱</a>
    <div class="navbar-links">
      <a href="../../index.html" class="navbar-link">首页</a>
    </div>
  </div>
</nav>

<div class="main-wrapper">
  <div class="container">
    <div style="margin-bottom:20px;font-size:14px;color:var(--text-secondary);">
      <a href="../../index.html" style="color:var(--primary);text-decoration:none;">首页</a>
      <span style="margin:0 8px;">›</span>
      <span>热量换算器</span>
    </div>

    <div style="margin-bottom:24px;">
      <h1 style="font-size:28px;color:var(--primary-dark);margin-bottom:8px;">🔥 热量换算器</h1>
      <p style="color:var(--text-secondary);">快速换算焦耳、卡路里、千瓦时、BTU 等热量单位，实时显示结果</p>
    </div>

    <div class="card">
      <div class="input-row">
        <div class="form-group">
          <label class="form-label">数值</label>
          <input type="number" id="inputValue" class="form-input" value="1" oninput="convert()">
        </div>
        <div class="form-group">
          <label class="form-label">单位</label>
          <select id="inputUnit" class="form-select" onchange="convert()">
            <option value="J">焦耳 (J)</option>
            <option value="kJ">千焦 (kJ)</option>
            <option value="cal">卡路里 (cal)</option>
            <option value="kcal">千卡 (kcal)</option>
            <option value="kWh">千瓦时 (kWh)</option>
            <option value="BTU">英热单位 (BTU)</option>
          </select>
        </div>
      </div>

      <div class="result-grid" id="results"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-container">
    <p>© 2024 在线工具箱 - 免费、实用的在线工具集合</p>
  </div>
</footer>

<script src="../../assets/js/common.js"></script>
<script>
// 以焦耳(J)为基准的换算系数
var units = {
  J:   { name: '焦耳',    symbol: 'J',   factor: 1 },
  kJ:  { name: '千焦',    symbol: 'kJ',  factor: 1000 },
  cal: { name: '卡路里',  symbol: 'cal', factor: 4.184 },
  kcal:{ name: '千卡',    symbol: 'kcal',factor: 4184 },
  kWh: { name: '千瓦时',  symbol: 'kWh', factor: 3600000 },
  BTU: { name: '英热单位',symbol: 'BTU', factor: 1055.05585 }
};

function convert() {
  var val = parseFloat(document.getElementById('inputValue').value);
  var from = document.getElementById('inputUnit').value;
  var grid = document.getElementById('results');

  if (isNaN(val)) { grid.innerHTML = ''; return; }

  var joules = val * units[from].factor;
  var html = '';

  for (var key in units) {
    if (!units.hasOwnProperty(key)) continue;
    var u = units[key];
    var result = joules / u.factor;
    var display = result === 0 ? '0' : (Math.abs(result) < 0.000001 || Math.abs(result) >= 1e12 ? result.toExponential(6) : parseFloat(result.toPrecision(10)).toString());
    var isCurrent = key === from;
    html += '<div class="result-card' + (isCurrent ? ' highlight' : '') + '">';
    html += '  <div class="info">';
    html += '    <div class="label">' + u.name + ' (' + u.symbol + ')</div>';
    html += '    <div class="value">' + display + '</div>';
    html += '  </div>';
    html += '  <button class="copy-btn" onclick="copyVal(\'' + display + '\', this)" title="复制">📋</button>';
    html += '</div>';
  }

  grid.innerHTML = html;
}

function copyVal(text, btn) {
  copyToClipboard(text);
  var orig = btn.textContent;
  btn.textContent = '✅';
  btn.style.opacity = '1';
  setTimeout(function() { btn.textContent = orig; btn.style.opacity = ''; }, 1200);
}

convert();
</script>
</body>
</html>
