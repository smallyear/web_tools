    const Zhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const Animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
    const lunarMonthName = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
    const lunarDayName = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
      '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
      '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    const zodiacEmoji = ['🐭','🐮','🐯','🐰','🐲','🐍','🐴','🐑','🐵','🐔','🐶','🐷'];

    // 获取农历某年的总天数
    function lYearDays(y) {
      let sum = 348;
      for (let i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
      return sum + leapDays(y);
    }

    // 获取农历某年闰月的天数
    function leapDays(y) {
      if (leapMonth(y)) return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29;
      return 0;
    }

    // 获取农历某年闰哪个月 (0表示无闰月)
    function leapMonth(y) { return lunarInfo[y - 1900] & 0xf; }

    // 获取农历某年某月的天数
    function monthDays(y, m) {
      return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
    }

    // 公历转农历
    function solar2lunar(sy, sm, sd) {
      if (sy < 1900 || sy > 2100) return null;
      const baseDate = new Date(1900, 0, 31);
      const objDate = new Date(sy, sm - 1, sd);
      let offset = Math.floor((objDate - baseDate) / 86400000);

      let y = 1900, m, d;
      for (y = 1900; y < 2101 && offset > 0; y++) {
        let daysInYear = lYearDays(y);
        offset -= daysInYear;
      }
      if (offset < 0) { offset += lYearDays(--y); }

      let leap = leapMonth(y);
      let isLeap = false;

      for (m = 1; m < 13 && offset > 0; m++) {
        if (leap > 0 && m === (leap + 1) && !isLeap) { --m; isLeap = true; let daysInMonth = leapDays(y); offset -= daysInMonth; }
        else { let daysInMonth = monthDays(y, m); offset -= daysInMonth; }
        if (isLeap && m === (leap + 1)) isLeap = false;
      }
      if (offset === 0 && leap > 0 && m === leap + 1) { if (isLeap) isLeap = false; else { isLeap = true; --m; } }
      if (offset < 0) { offset += isLeap ? leapDays(y) : monthDays(y, m); --m; }
      d = offset + 1;

      // 天干地支
      const ganIndex = (y - 4) % 10;
      const zhiIndex = (y - 4) % 12;

      return {
        lYear: y,
        lMonth: m,
        lDay: d,
        isLeap: isLeap,
        ganZhiYear: Gan[ganIndex] + Zhi[zhiIndex],
        animal: Animals[zhiIndex],
        animalEmoji: zodiacEmoji[zhiIndex],
        monthName: (isLeap ? '闰' : '') + lunarMonthName[m - 1] + '月',
        dayName: lunarDayName[d - 1]
      };
    }

    function convert() {
      const dateStr = document.getElementById('solarDate').value;
      if (!dateStr) { showMessage('error', '请选择日期'); return; }
      const parts = dateStr.split('-');
      const sy = parseInt(parts[0]), sm = parseInt(parts[1]), sd = parseInt(parts[2]);

      const result = solar2lunar(sy, sm, sd);
      if (!result) { showMessage('error', '日期超出范围(1900-2100)'); return; }

      const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      const d = new Date(sy, sm - 1, sd);

      document.getElementById('zodiacEmoji').textContent = result.animalEmoji;
      document.getElementById('lunarDate').textContent = result.ganZhiYear + '年 ' + result.monthName + result.dayName;
      document.getElementById('ganzhiYear').textContent = result.ganZhiYear + '年';
      document.getElementById('shengxiao').textContent = result.animal + '年';
      document.getElementById('lunarMonth').textContent = result.monthName;
      document.getElementById('lunarDay').textContent = result.dayName;
      document.getElementById('jieqi').textContent = '-';
      document.getElementById('weekday').textContent = weekdays[d.getDay()];
      document.getElementById('resultSection').style.display = 'block';
    }

    // 默认今天
    const today = new Date();
    document.getElementById('solarDate').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    convert();
