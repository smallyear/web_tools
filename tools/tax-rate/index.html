<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税金税率计算器 - 在线工具箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;line-height:1.6}
.navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.navbar a{color:#fff;text-decoration:none;font-weight:600;font-size:18px}
.navbar a:hover{opacity:.9}
.breadcrumb{padding:12px 20px;font-size:14px;color:#666;max-width:800px;margin:0 auto}
.breadcrumb a{color:#667eea;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.container{max-width:800px;margin:0 auto;padding:0 20px 40px}
.tool-header{text-align:center;padding:20px 0 30px}
.tool-header h1{font-size:28px;color:#333;margin-bottom:8px}
.tool-header p{color:#888;font-size:15px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.tabs{display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:2px solid #667eea}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;background:#fff;color:#667eea;transition:all .2s}
.tab.active{background:#667eea;color:#fff}
.tab:hover:not(.active){background:#f0f0ff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;color:#444;font-size:14px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#667eea}
.row{display:flex;gap:16px}
.row .form-group{flex:1}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;width:100%;padding:12px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-copy{background:#f0f0ff;color:#667eea;border:2px solid #667eea;font-size:13px;padding:6px 16px;margin-top:10px}
.btn-copy:hover{background:#667eea;color:#fff}
.result-box{background:#f8f9ff;border:2px solid #e8e8ff;border-radius:10px;padding:20px;margin-top:16px;display:none}
.result-box.show{display:block}
.result-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e0e0e0;font-size:15px}
.result-item:last-child{border-bottom:none}
.result-item .label{color:#666}
.result-item .value{font-weight:700;color:#333;font-size:16px}
.result-item .value.highlight{color:#667eea;font-size:18px}
.formula{background:#fff8e6;border-radius:8px;padding:12px 16px;margin-top:12px;font-size:13px;color:#8a6d3b;line-height:1.8}
.formula strong{color:#b8860b}
.toggle-mode{display:flex;gap:10px;margin-bottom:16px}
.toggle-btn{flex:1;padding:10px;border:2px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#666;transition:all .2s;text-align:center}
.toggle-btn.active{border-color:#667eea;background:#f0f0ff;color:#667eea}
footer{text-align:center;padding:30px 20px;color:#999;font-size:13px;border-top:1px solid #eee;margin-top:20px}
@media(max-width:600px){.row{flex-direction:column;gap:0}.container{padding:0 12px 30px}.tool-header h1{font-size:22px}.card{padding:16px}}
</style>
</head>
<body>
<nav class="navbar"><a href="../../index.html">🧰 在线工具箱</a><span style="color:#ddd;font-size:13px">税金税率计算器</span></nav>
<div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <a href="../../index.html">工具列表</a> &gt; 税金税率计算器</div>
<div class="container">
<div class="tool-header"><h1>💰 税金税率计算器</h1><p>支持增值税计算和个税速算</p></div>
<div class="card">
<div class="tabs"><div class="tab active" onclick="switchTab('vat')">增值税计算</div><div class="tab" onclick="switchTab('income')">个税速算</div></div>
<!-- 增值税 -->
<div id="vat-panel">
<div class="toggle-mode">
<div class="toggle-btn active" onclick="setVatMode('taxed')">含税金额 → 不含税金额</div>
<div class="toggle-btn" onclick="setVatMode('untaxed')">不含税金额 → 含税金额</div>
</div>
<div class="form-group">
<label>金额（元）</label>
<input type="number" id="vat-amount" placeholder="请输入金额" step="0.01" oninput="calcVat()">
</div>
<div class="form-group">
<label>增值税税率</label>
<select id="vat-rate" onchange="calcVat()">
<option value="13">13%（一般货物）</option>
<option value="9">9%（交通运输/建筑/农产品）</option>
<option value="6">6%（现代服务/金融）</option>
<option value="3">3%（小规模纳税人）</option>
<option value="1">1%（小规模优惠）</option>
<option value="0.5">0.5%（二手车经销）</option>
</select>
</div>
<button class="btn btn-primary" onclick="calcVat()">计算</button>
<div class="result-box" id="vat-result">
<div class="result-item"><span class="label">不含税金额</span><span class="value highlight" id="r-untaxed">-</span></div>
<div class="result-item"><span class="label">增值税税额</span><span class="value" id="r-tax">-</span></div>
<div class="result-item"><span class="label">价税合计</span><span class="value highlight" id="r-total">-</span></div>
<div class="formula" id="vat-formula"></div>
<button class="btn btn-copy" onclick="copyVatResult()">📋 复制结果</button>
</div>
</div>
<!-- 个税 -->
<div id="income-panel" style="display:none">
<div class="form-group">
<label>月收入（元）</label>
<input type="number" id="income-amount" placeholder="请输入税前月收入" step="0.01" oninput="calcIncome()">
</div>
<div class="form-group">
<label>五险一金（元/月）</label>
<input type="number" id="income-insurance" placeholder="每月五险一金扣除" value="0" step="0.01" oninput="calcIncome()">
</div>
<div class="form-group">
<label>专项附加扣除（元/月）</label>
<input type="number" id="income-special" placeholder="子女教育/房贷等" value="0" step="0.01" oninput="calcIncome()">
</div>
<button class="btn btn-primary" onclick="calcIncome()">计算</button>
<div class="result-box" id="income-result">
<div class="result-item"><span class="label">应纳税所得额（月）</span><span class="value" id="r-taxable">-</span></div>
<div class="result-item"><span class="label">适用税率</span><span class="value" id="r-rate">-</span></div>
<div class="result-item"><span class="label">速算扣除数</span><span class="value" id="r-quick">-</span></div>
<div class="result-item"><span class="label">月应缴个税</span><span class="value highlight" id="r-monthly-tax">-</span></div>
<div class="result-item"><span class="label">税后月收入</span><span class="value highlight" id="r-after-tax">-</span></div>
<div class="formula" id="income-formula"></div>
<button class="btn btn-copy" onclick="copyIncomeResult()">📋 复制结果</button>
</div>
</div>
</div>
</div>
<footer>在线工具箱 &copy; 2026 | 所有计算仅供参考</footer>
<script>
let vatMode='taxed';
function switchTab(t){
document.querySelectorAll('.tab').forEach((e,i)=>{e.classList.toggle('active',t==='vat'?i===0:i===1)});
document.getElementById('vat-panel').style.display=t==='vat'?'':'none';
document.getElementById('income-panel').style.display=t==='income'?'':'none';
}
function setVatMode(m){
vatMode=m;
document.querySelectorAll('.toggle-btn').forEach((e,i)=>{e.classList.toggle('active',m==='taxed'?i===0:i===1)});
document.querySelector('#vat-panel .form-group label').textContent=m==='taxed'?'含税金额（元）':'不含税金额（元）';
calcVat();
}
function fmt(n){return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function calcVat(){
const a=parseFloat(document.getElementById('vat-amount').value);
const r=parseFloat(document.getElementById('vat-rate').value);
if(isNaN(a)||a<=0)return;
const box=document.getElementById('vat-result');
let untaxed,tax,total;
if(vatMode==='taxed'){
untaxed=a/(1+r/100);tax=a-untaxed;total=a;
}else{
untaxed=a;tax=a*r/100;total=a+tax;
}
document.getElementById('r-untaxed').textContent='¥'+fmt(untaxed);
document.getElementById('r-tax').textContent='¥'+fmt(tax);
document.getElementById('r-total').textContent='¥'+fmt(total);
document.getElementById('vat-formula').innerHTML=vatMode==='taxed'
?`<strong>公式：</strong>不含税金额 = 含税金额 ÷ (1 + 税率)<br>= ${fmt(a)} ÷ (1 + ${r}%) = <strong>${fmt(untaxed)}</strong><br>税额 = 含税金额 - 不含税金额 = ${fmt(a)} - ${fmt(untaxed)} = <strong>${fmt(tax)}</strong>`
:`<strong>公式：</strong>税额 = 不含税金额 × 税率 = ${fmt(a)} × ${r}% = <strong>${fmt(tax)}</strong><br>价税合计 = 不含税金额 + 税额 = ${fmt(a)} + ${fmt(tax)} = <strong>${fmt(total)}</strong>`;
box.classList.add('show');
}
const brackets=[[36000,3,0],[144000,10,2520],[300000,20,16920],[420000,25,31920],[660000,30,52920],[960000,35,85920],[Infinity,45,181920]];
function calcIncome(){
const m=parseFloat(document.getElementById('income-amount').value);
const ins=parseFloat(document.getElementById('income-insurance').value)||0;
const sp=parseFloat(document.getElementById('income-special').value)||0;
if(isNaN(m)||m<=0)return;
const taxable=m-ins-sp-5000;
let rate=0,qd=0,info='';
if(taxable<=0){info='无需缴税';rate=0;qd=0}
else{for(const[limit,r,q]of brackets){if(taxable<=limit){rate=r;qd=q;info=`第${brackets.indexOf([limit,r,q])+1}级`;break}}}
const tax=Math.max(0,taxable*rate/100-qd);
const after=m-tax;
document.getElementById('r-taxable').textContent='¥'+fmt(taxable);
document.getElementById('r-rate').textContent=rate+'%';
document.getElementById('r-quick').textContent='¥'+fmt(qd);
document.getElementById('r-monthly-tax').textContent='¥'+fmt(tax);
document.getElementById('r-after-tax').textContent='¥'+fmt(after);
document.getElementById('income-formula').innerHTML=`<strong>公式：</strong>应纳税所得额 = 月收入 - 五险一金 - 专项附加扣除 - 5000(起征点)<br>= ${fmt(m)} - ${fmt(ins)} - ${fmt(sp)} - 5000 = <strong>${fmt(taxable)}</strong><br>个税 = 应纳税所得额 × ${rate}% - 速算扣除数${fmt(qd)} = <strong>${fmt(tax)}</strong><br><em>7级超额累进税率，${info}</em>`;
document.getElementById('income-result').classList.add('show');
}
function copyVatResult(){
const t=`增值税计算结果\n不含税金额：${document.getElementById('r-untaxed').textContent}\n税额：${document.getElementById('r-tax').textContent}\n价税合计：${document.getElementById('r-total').textContent}`;
if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>showMsg('已复制'));
}
function copyIncomeResult(){
const t=`个税计算结果\n应纳税所得额：${document.getElementById('r-taxable').textContent}\n适用税率：${document.getElementById('r-rate').textContent}\n月应缴个税：${document.getElementById('r-monthly-tax').textContent}\n税后月收入：${document.getElementById('r-after-tax').textContent}`;
if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>showMsg('已复制'));
}
function showMsg(m){const d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;z-index:999;font-size:14px';document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
</script>
</body>
</html>
