<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片裁剪工具 - Web Tools</title>
  <meta name="description" content="在线图片裁剪，支持多种证件照尺寸，纯前端处理，保护隐私">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .cropper-layout {
      display: grid;
      gap: 24px;
    }

    @media (min-width: 900px) {
      .cropper-layout {
        grid-template-columns: 1fr 280px;
      }

      .sidebar-sticky {
        position: sticky;
        top: 24px;
        align-self: start;
      }
    }

    /* 上传区域 */
    .upload-area-large {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 60px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #FAFAFA;
    }

    .upload-area-large:hover,
    .upload-area-large.dragover {
      border-color: var(--primary);
      background: #F0F7FF;
    }

    .upload-icon-large {
      font-size: 72px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .upload-text-large {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .upload-hint-large {
      font-size: 14px;
      color: var(--text-secondary);
    }

    #fileInput {
      display: none;
    }

    /* 预览区域 */
    .preview-container {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .image-work-area {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .canvas-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      background: repeating-conic-gradient(#e0e0e0 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
      border-radius: 10px;
      overflow: hidden;
      user-select: none;
    }

    .canvas-wrapper canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* 侧边栏 */
    .sidebar-section {
      background: white;
      border-radius: 10px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary-light);
    }

    .size-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .size-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 13px;
      background: #fafafa;
    }

    .size-option:hover {
      border-color: var(--primary-light);
      background: #f0f7ff;
    }

    .size-option.active {
      border-color: var(--primary);
      background: #e3f2fd;
      font-weight: 600;
    }

    .size-option .size-name {
      color: var(--text);
    }

    .size-option .size-px {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 400;
    }

    .size-option.active .size-px {
      color: var(--primary-dark);
    }

    /* 控制区 */
    .controls-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-group-vertical {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (min-width: 768px) {
      .btn-group-vertical {
        flex-direction: row;
      }
    }

    /* 裁剪框信息 */
    .crop-info {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    /* 快捷提示 */
    .tip-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* 禁用状态 */
    .disabled-tip {
      text-align: center;
      padding: 30px;
      color: var(--text-secondary);
      font-size: 14px;
      background: #f9f9f9;
      border-radius: 10px;
    }

    /* 格式徽章 */
    .format-badge {
      display: inline-block;
      padding: 4px 8px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 8px;
    }

    /* 隐藏元素 */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">✂️ 图片裁剪</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div class="cropper-layout">
        <!-- 左侧：上传 + 画布 -->
        <div>
          <!-- 上传区域 -->
          <div class="upload-area-large" id="uploadArea">
            <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp">
            <div class="upload-icon-large">📷</div>
            <div class="upload-text-large">点击或拖拽上传图片</div>
            <div class="upload-hint-large">支持 JPG、PNG、WebP 格式，最大 20MB</div>
          </div>

          <!-- 裁剪预览区 -->
          <div class="preview-container" id="previewContainer">
            <div class="image-work-area">
              <canvas id="mainCanvas"></canvas>
            </div>
            <div class="btn-group-vertical" style="margin-top:16px; justify-content:center;">
              <button class="btn btn-danger" id="resetBtn">🔄 重新选择图片</button>
            </div>
          </div>
        </div>

        <!-- 右侧：尺寸选择 + 操作按钮 -->
        <div class="sidebar-sticky">
          <!-- 尺寸选择 -->
          <div class="sidebar-section">
            <div class="sidebar-title">📐 导出尺寸</div>
            <div class="size-grid" id="sizeGrid">
              <!-- JS 填充 -->
            </div>
            <div class="tip-text">💡 选择尺寸后，拖动画布上的虚线框调整裁剪位置</div>
          </div>

          <!-- 当前信息 -->
          <div class="sidebar-section hidden" id="infoSection">
            <div class="sidebar-title">ℹ️ 裁剪信息</div>
            <div class="crop-info" id="cropInfo"></div>
          </div>

          <!-- 操作按钮 -->
          <div class="sidebar-section">
            <div class="sidebar-title">⚡ 操作</div>
            <div class="btn-group-vertical">
              <button class="btn btn-primary" id="cropBtn" disabled>✂️ 裁剪并下载</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 消息提示容器 -->
  <div id="messageContainer"></div>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function () {
      // === 数据 ===
      const SIZES = [
        { id: 'passport',       name: '小一寸',  mm: '25×35 mm', px: '295×413 px', w: 295,  h: 413  },
        { id: 'large-passport',  name: '大一寸',  mm: '22×32 mm', px: '260×378 px', w: 260,  h: 378  },
        { id: 'two-inch',        name: '二寸',    mm: '33×48 mm', px: '390×567 px', w: 390,  h: 567  },
        { id: 'small-two-inch',  name: '小二寸',  mm: '35×49 mm', px: '413×579 px', w: 413,  h: 579  },
        { id: 'large-two-inch',  name: '大二寸',  mm: '35×45 mm', px: '413×531 px', w: 413,  h: 531  },
        { id: 'three-inch',      name: '三寸',    mm: '35×53 mm', px: '413×625 px', w: 413,  h: 625  },
        { id: 'four-inch',       name: '四寸',    mm: '54×84 mm', px: '637×992 px', w: 637,  h: 992  },
        { id: 'five-inch',       name: '五寸',    mm: '76×102 mm',px: '897×1204px', w: 897,  h: 1204 },
        { id: 'six-inch',        name: '六寸',    mm: '89×127 mm',px: '1051×1500px',w: 1051, h: 1500 },
      ];

      const MAX_DISPLAY_SIZE = 800; // 画布显示最大尺寸，确保交互流畅

      // === 状态 ===
      let originalFile    = null;
      let originalImage   = null;
      let selectedSizeIdx = 0;

      // 裁剪框
      let cropX = 0, cropY = 0, cropW = 0, cropH = 0;

      // 拖拽状态
      let dragging      = false;
      let dragCorner     = null; // 'tl','tr','bl','br','top','bottom','left','right'
      let dragStartX    = 0;
      let dragStartY    = 0;
      let boxStartX     = 0;
      let boxStartY     = 0;
      let boxStartW     = 0;
      let boxStartH     = 0;

      // === DOM ===
      const uploadArea      = document.getElementById('uploadArea');
      const fileInput       = document.getElementById('fileInput');
      const previewContainer= document.getElementById('previewContainer');
      const mainCanvas      = document.getElementById('mainCanvas');
      const ctx             = mainCanvas.getContext('2d');
      const sizeGrid        = document.getElementById('sizeGrid');
      const infoSection     = document.getElementById('infoSection');
      const cropInfo        = document.getElementById('cropInfo');
      const cropBtn         = document.getElementById('cropBtn');
      const resetBtn        = document.getElementById('resetBtn');

      // === 初始化 ===
      initDropArea(uploadArea, () => fileInput.click());
      fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));
      cropBtn.addEventListener('click', cropAndDownload);
      resetBtn.addEventListener('click', resetAll);

      // 构建尺寸选择器
      buildSizeGrid();
      // 初始只使第一个尺寸 active
      selectSize(0);

      // === 文件处理 ===
      function handleFileSelect(file) {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          showMessage('error', '请选择图片文件');
          return;
        }
        if (file.size > 20 * 1024 * 1024) {
          showMessage('error', '图片大小不能超过 20MB');
          return;
        }

        originalFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            originalImage = img;
            uploadArea.style.display = 'none';
            previewContainer.style.display = 'block';
            try {
                resizeCanvas();
                initCropBox();
                draw();
                infoSection.classList.remove('hidden');
                cropBtn.disabled = false;
                showMessage('success', '图片加载完成，拖动虚线框调整裁剪区域');
            } catch (e) {
                console.error('绘图初始化失败:', e);
                showMessage('error', '图片加载失败: ' + e.message);
                resetAll();
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function resetAll() {
        originalFile = null;
        originalImage = null;
        fileInput.value = '';
        uploadArea.style.display = 'block';
        previewContainer.style.display = 'none';
        infoSection.classList.add('hidden');
        cropBtn.disabled = true;
        dragging = false;
        dragCorner = null;
        showMessage('info', '请选择要裁剪的图片');
      }

      // === 尺寸网格 ===
      function buildSizeGrid() {
        sizeGrid.innerHTML = '';
        SIZES.forEach((s, i) => {
          const div = document.createElement('div');
          div.className = 'size-option';
          div.innerHTML = `
            <span class="size-name">${s.name}</span>
            <span class="size-px">${s.px}</span>
          `;
          div.addEventListener('click', () => selectSize(i));
          sizeGrid.appendChild(div);
        });
      }

      function selectSize(idx) {
        selectedSizeIdx = idx;
        document.querySelectorAll('.size-option').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
        if (originalImage) {
          initCropBox();
          draw();
        }
      }

      // === 画布 ===
      function resizeCanvas() {
        if (!originalImage) return;

        const maxW = Math.min(originalImage.width, MAX_DISPLAY_SIZE);
        const maxH = Math.min(originalImage.height, MAX_DISPLAY_SIZE);
        const scale = Math.min(maxW / originalImage.width, maxH / originalImage.height);

        mainCanvas.width  = originalImage.width * scale;
        mainCanvas.height = originalImage.height * scale;

        // 保存缩放比，坐标转换用
        mainCanvas._scale = scale;
      }

      function initCropBox() {
        if (!originalImage) return;

        const s = SIZES[selectedSizeIdx];
        const scale = mainCanvas._scale || 1;

        const displayW = mainCanvas.width;
        const displayH = mainCanvas.height;
        const imgRatio = (originalImage.width * scale) / (originalImage.height * scale);
        const targetRatio = s.w / s.h;

        let boxW, boxH;
        if (targetRatio > imgRatio) {
          boxW = displayW;
          boxH = displayW / targetRatio;
        } else {
          boxH = displayH;
          boxW = displayH * targetRatio;
        }

        cropW = Math.min(displayW, boxW);
        cropH = Math.min(displayH, boxH);
        cropX = (displayW - cropW) / 2;
        cropY = (displayH - cropH) / 2;
      }

      // === 绘制 ===
      function draw() {
        if (!originalImage) return;

        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

        // 绘制原图
        ctx.drawImage(originalImage, 0, 0, mainCanvas.width, mainCanvas.height);

        // 半透明遮罩
        const scale = mainCanvas._scale || 1;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

        // 清除裁剪区域（显示原图）
        ctx.drawImage(
          originalImage,
          cropX / scale, cropY / scale,
          cropW / scale, cropH / scale,
          cropX, cropY,
          cropW, cropH
        );

        // 绘制虚线边框
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(cropX, cropY, cropW, cropH);

        // 外发光边框
        ctx.strokeStyle = '#1E88E5';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(cropX, cropY, cropW, cropH);
        ctx.setLineDash([]);

        // 三分线
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 0.8;
        ctx.setLineDash([4, 6]);
        // 竖
        for (let i = 1; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(cropX + (cropW * i / 3), cropY);
          ctx.lineTo(cropX + (cropW * i / 3), cropY + cropH);
          ctx.stroke();
        }
        // 横
        for (let i = 1; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(cropX, cropY + (cropH * i / 3));
          ctx.lineTo(cropX + cropW, cropY + (cropH * i / 3));
          ctx.stroke();
        }
        ctx.setLineDash([]);

        // 角落控制手柄
        const handleSize = 12;
        ctx.fillStyle = '#1E88E5';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;

        const corners = [
          [cropX, cropY],
          [cropX + cropW, cropY],
          [cropX, cropY + cropH],
          [cropX + cropW, cropY + cropH],
        ];
        corners.forEach(([cx, cy]) => {
          ctx.fillRect(cx - handleSize / 2, cy - handleSize / 2, handleSize, handleSize);
          ctx.strokeRect(cx - handleSize / 2, cy - handleSize / 2, handleSize, handleSize);
        });

        // 更新信息
        updateCropInfo();
      }

      function updateCropInfo() {
        const scale = mainCanvas._scale || 1;
        const realW  = Math.round(cropW / scale);
        const realH  = Math.round(cropH / scale);
        const s      = SIZES[selectedSizeIdx];

        cropInfo.innerHTML = `
          <span class="info-chip">尺寸 ${realW}×${realH} px</span>
          <span class="info-chip">目标 ${s.w}×${s.h} px</span>
          <span class="info-chip">${s.mm}</span>
          <span class="info-chip">${s.name}</span>
        `;

      }

      // === 鼠标交互 ===
      function getPointerPos(e) {
        const rect = mainCanvas.getBoundingClientRect();
        const sx   = mainCanvas.width  / rect.width;
        const sy   = mainCanvas.height / rect.height;
        return {
          x: (e.clientX - rect.left) * sx,
          y: (e.clientY - rect.top)  * sy,
        };
      }

      function hitTest(mx, my) {
        const edge = 14; // 抓取范围
        const hs   = 14;  // 手柄大小

        // 手柄
        const corners = [
          { key: 'tl', cx: cropX,        cy: cropY         },
          { key: 'tr', cx: cropX + cropW, cy: cropY         },
          { key: 'bl', cx: cropX,        cy: cropY + cropH },
          { key: 'br', cx: cropX + cropW, cy: cropY + cropH },
        ];

        for (const c of corners) {
          if (mx >= c.cx - hs && mx <= c.cx + hs && my >= c.cy - hs && my <= c.cy + hs) {
            return c.key;
          }
        }

        // 内部
        if (mx >= cropX && mx <= cropX + cropW && my >= cropY && my <= cropY + cropH) {
          return 'move';
        }

        return null;
      }

      mainCanvas.style.cursor = 'crosshair';

      mainCanvas.addEventListener('mousedown', (e) => {
        const { x, y } = getPointerPos(e);
        const hit = hitTest(x, y);
        if (hit) {
          dragging    = true;
          dragCorner   = hit;
          dragStartX  = x;
          dragStartY  = y;
          boxStartX   = cropX;
          boxStartY   = cropY;
          boxStartW   = cropW;
          boxStartH   = cropH;
          e.preventDefault();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const { x, y } = getPointerPos(e);
        if (!mainCanvas.getBoundingClientRect) return;
        const dx = x - dragStartX;
        const dy = y - dragStartY;

        const minW = 40;
        const maxW = mainCanvas.width;
        const maxH = mainCanvas.height;

        switch (dragCorner) {
          case 'move':
            cropX = Math.max(0, Math.min(boxStartX + dx, mainCanvas.width - cropW));
            cropY = Math.max(0, Math.min(boxStartY + dy, mainCanvas.height - cropH));
            break;
          case 'tl':
            cropW = Math.max(minW, boxStartW - dx);
            cropH = Math.max(minW, boxStartH - dy);
            cropX = boxStartX + boxStartW - cropW;
            cropY = boxStartY + boxStartH - cropH;
            break;
          case 'tr':
            cropW = Math.max(minW, boxStartW + dx);
            cropH = Math.max(minW, boxStartH - dy);
            cropX = boxStartX;
            cropY = boxStartY + boxStartH - cropH;
            break;
          case 'bl':
            cropW = Math.max(minW, boxStartW - dx);
            cropH = Math.max(minW, boxStartH + dy);
            cropX = boxStartX + boxStartW - cropW;
            cropY = boxStartY;
            break;
          case 'br':
            cropW = Math.max(minW, boxStartW + dx);
            cropH = Math.max(minW, boxStartH + dy);
            cropX = boxStartX;
            cropY = boxStartY;
            break;
        }

        // 边界约束
        cropX = Math.max(0, Math.min(cropX, mainCanvas.width - minW));
        cropY = Math.max(0, Math.min(cropY, mainCanvas.height - minW));
        cropW = Math.min(cropW, mainCanvas.width - cropX);
        cropH = Math.min(cropH, mainCanvas.height - cropY);
        // 保持宽高比
        const s = SIZES[selectedSizeIdx];
        const targetRatio = s.w / s.h;
        const currentRatio = cropW / cropH;
        if (Math.abs(currentRatio - targetRatio) > 0.001) { // 允许1像素误差
          if (currentRatio > targetRatio) {
            // 太宽了，缩窄
            cropW = cropH * targetRatio;
          } else {
            cropH = cropW / targetRatio;
          }
        }
        draw();
      });

      window.addEventListener('mouseup', () => {
        dragging = false;
        dragCorner = null;
      });

      // === 裁剪下载 ===
      function cropAndDownload() {
        if (!originalImage) return;

        const s      = SIZES[selectedSizeIdx];
        const scale  = mainCanvas._scale || 1;

        // 用目标像素尺寸输出（不是显示像素）
        const outW   = s.w;
        const outH   = s.h;

        // 计算原图中的裁剪坐标
        const srcX   = cropX / scale;
        const srcY   = cropY / scale;
        const srcW   = cropW / scale;
        const srcH   = cropH / scale;

        // 防止越界
        const safeSrcX = Math.max(0, Math.min(srcX, originalImage.width  - 1));
        const safeSrcY = Math.max(0, Math.min(srcY, originalImage.height - 1));
        const safeSrcW = Math.min(srcW, originalImage.width  - safeSrcX);
        const safeSrcH = Math.min(srcH, originalImage.height - safeSrcY);

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width  = outW;
        tempCanvas.height = outH;
        const tCtx = tempCanvas.getContext('2d');

        tCtx.drawImage(
          originalImage,
          safeSrcX, safeSrcY, safeSrcW, safeSrcH,
          0, 0, outW, outH
        );

        tempCanvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a   = document.createElement('a');
          a.href    = url;
          a.download = `${s.name}_${outW}x${outH}_${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(url);
          showMessage('success', `已裁剪下载：${s.name} (${outW}×${outH} px)`);
        }, 'image/png');
      }
    })();
  </script>
