const aCode = 'A'.charCodeAt(0);
const laCode = 'a'.charCodeAt(0);
const dCode = '0'.charCodeAt(0);

function convert(text, style) {
  let result = '';
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) { // A-Z
      result += style.upper[code - 65] || ch;
    } else if (code >= 97 && code <= 122) { // a-z
      result += style.lower[code - 97] || ch;
    } else if (code >= 48 && code <= 57) { // 0-9
      result += style.digits[code - 48] || ch;
    } else {
      result += ch;
    }
  }
  return result;
}

let currentTexts = [];
function render() {
  const text = document.getElementById('input').value || 'Hello World';
  const container = document.getElementById('styles');
  container.innerHTML = '';
  currentTexts = [];
  styles.forEach((style, idx) => {
    const converted = convert(text, style);
    currentTexts[idx] = converted;
    const card = document.createElement('div');
    card.className = 'style-card';
    card.innerHTML = `
      <div class="info">
        <div class="style-name">${style.name}</div>
        <div class="style-preview">${converted}</div>
      </div>
      <button class="copy-btn" data-idx="${idx}">📋 复制</button>
    `;
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(currentTexts[idx]);
    });
    container.appendChild(card);
  });
}

document.getElementById('input').addEventListener('input', render);
render();

(function() {
  const resizer = document.getElementById('resizer');
  const layout = document.querySelector('.io-flex');
  if (!resizer || !layout) return;
  const leftPanel = layout.children[0];
  const rightPanel = layout.children[2];
  let isResizing = false;
  let startX = 0;
  let startLeftWidth = 0;

  resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    startX = e.clientX;
    startLeftWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
    const delta = e.clientX - startX;
    const newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
    const leftPercent = (newLeftWidth / totalWidth) * 100;
    leftPanel.style.flex = 'none';
    leftPanel.style.width = leftPercent + '%';
    rightPanel.style.flex = '1';
  });

  document.addEventListener('mouseup', function() {
    if (isResizing) {
      isResizing = false;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  resizer.addEventListener('dblclick', function() {
    leftPanel.style.flex = '';
    leftPanel.style.width = '';
    rightPanel.style.flex = '';
  });
})();
