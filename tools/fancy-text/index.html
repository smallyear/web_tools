const aCode = 'A'.charCodeAt(0);
const laCode = 'a'.charCodeAt(0);
const dCode = '0'.charCodeAt(0);

function convert(text, style) {
  let result = '';
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) { // A-Z
      result += style.upper[code - 65] || ch;
    } else if (code >= 97 && code <= 122) { // a-z
      result += style.lower[code - 97] || ch;
    } else if (code >= 48 && code <= 57) { // 0-9
      result += style.digits[code - 48] || ch;
    } else {
      result += ch;
    }
  }
  return result;
}

let currentTexts = [];
function render() {
  const text = document.getElementById('input').value || 'Hello World';
  const container = document.getElementById('styles');
  container.innerHTML = '';
  currentTexts = [];
  styles.forEach((style, idx) => {
    const converted = convert(text, style);
    currentTexts[idx] = converted;
    const card = document.createElement('div');
    card.className = 'style-card';
    card.innerHTML = `
      <div class="info">
        <div class="style-name">${style.name}</div>
        <div class="style-preview">${converted}</div>
      </div>
      <button class="copy-btn" data-idx="${idx}">рҹ“Ӣ еӨҚеҲ¶</button>
    `;
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(currentTexts[idx]);
    });
    container.appendChild(card);
  });
}

document.getElementById('input').addEventListener('input', render);
render();
