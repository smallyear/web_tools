<script>
let currentZoom=100;
let isFullscreen=false;

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

const examples={
flowchart:`flowchart TD

state:`stateDiagram-v2
    [*] --> 待支付

    已发货 --> 已签收: 用户签收
    已签收 --> 已完成: 确认收货

    退款中 --> 已退款: 退款成功
    售后中 --> 已完成: 售后完成

const syntaxRef={
flowchart:`<strong>流程图 (Flowchart)</strong>
<pre>flowchart 方向
方向: TD(上到下), LR(左到右), TB, RL

节点形状:
  A[文本]       → 矩形
  A(文本)       → 圆角矩形
  A{文本}       → 菱形(判断)
  A((文本))     → 圆形
  A([文本])     → 体育场形
  A[[文本]]     → 子程序
  A[(文本)]     → 圆柱(数据库)
  A&gt;/文本/]   → 旗帜形

连接线:
  A --> B        → 实线箭头
  A --- B        → 实线无箭头
  A -.-> B       → 虚线箭头
  A ==> B        → 粗线箭头
  A -- 文本 --> B → 带文本实线
  A -->|文本| B  → 带标签箭头</pre>`,
sequence:`<strong>时序图 (Sequence)</strong>
<pre>sequenceDiagram
参与者:
  participant 别名 as 显示名

消息:
  A->>B: 同步消息(实线实箭头)
  A-->>B: 同步返回(虚线实箭头)
  A->B: 同步(实线)
  A--B: 返回(虚线)

激活/失活:
  activate A
  deactivate A

注释:
  Note left of A: 左侧注释
  Note right of B: 右侧注释
  Note over A,B: 跨参与者注释

循环/条件:
  loop 每次循环
    A->>B: 消息
  end
  alt 条件成立
    A->>B: 消息
  else 否则
    A->>B: 其他消息
  end</pre>`,
er:`<strong>ER图 (Entity Relationship)</strong>
<pre>erDiagram
实体定义:
  实体名 {
    类型 属性名
    string name
    int age
    date created_at
  }

关系:
  A ||--|| B : 1对1
  A ||--o{ B : 1对多
  A }o--o{ B : 多对多
  A }|--|| B : 多对1

符号说明:
  ||  恰好一个(必须)
  o|  零或一个(可选)
  }|  一个或多个
  }o  零或多个</pre>`,
state:`<strong>状态图 (State Diagram)</strong>
<pre>stateDiagram-v2
  [*] --> 初始状态     起始
  状态A --> 状态B: 事件
  状态B --> [*]       终止

  复合状态:
    state 运行中 {
      [*] --> 空闲
      空闲 --> 处理: 收到请求

  备注:
    note right of 状态A: 注释内容

  选择:
    state choice1 <<choice>>

<pre>mindmap

    一级分支
      二级分支
        三级分支
      二级分支
    一级分支

节点形状:
  root((文本))  → 圆形
  root(文本)    → 圆角矩形
  root)文本(    → 气泡
  root{{文本}}  → 六边形
  root[文本]    → 矩形
  root)文本     → 旗帜</pre>`,
gitgraph:`<strong>Git图 (Git Graph)</strong>
<pre>gitGraph
  commit id: "描述"
  branch 分支名
  checkout 分支名
  commit id: "描述"
  merge 分支名 id: "描述"
  cherry-pick id: "commit_id"
  checkout main

选项:
  commit
    id: "标识"
    tag: "标签"
    type: Normal/Reverse/Highlight</pre>`,
pie:`<strong>饼图 (Pie)</strong>
<pre>pie title 标题
  "标签1" : 数值
  "标签2" : 数值
  "标签3" : 数值</pre>`,
class:`<strong>类图 (Class)</strong>
<pre>classDiagram
  class 类名 {
    +public 属性
    -private 属性
    #protected 属性
    +方法()
  }

关系:
  A <|-- B     继承
  A *-- B      组合
  A o-- B      聚合
  A --> B      关联
  A -- B       链接(实线)
  A ..> B      依赖
  A .. B       实现</pre>`,
gantt:`<strong>甘特图 (Gantt)</strong>
<pre>gantt
  title 标题
  dateFormat YYYY-MM-DD

  section 阶段名
  任务名 :a1, 2026-01-01, 10d
  任务B :after a1, 5d
  任务C :2026-01-20, 1w

时间单位: d(天), w(周), h(小时), m(分钟)
状态标记:
  任务名 :done, a1, 2026-01-01, 5d
  任务名 :active, a2, 2026-01-06, 5d
  任务名 :crit, a3, 2026-01-11, 5d</pre>`
};

// Build syntax reference
function buildSyntaxRef(type){
const body=document.getElementById('syntaxRefBody');
body.innerHTML=syntaxRef[type]||syntaxRef.flowchart;
}

mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});

function loadExample(){
const sel=document.getElementById('exampleSelect');
const val=sel.value;
document.getElementById('mermaidCode').value=examples[val];
buildSyntaxRef(val);
renderMermaid();
}

async function renderMermaid(){
const code=document.getElementById('mermaidCode').value.trim();
const preview=document.getElementById('preview');
const errorBox=document.getElementById('errorBox');
const textarea=document.getElementById('mermaidCode');
errorBox.style.display='none';
textarea.classList.remove('has-error');
// Remove old SVG but keep zoom controls
const oldSvg=preview.querySelector('svg');
if(oldSvg)oldSvg.remove();
if(!code)return;
try{
const {svg}=await mermaid.render('mermaidGraph_'+Date.now(),code);
const wrapper=document.createElement('div');
wrapper.innerHTML=svg;
const svgEl=wrapper.firstElementChild;
svgEl.style.transform=`scale(${currentZoom/100})`;
svgEl.style.transformOrigin='top left';
preview.insertBefore(svgEl,preview.querySelector('.zoom-controls'));
}catch(e){
const msg=e.message||String(e);
errorBox.textContent='语法错误：'+msg;errorBox.style.display='block';
textarea.classList.add('has-error');
// Try to highlight error line
highlightErrorLine(msg,code);
}
}

function highlightErrorLine(errMsg,code){
const textarea=document.getElementById('mermaidCode');
// Try to extract line number from mermaid error
const lineMatch=errMsg.match(/line\s*[:\s]*(\d+)/i);
if(lineMatch){
const lineNum=parseInt(lineMatch[1]);
// Visual indicator via custom highlight overlay
showMessage('warning',`错误在第 ${lineNum} 行附近，请检查代码`);
}
}

function getSVG(){
const svgEl=document.getElementById('preview').querySelector('svg');
return svgEl?svgEl.outerHTML:'';
}

function downloadSVG(){
const svg=getSVG();if(!svg){showMessage('warning','请先渲染图表');return;}
const blob=new Blob([svg],{type:'image/svg+xml'});const a=document.createElement('a');
a.href=URL.createObjectURL(blob);a.download='mermaid-chart.svg';a.click();URL.revokeObjectURL(a.href);
}

function downloadPNG(){
const svg=getSVG();if(!svg){showMessage('warning','请先渲染图表');return;}
const svgEl=document.getElementById('preview').querySelector('svg');
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
const bbox=svgEl.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
canvas.width=bbox.width*dpr;canvas.height=bbox.height*dpr;
canvas.style.width=bbox.width+'px';canvas.style.height=bbox.height+'px';
ctx.scale(dpr,dpr);

const img=new Image();
const svgData=new XMLSerializer().serializeToString(svgEl);
const svgBlob=new Blob([svgData],{type:'image/svg+xml;charset=utf-8'});
const url=URL.createObjectURL(svgBlob);
img.onload=function(){
ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0,bbox.width,bbox.height);
URL.revokeObjectURL(url);
const a=document.createElement('a');
a.download='mermaid-chart.png';
a.href=canvas.toDataURL('image/png');
a.click();
};
img.onerror=function(){
URL.revokeObjectURL(url);
showMessage('error','PNG导出失败，请尝试下载SVG');
};
img.src=url;
}

function copySVG(){
const svg=getSVG();if(!svg){showMessage('warning','请先渲染图表');return;}
navigator.clipboard.writeText(svg).then(()=>showMessage('success','SVG代码已复制到剪贴板'));
}

// Zoom controls
function zoomIn(){currentZoom=Math.min(currentZoom+20,300);applyZoom();}
function zoomOut(){currentZoom=Math.max(currentZoom-20,30);applyZoom();}
function zoomReset(){currentZoom=100;applyZoom();}
function applyZoom(){
document.getElementById('zoomLevel').textContent=currentZoom+'%';
const svgEl=document.getElementById('preview').querySelector('svg');
if(svgEl){svgEl.style.transform=`scale(${currentZoom/100})`;svgEl.style.transformOrigin='top left';}
}

// Fullscreen
function toggleFullscreen(){
const preview=document.getElementById('preview');
isFullscreen=!isFullscreen;
preview.classList.toggle('fullscreen',isFullscreen);
document.getElementById('fullscreenBtn').textContent=isFullscreen?'✕ 退出全屏':'🖥️ 全屏预览';
}
document.addEventListener('keydown',e=>{
if(e.key==='Escape'&&isFullscreen)toggleFullscreen();
});

// Syntax reference toggle
function toggleSyntaxRef(header){
header.classList.toggle('open');
const body=header.nextElementSibling;
body.classList.toggle('open');
}

// Update syntax ref when example type changes
document.getElementById('exampleSelect').addEventListener('change',function(){
buildSyntaxRef(this.value);
});

document.getElementById('mermaidCode').addEventListener('input',debounce(renderMermaid,500));
loadExample();

(function() {
  var resizer = document.getElementById('resizer');
  if (!resizer) return;
  var layout = resizer.parentElement;
  var children = layout.children;
  var leftPanel = null, rightPanel = null;
  for (var i = 0; i < children.length; i++) {
    if (children[i] === resizer) { leftPanel = children[i-1]; rightPanel = children[i+1]; break; }
  }
  if (!leftPanel || !rightPanel) return;
  var isResizing = false, startX = 0, startLeftWidth = 0;
  resizer.addEventListener('mousedown', function(e) {
    isResizing = true; startX = e.clientX;
    startLeftWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('active'); document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none'; e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    var totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
    var delta = e.clientX - startX;
    var newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
    leftPanel.style.flex = 'none';
    leftPanel.style.width = (newLeftWidth / totalWidth * 100) + '%';
    rightPanel.style.flex = '1';
  });
  document.addEventListener('mouseup', function() {
    if (isResizing) { isResizing = false; resizer.classList.remove('active');
    document.body.style.cursor = ''; document.body.style.userSelect = ''; }
  });
  resizer.addEventListener('dblclick', function() {
    leftPanel.style.flex = ''; leftPanel.style.width = ''; rightPanel.style.flex = '';
  });
})();
</script>
