<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favicon生成器 - 在线工具箱</title>
  <meta name="description" content="上传图片生成多种尺寸网站图标">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.container{max-width:900px;margin:0 auto;padding:15px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.card h3{margin:0 0 16px;color:#333;font-size:1.1rem}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius: 10px;cursor:pointer;font-size:14px;transition:all .2s}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-secondary{background:#e5e7eb;color:#333}.btn-secondary:hover{background:#d1d5db}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-sm{padding:6px 12px;font-size:12px}
.upload-area{border:2px dashed #d1d5db;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.dragover{border-color:#4f46e5;background:#f5f3ff}
.upload-area input{display:none}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-top:16px}
.preview-item{text-align:center;padding:12px;background:#f9fafb;border-radius: 10px}
.preview-item canvas{border:1px solid #e5e7eb;border-radius: 10px;margin-bottom:8px;image-rendering:pixelated}
.preview-item p{font-size:12px;color:#6b7280;margin:4px 0}
.text-input-group{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.text-input-group input,.text-input-group select{padding:10px;border:1px solid #d1d5db;border-radius: 10px;font-size:14px}
.text-input-group input{flex:1;min-width:150px}
.code-block{background:#1e1e2e;color:#a6e3a1;padding:16px;border-radius: 10px;font-family:monospace;font-size:13px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.size-label{font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<nav style="background:#4f46e5;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px">
  <a href="../../index.html" style="color:#fff;text-decoration:none;font-weight:bold;font-size:1.1rem">🛠️ 在线工具箱</a>
  <span style="opacity:.7">/</span>
  <span style="opacity:.9;font-size:.9rem">Favicon生成器</span>
</nav>
<div class="container">
  <div style="margin:16px 0;font-size:13px;color:#6b7280">
    <a href="../../index.html" style="color:#4f46e5;text-decoration:none">首页</a> / Favicon生成器
  </div>

  <div class="card">
    <h3>📤 上传图片</h3>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*">
      <p style="font-size:2rem;margin:0">📁</p>
      <p style="color:#6b7280;margin:8px 0 0">点击或拖拽上传图片</p>
    </div>
  </div>

  <div class="card">
    <h3>✏️ 文字/Emoji生成</h3>
    <div class="text-input-group">
      <input type="text" id="emojiInput" placeholder="输入文字或Emoji，如: 🚀" maxlength="4">
      <select id="bgColor"><option value="#4f46e5">紫色</option><option value="#10b981">绿色</option><option value="#ef4444">红色</option><option value="#f59e0b">橙色</option><option value="#1e293b">深色</option><option value="#ffffff">白色</option></select>
      <select id="fontSize"><option value="120">大</option><option value="80">中</option><option value="50">小</option></select>
      <button class="btn btn-primary" onclick="generateFromText()">生成</button>
    </div>
  </div>

  <div class="card">
    <h3>👁️ 预览</h3>
    <div class="preview-grid" id="previewGrid">
      <p style="color:#9ca3af;grid-column:1/-1;text-align:center;padding:20px">请先上传图片或输入文字</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="downloadAll()">📦 下载全部</button>
      <button class="btn btn-secondary" onclick="generateHTMLCode()">📋 生成HTML代码</button>
    </div>
  </div>

  <div class="card" id="htmlCodeCard" style="display:none">
    <h3>🔗 HTML引用代码</h3>
    <div class="code-block" id="htmlCode"></div>
    <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="copyCode()">📋 复制代码</button>
  </div>
</div>

<footer style="text-align:center;padding:24px;color:#9ca3af;font-size:13px;border-top:1px solid #e5e7eb;margin-top:40px">
  © 2026 在线工具箱 | 纯前端工具，数据不上传
</footer>

<script src="../../assets/js/common.js"></script>
<script>
const SIZES=[
  {w:16,h:16,label:'16×16',name:'favicon-16x16.png'},
  {w:32,h:32,label:'32×32',name:'favicon-32x32.png'},
  {w:48,h:48,label:'48×48',name:'favicon-48x48.png'},
  {w:180,h:180,label:'180×180 (Apple)',name:'apple-touch-icon.png'},
  {w:192,h:192,label:'192×192 (Android)',name:'android-chrome-192x192.png'}
];
let sourceCanvas=document.createElement('canvas');
let sourceCtx=sourceCanvas.getContext('2d');
let sourceReady=false;

const uploadArea=document.getElementById('uploadArea');
const fileInput=document.getElementById('fileInput');
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});

function loadImage(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const size=Math.max(img.width,img.height);
      sourceCanvas.width=size;sourceCanvas.height=size;
      sourceCtx.clearRect(0,0,size,size);
      const dx=(size-img.width)/2,dy=(size-img.height)/2;
      sourceCtx.drawImage(img,dx,dy);
      sourceReady=true;
      renderPreviews();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function generateFromText(){
  const text=document.getElementById('emojiInput').value.trim();
  if(!text)return alert('请输入文字或Emoji');
  const bg=document.getElementById('bgColor').value;
  const fs=parseInt(document.getElementById('fontSize').value);
  const size=256;
  sourceCanvas.width=size;sourceCanvas.height=size;
  sourceCtx.fillStyle=bg;
  sourceCtx.fillRect(0,0,size,size);
  sourceCtx.font=`${fs}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
  sourceCtx.textAlign='center';sourceCtx.textBaseline='middle';
  sourceCtx.fillStyle='#fff';
  sourceCtx.fillText(text,size/2,size/2+4);
  sourceReady=true;
  renderPreviews();
}

function renderPreviews(){
  const grid=document.getElementById('previewGrid');
  grid.innerHTML='';
  SIZES.forEach(s=>{
    const c=document.createElement('canvas');
    c.width=s.w;c.height=s.h;
    const ctx=c.getContext('2d');
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.drawImage(sourceCanvas,0,0,s.w,s.h);
    const div=document.createElement('div');
    div.className='preview-item';
    const display=c.cloneNode(true);
    display.style.width=Math.max(s.w,48)+'px';
    display.style.height=Math.max(s.h,48)+'px';
    div.appendChild(display);
    div.innerHTML+=`<p>${s.label}</p><p class="size-label">${s.w}×${s.h}px</p>`;
    const btn=document.createElement('button');
    btn.className='btn btn-secondary btn-sm';
    btn.textContent='下载';
    btn.onclick=()=>downloadSingle(c,s.name);
    div.appendChild(btn);
    grid.appendChild(div);
  });
}

function downloadSingle(canvas,filename){
  canvas.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click();
    URL.revokeObjectURL(a.href);
  },'image/png');
}

function downloadAll(){
  if(!sourceReady)return alert('请先生成favicon');
  SIZES.forEach(s=>{
    const c=document.createElement('canvas');
    c.width=s.w;c.height=s.h;
    const ctx=c.getContext('2d');
    ctx.drawImage(sourceCanvas,0,0,s.w,s.h);
    downloadSingle(c,s.name);
  });
}

function generateHTMLCode(){
  if(!sourceReady)return alert('请先生成favicon');
  const code=`<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">`;
  document.getElementById('htmlCode').textContent=code;
  document.getElementById('htmlCodeCard').style.display='block';
}

function copyCode(){
  navigator.clipboard.writeText(document.getElementById('htmlCode').textContent).then(()=>alert('已复制'));
}
</script>
</body>
</html>
