<script>
/* ========== 元素引用 ========== */
const picker = document.getElementById('picker');
const hexInput = document.getElementById('hexInput');
const alphaRange = document.getElementById('alphaRange');
const alphaVal = document.getElementById('alphaVal');
const swatch = document.getElementById('swatch');
const results = document.getElementById('results');

/* ========== 颜色转换函数 ========== */
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const n = parseInt(hex, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60)       { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

function rgbToCmyk(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const k = 1 - Math.max(r, g, b);
  if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
  return {
    c: Math.round(((1 - r - k) / (1 - k)) * 100),
    m: Math.round(((1 - g - k) / (1 - k)) * 100),
    y: Math.round(((1 - b - k) / (1 - k)) * 100),
    k: Math.round(k * 100)
  };
}

/* ========== 颜色历史 ========== */
const HISTORY_KEY = 'colorHistory';
const MAX_HISTORY = 15;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveToHistory(hex) {
  hex = hex.toUpperCase();
  let hist = getHistory().filter(c => c !== hex);
  hist.unshift(hex);
  if (hist.length > MAX_HISTORY) hist = hist.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  const hist = getHistory();
  const card = document.getElementById('historyCard');
  const row = document.getElementById('historyRow');
  if (hist.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  row.innerHTML = '<span class="history-label">历史:</span>';
  hist.forEach(hex => {
    const el = document.createElement('div');
    el.className = 'history-swatch';
    el.style.background = hex;
    el.title = hex;
    el.onclick = () => { hexInput.value = hex; update(); };
    row.appendChild(el);
  });
}

/* ========== 调色板 ========== */
function generatePalette(hex) {
  const { r, g, b } = hexToRgb(hex);
  const { h, s, l } = rgbToHsl(r, g, b);

  const schemes = {
    '互补色 (Complementary)': [
      { h: h, s: s, l: l },
      { h: (h + 180) % 360, s: s, l: l }
    ],
    '类似色 (Analogous)': [
      { h: (h - 30 + 360) % 360, s: s, l: l },
      { h: h, s: s, l: l },
      { h: (h + 30) % 360, s: s, l: l }
    ],
    '三角色 (Triadic)': [
      { h: h, s: s, l: l },
      { h: (h + 120) % 360, s: s, l: l },
      { h: (h + 240) % 360, s: s, l: l }
    ],
    '分裂互补色 (Split-Complementary)': [
      { h: h, s: s, l: l },
      { h: (h + 150) % 360, s: s, l: l },
      { h: (h + 210) % 360, s: s, l: l }
    ],
    '矩形色 (Tetradic)': [
      { h: h, s: s, l: l },
      { h: (h + 90) % 360, s: s, l: l },
      { h: (h + 180) % 360, s: s, l: l },
      { h: (h + 270) % 360, s: s, l: l }
    ]
  };

  const section = document.getElementById('paletteSection');
  section.innerHTML = '';

  Object.entries(schemes).forEach(([name, colors]) => {
    const group = document.createElement('div');
    group.className = 'palette-group';
    group.innerHTML = `<div class="palette-group-title">${name}</div>`;
    const row = document.createElement('div');
    row.className = 'palette-colors';
    colors.forEach(c => {
      const cHex = hslToHex(c.h, c.s, c.l).toUpperCase();
      const item = document.createElement('div');
      item.className = 'palette-item';
      item.title = '点击复制 ' + cHex;
      item.innerHTML = `<div class="palette-swatch" style="background:${cHex}"></div><span class="palette-hex">${cHex}</span>`;
      item.onclick = () => {
        if (typeof copyToClipboard === 'function') copyToClipboard(cHex);
        else navigator.clipboard.writeText(cHex);
        if (typeof showMessage === 'function') showMessage('success', '已复制 ' + cHex);
      };
      row.appendChild(item);
    });
    group.appendChild(row);
    section.appendChild(group);
  });
}

/* ========== WCAG 对比度 ========== */
function relativeLuminance(r, g, b) {
  const [rs, gs, bs] = [r, g, b].map(c => {
    c /= 255;
    return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
}

function contrastRatio(hex1, hex2) {
  const rgb1 = hexToRgb(hex1);
  const rgb2 = hexToRgb(hex2);
  const l1 = relativeLuminance(rgb1.r, rgb1.g, rgb1.b);
  const l2 = relativeLuminance(rgb2.r, rgb2.g, rgb2.b);
  const lighter = Math.max(l1, l2);
  const darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

function updateWcag() {
  const bgHex = document.getElementById('wcagBgHex').value;
  const fgHex = document.getElementById('wcagFgHex').value;
  if (!/^#[0-9a-fA-F]{6}$/.test(bgHex) || !/^#[0-9a-fA-F]{6}$/.test(fgHex)) return;

  const ratio = contrastRatio(bgHex, fgHex);
  const ratioStr = ratio.toFixed(2);

  const preview = document.getElementById('wcagPreview');
  preview.style.background = bgHex;
  preview.style.color = fgHex;

  const ratioEl = document.getElementById('wcagRatio');
  ratioEl.textContent = `对比度: ${ratioStr}:1`;

  const resultEl = document.getElementById('wcagResult');
  const aaNormal = ratio >= 4.5;
  const aaLarge = ratio >= 3;
  const aaaNormal = ratio >= 7;
  const aaaLarge = ratio >= 4.5;

  const badge = (label, pass) =>
    `<span class="wcag-badge ${pass ? 'wcag-pass' : 'wcag-fail'}">${label}: ${pass ? '✓ 通过' : '✗ 未通过'}</span>`;

  resultEl.innerHTML =
    badge('AA 普通文本', aaNormal) +
    badge('AA 大文本', aaLarge) +
    badge('AAA 普通文本', aaaNormal) +
    badge('AAA 大文本', aaaLarge);
}

/* ========== 渐变生成 ========== */
function updateGradient() {
  const from = document.getElementById('gradFrom').value;
  const to = document.getElementById('gradTo').value;
  const angle = document.getElementById('gradAngle').value;
  document.getElementById('gradAngleVal').textContent = angle + '°';

  const css = `linear-gradient(${angle}deg, ${from}, ${to})`;
  document.getElementById('gradientPreview').style.background = css;
  document.getElementById('gradientCode').textContent = `background: ${css};`;
}

function copyGradientCode() {
  const code = document.getElementById('gradientCode').textContent;
  if (typeof copyToClipboard === 'function') copyToClipboard(code);
  else navigator.clipboard.writeText(code);
  if (typeof showMessage === 'function') showMessage('success', '已复制渐变 CSS 代码');
}

/* ========== 主更新 ========== */
let lastHex = '';
function update() {
  const hex = hexInput.value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  picker.value = hex;
  const { r, g, b } = hexToRgb(hex);
  const { h, s, l } = rgbToHsl(r, g, b);
  const cmyk = rgbToCmyk(r, g, b);
  const a = parseInt(alphaRange.value) / 100;
  alphaVal.textContent = Math.round(a * 100) + '%';

  swatch.style.background = `rgba(${r},${g},${b},${a})`;

  const items = [
    { name: 'HEX', value: hex.toUpperCase() },
    { name: 'HEX (小写)', value: hex.toLowerCase() },
    { name: 'RGB', value: `rgb(${r}, ${g}, ${b})` },
    { name: 'RGBA', value: `rgba(${r}, ${g}, ${b}, ${a})` },
    { name: 'HSL', value: `hsl(${h}, ${s}%, ${l}%)` },
    { name: 'HSLA', value: `hsla(${h}, ${s}%, ${l}%, ${a})` },
    { name: 'CMYK', value: `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)` },
    { name: 'CSS变量', value: `--color: ${hex};` },
    { name: '十进制', value: `${r * 65536 + g * 256 + b}` },
  ];

  results.innerHTML = '';
  items.forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="name">${item.name}</span><span class="value">${item.value}</span><span class="copy-hint">📋 复制</span>`;
    li.onclick = () => {
      if (typeof copyToClipboard === 'function') copyToClipboard(item.value);
      else navigator.clipboard.writeText(item.value);
      li.querySelector('.copy-hint').textContent = '✅ 已复制';
      setTimeout(() => { li.querySelector('.copy-hint').textContent = '📋 复制'; }, 1500);
    };
    results.appendChild(li);
  });

  // Save to history
  if (hex.toUpperCase() !== lastHex) {
    lastHex = hex.toUpperCase();
    saveToHistory(hex);
  }

  // Update palette
  generatePalette(hex);

  // Sync gradient "from" color
  document.getElementById('gradFrom').value = hex;
  updateGradient();

  // Sync WCAG foreground
  document.getElementById('wcagFg').value = hex;
  document.getElementById('wcagFgHex').value = hex.toUpperCase();
  updateWcag();
}

/* ========== 复制全部格式 ========== */
function copyAllFormats() {
  const liEls = results.querySelectorAll('li');
  if (liEls.length === 0) return;
  let text = '=== 颜色转换结果 ===\n';
  liEls.forEach(li => {
    const name = li.querySelector('.name').textContent;
    const value = li.querySelector('.value').textContent;
    text += `${name}: ${value}\n`;
  });
  if (typeof copyToClipboard === 'function') copyToClipboard(text);
  else navigator.clipboard.writeText(text);
  if (typeof showMessage === 'function') showMessage('success', '已复制全部格式');
}

/* ========== 事件绑定 ========== */
picker.addEventListener('input', () => { hexInput.value = picker.value; update(); });
hexInput.addEventListener('input', update);
alphaRange.addEventListener('input', update);

// WCAG bindings
document.getElementById('wcagBg').addEventListener('input', e => {
  document.getElementById('wcagBgHex').value = e.target.value.toUpperCase();
  updateWcag();
});
document.getElementById('wcagBgHex').addEventListener('input', e => {
  if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
    document.getElementById('wcagBg').value = e.target.value;
  }
  updateWcag();
});
document.getElementById('wcagFg').addEventListener('input', e => {
  document.getElementById('wcagFgHex').value = e.target.value.toUpperCase();
  updateWcag();
});
document.getElementById('wcagFgHex').addEventListener('input', e => {
  if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
    document.getElementById('wcagFg').value = e.target.value;
  }
  updateWcag();
});

// Gradient bindings
document.getElementById('gradFrom').addEventListener('input', updateGradient);
document.getElementById('gradTo').addEventListener('input', updateGradient);
document.getElementById('gradAngle').addEventListener('input', updateGradient);

/* ========== 初始化 ========== */
renderHistory();
update();
updateGradient();
updateWcag();

// 拖拽分隔条逻辑
(function() {
  const resizer = document.getElementById('resizer');
  const layout = document.querySelector('.io-flex');
  if (!resizer || !layout) return;
  const leftPanel = layout.children[0];
  const rightPanel = layout.children[2];
  let isResizing = false;
  let startX = 0;
  let startLeftWidth = 0;

  resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    startX = e.clientX;
    startLeftWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
    const delta = e.clientX - startX;
    const newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
    const leftPercent = (newLeftWidth / totalWidth) * 100;
    leftPanel.style.flex = 'none';
    leftPanel.style.width = leftPercent + '%';
    rightPanel.style.flex = '1';
  });

  document.addEventListener('mouseup', function() {
    if (isResizing) {
      isResizing = false;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  resizer.addEventListener('dblclick', function() {
    leftPanel.style.flex = '';
    leftPanel.style.width = '';
    rightPanel.style.flex = '';
  });
})();
</script>
</body>
</html>
