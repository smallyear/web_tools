<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命名转换器 - 在线工具箱</title>
  <meta name="description" content="camelCase/snake_case/kebab-case等命名互转">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.container { max-width: 960px; margin: 0 auto; padding: 16px; }
.breadcrumb { font-size: 14px; color: var(--text-secondary, #666); margin-bottom: 12px; }
.breadcrumb a { color: var(--primary, #4a90d9); text-decoration: none; }
.tool-header { margin-bottom: 20px; }
.tool-header h1 { font-size: 1.6em; margin: 0 0 6px; }
.tool-header p { color: var(--text-secondary, #666); margin: 0; }
.card { background: var(--card-bg, #fff); border: 1px solid var(--border, #e0e0e0); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.card h3 { margin: 0 0 14px; font-size: 1.05em; }
input[type="text"] { width: 100%; padding: 10px; border: 1px solid var(--border, #e0e0e0); border-radius: 10px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
input[type="text"]:focus { outline: none; border-color: var(--primary, #4a90d9); }
.result-list { list-style: none; padding: 0; margin: 0; }
.result-list li { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid var(--border, #e0e0e0); border-radius: 10px; margin-bottom: 8px; background: var(--bg, #f5f5f5); cursor: pointer; transition: background .15s; }
.result-list li:hover { background: #e8f0fe; }
.result-list li .name { font-size: 13px; color: var(--text-secondary, #666); min-width: 120px; }
.result-list li .value { font-family: 'SF Mono', 'Menlo', monospace; font-size: 14px; word-break: break-all; flex: 1; margin: 0 12px; }
.result-list li .copy-hint { font-size: 12px; color: var(--primary, #4a90d9); white-space: nowrap; }
footer { text-align: center; padding: 24px 16px; font-size: 13px; color: var(--text-secondary, #999); }

    /* 拖拽分隔条 */
    .resizer {
      width: 12px; cursor: col-resize; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; user-select: none;
    }
    .resizer::after {
      content: ''; width: 4px; height: 48px; background: var(--border);
      border-radius: 2px; transition: background 0.2s, height 0.2s;
    }
    .resizer:hover::after, .resizer.active::after { background: var(--primary); height: 64px; }
    @media (max-width: 768px) {
      .resizer { width: 100%; height: 12px; cursor: row-resize; }
      .resizer::after { width: 48px; height: 4px; }
    }

    .io-flex { display: flex; gap: 0; align-items: stretch; }
    .io-flex > *:not(.resizer) { flex: 1; min-width: 0; }
    @media (max-width: 768px) { .io-flex { flex-direction: column; } }

  </style>
</head>
<body>
<nav style="background:var(--primary,#4a90d9);color:#fff;padding:12px 16px;">
  <a href="../../index.html" style="color:#fff;text-decoration:none;font-weight:600;">← 返回工具箱</a>
</nav>
<div class="container">
  <div class="breadcrumb"><a href="../../index.html">首页</a> / 命名转换器</div>
  <div class="tool-header">
    <h1>🔤 命名转换器</h1>
    <p>在不同命名风格之间快速转换（camelCase、snake_case 等）</p>
  </div>

  <div class="io-flex">
    <div class="card">
      <h3>输入名称</h3>
      <input type="text" id="input" placeholder="例如：hello_world、helloWorld、HelloWorld、hello-world" autocomplete="off">
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="card" style="overflow-x:auto;">
      <h3>转换结果 <span style="font-size:13px;color:var(--text-secondary,#666);font-weight:normal;">（点击可复制）</span></h3>
      <ul class="result-list" id="results"></ul>
    </div>
  </div>
</div>

<footer>© 2025 在线工具箱 · 命名转换器</footer>

<script src="../../assets/js/common.js"></script>
<script>
const input = document.getElementById('input');
const results = document.getElementById('results');

function splitWords(str) {
  // Remove common prefixes/suffixes, then split
  let s = str.trim();
  if (!s) return [];
  // Split by various delimiters and case changes
  return s
    .replace(/([a-z])([A-Z])/g, '$1 $2') // camelCase -> camel Case
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2') // XMLParser -> XML Parser
    .replace(/[-_\/\s]+/g, ' ') // normalize delimiters
    .trim()
    .split(/\s+/)
    .filter(w => w.length > 0)
    .map(w => w.toLowerCase());
}

function toCamelCase(words) {
  return words.map((w, i) => i === 0 ? w : w.charAt(0).toUpperCase() + w.slice(1)).join('');
}

function toPascalCase(words) {
  return words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
}

function toSnakeCase(words) {
  return words.join('_');
}

function toKebabCase(words) {
  return words.join('-');
}

function toUpperSnakeCase(words) {
  return words.map(w => w.toUpperCase()).join('_');
}

function toDotCase(words) {
  return words.join('.');
}

function toTitleCase(words) {
  return words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function toPathCase(words) {
  return words.join('/');
}

function convert() {
  const words = splitWords(input.value);
  const styles = [
    { name: 'camelCase', fn: toCamelCase },
    { name: 'PascalCase', fn: toPascalCase },
    { name: 'snake_case', fn: toSnakeCase },
    { name: 'kebab-case', fn: toKebabCase },
    { name: 'UPPER_SNAKE_CASE', fn: toUpperSnakeCase },
    { name: 'dot.case', fn: toDotCase },
    { name: 'Title Case', fn: toTitleCase },
    { name: 'path/case', fn: toPathCase },
  ];

  results.innerHTML = '';
  if (words.length === 0) {
    results.innerHTML = '<li style="justify-content:center;color:var(--text-secondary,#999);">请输入名称</li>';
    return;
  }
  styles.forEach(s => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="name">${s.name}</span><span class="value">${s.fn(words)}</span><span class="copy-hint">📋 复制</span>`;
    li.onclick = () => {
      if (typeof copyToClipboard === 'function') copyToClipboard(s.fn(words));
      else { navigator.clipboard.writeText(s.fn(words)); }
      li.querySelector('.copy-hint').textContent = '✅ 已复制';
      setTimeout(() => { li.querySelector('.copy-hint').textContent = '📋 复制'; }, 1500);
    };
    results.appendChild(li);
  });
}

input.addEventListener('input', convert);
convert();

// 拖拽分隔条逻辑
(function() {
  const resizer = document.getElementById('resizer');
  const layout = document.querySelector('.io-flex');
  if (!resizer || !layout) return;
  const leftPanel = layout.children[0];
  const rightPanel = layout.children[2];
  let isResizing = false;
  let startX = 0;
  let startLeftWidth = 0;

  resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    startX = e.clientX;
    startLeftWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
    const delta = e.clientX - startX;
    const newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
    const leftPercent = (newLeftWidth / totalWidth) * 100;
    leftPanel.style.flex = 'none';
    leftPanel.style.width = leftPercent + '%';
    rightPanel.style.flex = '1';
  });

  document.addEventListener('mouseup', function() {
    if (isResizing) {
      isResizing = false;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  resizer.addEventListener('dblclick', function() {
    leftPanel.style.flex = '';
    leftPanel.style.width = '';
    rightPanel.style.flex = '';
  });
})();
</script>
</body>
</html>
