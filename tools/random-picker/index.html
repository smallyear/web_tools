<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机点名器 - 在线工具箱</title>
  <meta name="description" content="导入名单随机抽取，老虎机滚动效果">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.display-area { height: 200px; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; border-radius: 12px; font-size: 48px; font-weight: 700; margin: 20px 0; overflow: hidden; position: relative; }
.display-area.rolling { animation: none; }
.display-name { transition: transform .1s; }
.controls-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
.btn { padding: 10px 24px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; color: #fff; }
.btn-primary { background: #4a6cf7; }
.btn-danger { background: #e53e3e; }
.btn-success { background: #22c55e; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
textarea { width: 100%; height: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; resize: vertical; }
input[type="number"] { width: 60px; padding: 6px; border: 1px solid #ddd; border-radius: 10px; }
input[type="file"] { font-size: 14px; }
.history { margin-top: 16px; }
.history h3 { margin-bottom: 8px; }
.history-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 8px; }
.history-list li { background: #f0f4ff; padding: 6px 14px; border-radius: 20px; font-size: 14px; }
label { font-weight: 600; }
</style>
</head>
<body>
<nav class="navbar"><a href="../../index.html" class="nav-brand">🛠️ 在线工具箱</a></nav>
<div class="container">
    <div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>随机点名器</span></div>
    <div class="card">
        <h2>随机点名器</h2>
        <div class="display-area"><span class="display-name" id="displayName">等待开始</span></div>
        <div class="controls-row">
            <button class="btn btn-primary" id="btnStart">▶ 开始</button>
            <button class="btn btn-danger" id="btnStop" disabled>⏹ 停止</button>
            <label>抽取数量：</label>
            <input type="number" id="quantity" value="1" min="1" max="100">
            <label><input type="checkbox" id="removeWinner"> 抽中移除</label>
        </div>
        <div>
            <label>名单（每行一个）：</label>
            <textarea id="names">张三
李四
王五
赵六
孙七
周八
吴九
郑十</textarea>
            <div style="margin-top:8px">
                <label>或上传文件：</label>
                <input type="file" id="fileInput" accept=".txt,.csv">
            </div>
        </div>
        <div class="history">
            <h3>🏆 抽取记录</h3>
            <ul class="history-list" id="historyList"></ul>
            <button class="btn btn-success" id="btnClear" style="margin-top:8px;font-size:13px;padding:6px 16px">清除记录</button>
        </div>
    </div>
    <footer class="footer">© 2024 在线工具箱 | <a href="../../index.html">返回首页</a></footer>
</div>
<script src="../../assets/js/common.js"></script>
<script>
(function(){
    const displayName = document.getElementById('displayName');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const namesEl = document.getElementById('names');
    const fileInput = document.getElementById('fileInput');
    const quantityEl = document.getElementById('quantity');
    const removeWinner = document.getElementById('removeWinner');
    const historyList = document.getElementById('historyList');
    const btnClear = document.getElementById('btnClear');

    let pool = [], running = false, timer = null, speed = 50;

    function getPool(){
        if(!pool.length){
            pool = namesEl.value.split('\n').map(s=>s.trim()).filter(Boolean);
        }
        return [...pool];
    }

    function flash(){
        const p = getPool();
        if(!p.length){ displayName.textContent = '没有名字'; stop(); return; }
        displayName.textContent = p[Math.floor(Math.random()*p.length)];
    }

    function start(){
        pool = namesEl.value.split('\n').map(s=>s.trim()).filter(Boolean);
        if(pool.length === 0) return;
        running = true;
        speed = 50;
        btnStart.disabled = true;
        btnStop.disabled = false;
        displayName.style.color = '#f59e0b';
        tick();
    }

    function tick(){
        if(!running) return;
        flash();
        timer = setTimeout(tick, speed);
    }

    function stop(){
        if(!running) return;
        running = false;
        clearTimeout(timer);
        btnStart.disabled = false;
        btnStop.disabled = true;
        displayName.style.color = '#22c55e';

        // pick winners
        let qty = Math.min(parseInt(quantityEl.value)||1, pool.length);
        let winners = [];
        let tempPool = [...pool];
        for(let i = 0; i < qty; i++){
            if(!tempPool.length) break;
            let idx = Math.floor(Math.random()*tempPool.length);
            winners.push(tempPool.splice(idx,1)[0]);
        }
        displayName.textContent = winners.join('、');

        // add to history
        winners.forEach(w => {
            const li = document.createElement('li');
            li.textContent = w;
            historyList.prepend(li);
        });

        // remove from pool if checked
        if(removeWinner.checked){
            pool = pool.filter(n => !winners.includes(n));
            namesEl.value = pool.join('\n');
        }
    }

    // Slow down then stop
    function startSpin(){
        pool = namesEl.value.split('\n').map(s=>s.trim()).filter(Boolean);
        if(pool.length === 0) return;
        running = true;
        speed = 50;
        btnStart.disabled = true;
        btnStop.disabled = false;
        displayName.style.color = '#f59e0b';
        let totalTicks = 30 + Math.floor(Math.random()*20);
        let count = 0;
        function tick(){
            if(!running){ return; }
            flash();
            count++;
            if(count < totalTicks){
                speed = 50 + count * 8; // gradually slow
                timer = setTimeout(tick, speed);
            } else {
                stop();
            }
        }
        tick();
    }

    btnStart.onclick = startSpin;
    btnStop.onclick = function(){ running = false; clearTimeout(timer); stop(); };
    btnClear.onclick = function(){ historyList.innerHTML = ''; };
    fileInput.onchange = function(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev){
            const lines = ev.target.result.split(/[\r\n]+/).map(s=>s.trim()).filter(Boolean);
            namesEl.value = lines.join('\n');
            pool = [];
        };
        reader.readAsText(file);
    };
})();
</script>
</body>
</html>
