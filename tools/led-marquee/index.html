<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手持弹幕/LED滚动屏 - 在线工具箱</title>
  <meta name="description" content="全屏滚动LED文字，自定义字体颜色速度">
<link rel="stylesheet" href="../../assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Press+Start+2P&family=Orbitron:wght@700;900&family=Fredoka:wght@700&family=Bungee&family=Lilita+One&display=swap" rel="stylesheet">
<style>
.marquee-screen {
    width: 100%;
    height: 300px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    border-radius: 10px;
    margin-bottom: 20px;
    transition: background .3s;
}
.marquee-text {
    white-space: nowrap;
    position: absolute;
    font-weight: 900;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px currentColor;
}
.controls label { display: block; margin: 10px 0 4px; font-weight: 600; }
.controls input[type="text"], .controls input[type="number"], .controls textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
.controls textarea { height: 80px; resize: vertical; font-family: inherit; }
.controls input[type="range"] { width: 100%; }
.controls select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type="range"] { flex: 1; }
.range-row span { min-width: 30px; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn { padding: 10px 24px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; color: #fff; }
.btn-primary { background: #4a6cf7; }
.btn-success { background: #22c55e; }
.btn-warning { background: #f59e0b; }
.btn-danger { background: #e53e3e; }
.direction-group { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
.direction-group label { font-weight: 400; display: flex; align-items: center; gap: 4px; }
.color-row { display: flex; gap: 16px; }
.color-row > div { flex: 1; }
.color-row input[type="color"] { width: 50px; height: 34px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; vertical-align: middle; }
.checkbox-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
.checkbox-row label { font-weight: 400; display: flex; align-items: center; gap: 4px; }
.countdown-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
.countdown-row input { width: 80px; }
.countdown-row input[type="text"] { flex: 1; }
@keyframes blink-led {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
}
.blinking .marquee-text { animation: blink-led 0.6s step-end infinite; }
/* fullscreen overrides */
:-webkit-full-screen .marquee-screen, :fullscreen .marquee-screen { height: 100vh; border-radius: 0; }
:-webkit-full-screen .marquee-screen .marquee-text, :fullscreen .marquee-screen .marquee-text { font-size: 15vw !important; }
</style>
</head>
<body>
<nav class="navbar"><a href="../../index.html" class="nav-brand">🛠️ 在线工具箱</a></nav>
<div class="container">
    <div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>手持弹幕/LED滚动屏</span></div>
    <div class="card">
        <h2>手持弹幕/LED滚动屏</h2>
        <div class="marquee-screen" id="marqueeScreen">
            <span class="marquee-text" id="marqueeText">Hello World</span>
        </div>
        <div class="controls">
            <label>弹幕文字（支持多行和Emoji 🎉）</label>
            <textarea id="inputText" placeholder="输入弹幕内容，每行一条，会逐行滚动显示">Hello World</textarea>
            <div class="color-row" style="margin-top:10px">
                <div><label>文字颜色</label><input type="color" id="textColor" value="#ff0000"></div>
                <div><label>背景颜色</label><input type="color" id="bgColor" value="#000000"></div>
                <div><label>描边颜色</label><input type="color" id="strokeColor" value="#ffffff"></div>
            </div>
            <label>描边粗细</label>
            <div class="range-row"><input type="range" id="strokeWidth" min="0" max="10" value="0"><span id="strokeWidthVal">0</span></div>
            <label>背景样式</label>
            <select id="bgPattern">
                <option value="solid">纯色</option>
                <option value="gradient">渐变</option>
                <option value="stripes">条纹</option>
                <option value="dots">LED点阵</option>
            </select>
            <label>字体</label>
            <select id="fontSelect">
                <option value="'Courier New', monospace">Courier New</option>
                <option value="'Black Ops One', cursive">Black Ops One</option>
                <option value="'Press Start 2P', cursive">Press Start 2P</option>
                <option value="'Orbitron', sans-serif">Orbitron</option>
                <option value="'Fredoka', sans-serif">Fredoka</option>
                <option value="'Bungee', cursive">Bungee</option>
                <option value="'Lilita One', cursive">Lilita One</option>
                <option value="Impact, sans-serif">Impact</option>
                <option value="'Arial Black', sans-serif">Arial Black</option>
            </select>
            <label>字体大小</label>
            <div class="range-row"><input type="range" id="fontSize" min="20" max="200" value="80"><span id="fontSizeVal">80px</span></div>
            <label>滚动速度</label>
            <div class="range-row"><input type="range" id="speed" min="1" max="20" value="5"><span id="speedVal">5</span></div>
            <label>滚动方向</label>
            <div class="direction-group">
                <label><input type="radio" name="dir" value="rtl" checked> 右→左</label>
                <label><input type="radio" name="dir" value="ltr"> 左→右</label>
            </div>
            <div class="checkbox-row">
                <label><input type="checkbox" id="chkBlink"> 💡 闪烁LED效果</label>
                <label><input type="checkbox" id="chkGlow"> ✨ 发光效果</label>
            </div>
            <label>屏幕方向</label>
            <div class="direction-group">
                <label><input type="radio" name="orient" value="normal" checked> 正常</label>
                <label><input type="radio" name="orient" value="portrait"> 竖屏锁定</label>
                <label><input type="radio" name="orient" value="landscape"> 横屏锁定</label>
            </div>
            <label style="margin-top:14px; color:#4a6cf7;">⏱️ 倒计时模式</label>
            <div class="countdown-row">
                <input type="number" id="cdSeconds" placeholder="秒数" min="1" value="60">
                <input type="text" id="cdEndMsg" placeholder="倒计时结束显示的文字" value="⏰ 时间到！">
                <button class="btn btn-danger" id="btnCountdown" style="margin:0;white-space:nowrap">开始倒计时</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnStart">▶ 开始滚动</button>
                <button class="btn btn-warning" id="btnFullscreen">⛶ 全屏</button>
            </div>
        </div>
    </div>
    <footer class="footer">© 2024 在线工具箱 | <a href="../../index.html">返回首页</a></footer>
</div>
<script src="../../assets/js/common.js"></script>
<script>
(function(){
    const screen = document.getElementById('marqueeScreen');
    const text = document.getElementById('marqueeText');
    const inputText = document.getElementById('inputText');
    const textColor = document.getElementById('textColor');
    const bgColor = document.getElementById('bgColor');
    const strokeColor = document.getElementById('strokeColor');
    const strokeWidth = document.getElementById('strokeWidth');
    const strokeWidthVal = document.getElementById('strokeWidthVal');
    const bgPattern = document.getElementById('bgPattern');
    const fontSelect = document.getElementById('fontSelect');
    const fontSizeEl = document.getElementById('fontSize');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const speedEl = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const btnStart = document.getElementById('btnStart');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const chkBlink = document.getElementById('chkBlink');
    const chkGlow = document.getElementById('chkGlow');
    const cdSeconds = document.getElementById('cdSeconds');
    const cdEndMsg = document.getElementById('cdEndMsg');
    const btnCountdown = document.getElementById('btnCountdown');

    let running = false, animId = null, posX = 0;
    let countdownTimer = null, countdownRunning = false;
    let lines = [], currentLine = 0;

    function updateStyle(){
        text.style.color = textColor.value;
        text.style.fontSize = fontSizeEl.value + 'px';
        text.style.fontFamily = fontSelect.value;
        fontSizeVal.textContent = fontSizeEl.value + 'px';
        speedVal.textContent = speedEl.value;
        strokeWidthVal.textContent = strokeWidth.value;
        // stroke effect
        const sw = parseInt(strokeWidth.value);
        if(sw > 0){
            text.style.webkitTextStroke = sw + 'px ' + strokeColor.value;
        } else {
            text.style.webkitTextStroke = '';
        }
        // glow
        if(chkGlow.checked){
            text.style.textShadow = '0 0 10px ' + textColor.value + ', 0 0 30px ' + textColor.value + ', 0 0 60px ' + textColor.value;
        } else {
            text.style.textShadow = '0 0 10px currentColor';
        }
        // blink
        screen.classList.toggle('blinking', chkBlink.checked);
        // background pattern
        applyBackground();
        // orientation
        applyOrientation();
    }

    function applyBackground(){
        const bc = bgColor.value;
        const pat = bgPattern.value;
        screen.style.backgroundImage = 'none';
        if(pat === 'solid'){
            screen.style.backgroundColor = bc;
        } else if(pat === 'gradient'){
            screen.style.background = 'linear-gradient(135deg, ' + bc + ' 0%, ' + lighten(bc, 40) + ' 50%, ' + bc + ' 100%)';
        } else if(pat === 'stripes'){
            screen.style.background = 'repeating-linear-gradient(90deg, ' + bc + ' 0px, ' + bc + ' 20px, ' + lighten(bc, 15) + ' 20px, ' + lighten(bc, 15) + ' 40px)';
        } else if(pat === 'dots'){
            screen.style.backgroundColor = bc;
            screen.style.backgroundImage = 'radial-gradient(' + lighten(bc, 20) + ' 2px, transparent 2px)';
            screen.style.backgroundSize = '16px 16px';
        }
    }

    function lighten(hex, pct){
        let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, r + pct); g = Math.min(255, g + pct); b = Math.min(255, b + pct);
        return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    }

    function applyOrientation(){
        const orient = document.querySelector('input[name="orient"]:checked').value;
        if(orient === 'portrait' && screen.orientation && screen.orientation.lock){
            screen.orientation.lock('portrait').catch(()=>{});
        } else if(orient === 'landscape' && screen.orientation && screen.orientation.lock){
            screen.orientation.lock('landscape').catch(()=>{});
        } else {
            if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        }
    }

    function getDir(){ return document.querySelector('input[name="dir"]:checked').value; }

    function getLines(){
        return inputText.value.split('\n').map(s=>s.trim()).filter(Boolean);
    }

    function buildMultiLine(){
        lines = getLines();
        if(lines.length <= 1){
            text.innerHTML = escapeHtml(lines[0] || 'Hello');
        } else {
            text.innerHTML = lines.map(l=>'<span class="marquee-line">' + escapeHtml(l) + '</span>').join('<br>');
        }
    }

    function escapeHtml(s){
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function resetPos(){
        const dir = getDir();
        const sw = screen.offsetWidth;
        posX = dir === 'rtl' ? sw : -text.offsetWidth;
    }

    function animate(){
        if(!running) return;
        const dir = getDir();
        const speed = parseInt(speedEl.value);
        const sw = screen.offsetWidth;
        const tw = text.offsetWidth;
        if(dir === 'rtl'){
            posX -= speed;
            if(posX < -tw) posX = sw;
        } else {
            posX += speed;
            if(posX > sw) posX = -tw;
        }
        text.style.transform = 'translateX(' + posX + 'px)';
        animId = requestAnimationFrame(animate);
    }

    function start(){
        buildMultiLine();
        updateStyle();
        resetPos();
        running = true;
        btnStart.textContent = '⏹ 停止';
        animate();
    }

    function stop(){
        running = false;
        if(animId) cancelAnimationFrame(animId);
        btnStart.textContent = '▶ 开始滚动';
    }

    btnStart.onclick = function(){ running ? stop() : start(); };

    btnFullscreen.onclick = function(){
        if(!document.fullscreenElement){
            screen.requestFullscreen().catch(()=>{});
        } else {
            document.exitFullscreen();
        }
    };

    // Countdown timer
    btnCountdown.onclick = function(){
        if(countdownRunning){
            clearInterval(countdownTimer);
            countdownRunning = false;
            btnCountdown.textContent = '开始倒计时';
            text.textContent = '';
            return;
        }
        const total = parseInt(cdSeconds.value);
        if(!total || total < 1) return;
        countdownRunning = true;
        btnCountdown.textContent = '停止倒计时';
        if(running) stop();
        let remaining = total;
        function showCount(){
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            const display = m > 0 ? m + ':' + String(s).padStart(2,'0') : remaining + '';
            text.innerHTML = display;
            text.style.position = 'relative';
            text.style.transform = 'none';
            text.style.fontSize = (parseInt(fontSizeEl.value) * 1.5) + 'px';
            text.style.color = textColor.value;
            text.style.fontFamily = fontSelect.value;
            if(remaining <= 10) text.style.color = '#ff3333';
            screen.classList.toggle('blinking', remaining <= 10);
        }
        showCount();
        countdownTimer = setInterval(function(){
            remaining--;
            if(remaining < 0){
                clearInterval(countdownTimer);
                countdownRunning = false;
                btnCountdown.textContent = '开始倒计时';
                text.innerHTML = cdEndMsg.value || '⏰ 时间到！';
                screen.classList.add('blinking');
                setTimeout(function(){ screen.classList.remove('blinking'); }, 5000);
                return;
            }
            showCount();
        }, 1000);
    };

    [inputText, textColor, bgColor, strokeColor, strokeWidth, bgPattern, fontSelect, fontSizeEl, speedEl, chkBlink, chkGlow].forEach(el => {
        el.addEventListener('input', function(){
            if(running){
                buildMultiLine();
            }
            updateStyle();
        });
    });
    document.querySelectorAll('input[name="dir"]').forEach(r => r.addEventListener('change', function(){ if(running){ stop(); start(); } }));
    document.querySelectorAll('input[name="orient"]').forEach(r => r.addEventListener('change', applyOrientation));
    document.addEventListener('fullscreenchange', function(){
        if(document.fullscreenElement){
            btnFullscreen.textContent = '⛶ 退出全屏';
            if(!running && !countdownRunning) start();
        } else {
            btnFullscreen.textContent = '⛶ 全屏';
        }
    });
    buildMultiLine();
    updateStyle();
})();
</script>
</body>
</html>
