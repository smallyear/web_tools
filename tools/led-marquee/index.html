<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手持弹幕/LED滚动屏 - 在线工具箱</title>
  <meta name="description" content="全屏滚动LED文字，自定义字体颜色速度">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.marquee-screen {
    width: 100%;
    height: 300px;
    overflow: hidden;
    display: flex;
    align-items: center;
    position: relative;
    border-radius: 10px;
    margin-bottom: 20px;
}
.marquee-text {
    white-space: nowrap;
    position: absolute;
    font-weight: 900;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px currentColor;
}
.controls label { display: block; margin: 10px 0 4px; font-weight: 600; }
.controls input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
.controls input[type="range"] { width: 100%; }
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type="range"] { flex: 1; }
.range-row span { min-width: 30px; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn { padding: 10px 24px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; color: #fff; }
.btn-primary { background: #4a6cf7; }
.btn-success { background: #22c55e; }
.btn-warning { background: #f59e0b; }
.direction-group { display: flex; gap: 10px; margin-top: 6px; }
.direction-group label { font-weight: 400; display: flex; align-items: center; gap: 4px; }
.color-row { display: flex; gap: 16px; }
.color-row > div { flex: 1; }
.color-row input[type="color"] { width: 50px; height: 34px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; vertical-align: middle; }
/* fullscreen overrides */
:-webkit-full-screen .marquee-screen, :fullscreen .marquee-screen { height: 100vh; border-radius: 0; }
:-webkit-full-screen .marquee-screen .marquee-text, :fullscreen .marquee-screen .marquee-text { font-size: 15vw !important; }
</style>
</head>
<body>
<nav class="navbar"><a href="../../index.html" class="nav-brand">🛠️ 在线工具箱</a></nav>
<div class="container">
    <div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>手持弹幕/LED滚动屏</span></div>
    <div class="card">
        <h2>手持弹幕/LED滚动屏</h2>
        <div class="marquee-screen" id="marqueeScreen">
            <span class="marquee-text" id="marqueeText">Hello World</span>
        </div>
        <div class="controls">
            <label>弹幕文字</label>
            <input type="text" id="inputText" value="Hello World" placeholder="输入弹幕内容">
            <div class="color-row" style="margin-top:10px">
                <div><label>文字颜色</label><input type="color" id="textColor" value="#ff0000"></div>
                <div><label>背景颜色</label><input type="color" id="bgColor" value="#000000"></div>
            </div>
            <label>字体大小</label>
            <div class="range-row"><input type="range" id="fontSize" min="20" max="200" value="80"><span id="fontSizeVal">80px</span></div>
            <label>滚动速度</label>
            <div class="range-row"><input type="range" id="speed" min="1" max="20" value="5"><span id="speedVal">5</span></div>
            <label>滚动方向</label>
            <div class="direction-group">
                <label><input type="radio" name="dir" value="rtl" checked> 右→左</label>
                <label><input type="radio" name="dir" value="ltr"> 左→右</label>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnStart">▶ 开始滚动</button>
                <button class="btn btn-warning" id="btnFullscreen">⛶ 全屏</button>
            </div>
        </div>
    </div>
    <footer class="footer">© 2024 在线工具箱 | <a href="../../index.html">返回首页</a></footer>
</div>
<script src="../../assets/js/common.js"></script>
<script>
(function(){
    const screen = document.getElementById('marqueeScreen');
    const text = document.getElementById('marqueeText');
    const inputText = document.getElementById('inputText');
    const textColor = document.getElementById('textColor');
    const bgColor = document.getElementById('bgColor');
    const fontSizeEl = document.getElementById('fontSize');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const speedEl = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const btnStart = document.getElementById('btnStart');
    const btnFullscreen = document.getElementById('btnFullscreen');

    let running = false, animId = null, posX = 0;

    function updateStyle(){
        text.style.color = textColor.value;
        text.style.fontSize = fontSizeEl.value + 'px';
        screen.style.backgroundColor = bgColor.value;
        fontSizeVal.textContent = fontSizeEl.value + 'px';
        speedVal.textContent = speedEl.value;
    }
    function getDir(){ return document.querySelector('input[name="dir"]:checked').value; }
    function resetPos(){
        const dir = getDir();
        const sw = screen.offsetWidth;
        posX = dir === 'rtl' ? sw : -text.offsetWidth;
    }
    function animate(){
        if(!running) return;
        const dir = getDir();
        const speed = parseInt(speedEl.value);
        const sw = screen.offsetWidth;
        const tw = text.offsetWidth;
        if(dir === 'rtl'){
            posX -= speed;
            if(posX < -tw) posX = sw;
        } else {
            posX += speed;
            if(posX > sw) posX = -tw;
        }
        text.style.transform = 'translateX(' + posX + 'px)';
        animId = requestAnimationFrame(animate);
    }
    function start(){
        text.textContent = inputText.value || 'Hello';
        updateStyle();
        resetPos();
        running = true;
        btnStart.textContent = '⏹ 停止';
        animate();
    }
    function stop(){
        running = false;
        if(animId) cancelAnimationFrame(animId);
        btnStart.textContent = '▶ 开始滚动';
    }
    btnStart.onclick = function(){ running ? stop() : start(); };
    btnFullscreen.onclick = function(){
        if(!document.fullscreenElement){
            screen.requestFullscreen().catch(()=>{});
        } else {
            document.exitFullscreen();
        }
    };
    [inputText, textColor, bgColor, fontSizeEl, speedEl].forEach(el => {
        el.addEventListener('input', function(){
            updateStyle();
            text.textContent = inputText.value || 'Hello';
        });
    });
    document.querySelectorAll('input[name="dir"]').forEach(r => r.addEventListener('change', function(){ if(running){ stop(); start(); } }));
    document.addEventListener('fullscreenchange', function(){
        if(document.fullscreenElement){
            btnFullscreen.textContent = '⛶ 退出全屏';
            if(!running) start();
        } else {
            btnFullscreen.textContent = '⛶ 全屏';
        }
    });
    updateStyle();
})();
</script>
</body>
</html>
