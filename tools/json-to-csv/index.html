<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON转CSV - Web工具箱</title>
  <meta name="description" content="JSON数组转CSV/TSV，支持下载">
<link rel="stylesheet" href="../../assets/css/style.css">
<script src="../../assets/js/common.js"></script>
<style>
.tool-container{max-width:1000px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.breadcrumb{font-size:14px;color:#666;margin-bottom:20px}
.breadcrumb a{color:#4a90d9;text-decoration:none}
textarea{width:100%;min-height:200px;padding:12px;border:1px solid #ddd;border-radius: 10px;font-family:'Courier New',monospace;font-size:14px;resize:vertical;box-sizing:border-box}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;align-items:center}
.btn{padding:10px 20px;border:none;border-radius: 10px;cursor:pointer;font-size:14px;transition:all .2s}
.btn-primary{background:#4a90d9;color:#fff}
.btn-primary:hover{background:#357abd}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#219a52}
.btn-outline{background:#fff;color:#333;border:1px solid #ddd}
.btn-outline:hover{background:#f5f5f5}
select,label{font-size:14px;color:#555}
select{padding:8px 12px;border:1px solid #ddd;border-radius: 10px}
.options{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:12px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius: 10px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.error{color:#e74c3c;font-size:13px;margin-top:4px}
.preview{max-height:300px;overflow:auto;border:1px solid #eee;border-radius: 10px;margin-top:12px}
.preview table{width:100%;border-collapse:collapse;font-size:13px}
.preview th,.preview td{padding:8px 12px;text-align:left;border-bottom:1px solid #eee}
.preview th{background:#f5f7fa;font-weight:600;position:sticky;top:0}
.preview tr:hover{background:#f9f9f9}

    /* 拖拽分隔条 */
    .resizer {
      width: 12px; cursor: col-resize; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; user-select: none;
    }
    .resizer::after {
      content: ''; width: 4px; height: 48px; background: var(--border);
      border-radius: 2px; transition: background 0.2s, height 0.2s;
    }
    .resizer:hover::after, .resizer.active::after { background: var(--primary); height: 64px; }
    @media (max-width: 768px) {
      .resizer { width: 100%; height: 12px; cursor: row-resize; }
      .resizer::after { width: 48px; height: 4px; }
    }

  </style>
</head>
<body>
<nav style="background:#4a90d9;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between">
<a href="../../index.html" style="color:#fff;text-decoration:none;font-size:18px;font-weight:bold">🛠 Web工具箱</a>
<span style="font-size:14px">JSON转CSV/Excel</span>
</nav>

<div class="tool-container">
<div class="breadcrumb">
<a href="../../index.html">首页</a> &gt; <span>JSON转CSV/Excel</span>
</div>

<div class="card">
<h2 style="margin-top:0;font-size:20px">📊 JSON转CSV/Excel</h2>
<p style="color:#666;font-size:14px">将JSON数组转换为CSV/TSV格式，支持嵌套对象展平、数组合并，可下载CSV文件</p>

<label style="margin-bottom:8px">输入JSON数组：</label>
<textarea id="jsonInput" placeholder='请输入JSON数组，例如：\n[\n  {"name":"张三","age":25,"address":{"city":"北京","zip":"100000"}},\n  {"name":"李四","age":30,"address":{"city":"上海","zip":"200000"}}\n]'></textarea>

<div class="options">
<label>分隔符：<select id="delimiter"><option value=",">逗号 (CSV)</option><option value="tab">制表符 (TSV)</option><option value=";">分号</option><option value="|">竖线</option></select></label>
<label><input type="checkbox" id="includeHeaders" checked> 包含表头</label>
<label>编码：<select id="encoding"><option value="utf8">UTF-8</option><option value="utf8bom">UTF-8 with BOM</option></select></label>
</div>

<div class="btn-group">
<button class="btn btn-primary" onclick="convertToCsv()">转换</button>
<button class="btn btn-success" onclick="copyCsv()">📋 复制CSV</button>
<button class="btn btn-outline" onclick="downloadCsv()">💾 下载CSV</button>
<button class="btn btn-outline" onclick="downloadTsv()">💾 下载TSV</button>
</div>

<div id="preview"></div>

<label style="margin:16px 0 8px">CSV输出：</label>
<textarea id="csvOutput" readonly placeholder="CSV结果将显示在这里..."></textarea>

<div id="errorMsg" class="error"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<footer style="text-align:center;padding:20px;color:#999;font-size:13px;border-top:1px solid #eee;margin-top:40px">
© 2024 Web工具箱 | 纯前端工具，数据不上传服务器
</footer>

<script>
var currentCsv='';
var currentHeaders=[];

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

function copyCsv(){
  if(!currentCsv){showToast('请先转换数据');return}
  navigator.clipboard.writeText(currentCsv).then(function(){showToast('已复制到剪贴板')}).catch(function(){var ta=document.createElement('textarea');ta.value=currentCsv;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制到剪贴板')})
}

function flattenObject(obj,prefix){
  var result={};
  prefix=prefix||'';
  for(var key in obj){
    if(!obj.hasOwnProperty(key))continue;
    var newKey=prefix?prefix+'.'+key:key;
    var val=obj[key];
    if(val&&typeof val==='object'&&!Array.isArray(val)){
      var nested=flattenObject(val,newKey);
      for(var k in nested)result[k]=nested[k];
    }else if(Array.isArray(val)){
      result[newKey]=val.join(';');
    }else{
      result[newKey]=val===null||val===undefined?'':String(val);
    }
  }
  return result;
}

function getDelimiter(){
  var d=document.getElementById('delimiter').value;
  if(d==='tab')return'\t';
  return d;
}

function escapeCsvField(val,delim){
  var s=String(val);
  if(s.indexOf(delim)!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1||s.indexOf('\r')!==-1){
    return'"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

function convertToCsv(){
  document.getElementById('errorMsg').textContent='';
  document.getElementById('preview').innerHTML='';
  var input=document.getElementById('jsonInput').value.trim();
  if(!input){showToast('请先输入JSON');return}
  try{
    var arr=JSON.parse(input);
    if(!Array.isArray(arr)){
      document.getElementById('errorMsg').textContent='错误：请输入JSON数组';
      return;
    }
    if(arr.length===0){
      document.getElementById('csvOutput').value='';
      showToast('空数组');
      return;
    }
    // Flatten all objects
    var flatArr=[];
    var headerSet={};
    for(var i=0;i<arr.length;i++){
      var flat=flattenObject(arr[i]);
      flatArr.push(flat);
      for(var k in flat)headerSet[k]=true;
    }
    var headers=Object.keys(headerSet);
    currentHeaders=headers;
    var delim=getDelimiter();
    var includeHeaders=document.getElementById('includeHeaders').checked;
    var lines=[];
    if(includeHeaders){
      lines.push(headers.map(function(h){return escapeCsvField(h,delim)}).join(delim));
    }
    for(var i=0;i<flatArr.length;i++){
      var row=[];
      for(var j=0;j<headers.length;j++){
        var val=flatArr[i][headers[j]];
        row.push(escapeCsvField(val===undefined?'':val,delim));
      }
      lines.push(row.join(delim));
    }
    currentCsv=lines.join('\n');
    document.getElementById('csvOutput').value=currentCsv;
    // Show preview table
    showPreview(flatArr,headers);
  }catch(e){
    document.getElementById('errorMsg').textContent='JSON解析错误：'+e.message;
  }
}

function showPreview(flatArr,headers){
  var maxRows=Math.min(flatArr.length,100);
  var html='<div class="preview"><table><thead><tr>';
  for(var i=0;i<headers.length;i++){
    html+='<th>'+escapeHtml(headers[i])+'</th>';
  }
  html+='</tr></thead><tbody>';
  for(var i=0;i<maxRows;i++){
    html+='<tr>';
    for(var j=0;j<headers.length;j++){
      var val=flatArr[i][headers[j]];
      html+='<td>'+escapeHtml(val===undefined?'':val)+'</td>';
    }
    html+='</tr>';
  }
  if(flatArr.length>maxRows){
    html+='<tr><td colspan="'+headers.length+'" style="text-align:center;color:#999">... 共 '+flatArr.length+' 行，仅显示前 '+maxRows+' 行</td></tr>';
  }
  html+='</tbody></table></div>';
  document.getElementById('preview').innerHTML=html;
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function downloadFile(content,filename,type){
  var encoding=document.getElementById('encoding').value;
  var blob;
  if(encoding==='utf8bom'){
    var bom=new Uint8Array([0xEF,0xBB,0xBF]);
    blob=new Blob([bom,content],{type:type});
  }else{
    blob=new Blob([content],{type:type});
  }
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadCsv(){
  if(!currentCsv){showToast('请先转换数据');return}
  downloadFile(currentCsv,'data.csv','text/csv;charset=utf-8');
  showToast('CSV文件已下载');
}

function downloadTsv(){
  if(!currentCsv){showToast('请先转换数据');return}
  // Re-generate with tab delimiter
  var origDelim=document.getElementById('delimiter').value;
  document.getElementById('delimiter').value='tab';
  convertToCsv();
  downloadFile(currentCsv,'data.tsv','text/tab-separated-values;charset=utf-8');
  document.getElementById('delimiter').value=origDelim;
  showToast('TSV文件已下载');
}
(function() {
  var resizer = document.getElementById('resizer');
  if (!resizer) return;
  var layout = resizer.parentElement;
  var children = layout.children;
  var leftPanel = null, rightPanel = null;
  for (var i = 0; i < children.length; i++) {
    if (children[i] === resizer) { leftPanel = children[i-1]; rightPanel = children[i+1]; break; }
  }
  if (!leftPanel || !rightPanel) return;
  var isResizing = false, startX = 0, startLeftWidth = 0;
  resizer.addEventListener('mousedown', function(e) {
    isResizing = true; startX = e.clientX;
    startLeftWidth = leftPanel.getBoundingClientRect().width;
    resizer.classList.add('active'); document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none'; e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    var totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
    var delta = e.clientX - startX;
    var newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
    leftPanel.style.flex = 'none';
    leftPanel.style.width = (newLeftWidth / totalWidth * 100) + '%';
    rightPanel.style.flex = '1';
  });
  document.addEventListener('mouseup', function() {
    if (isResizing) { isResizing = false; resizer.classList.remove('active');
    document.body.style.cursor = ''; document.body.style.userSelect = ''; }
  });
  resizer.addEventListener('dblclick', function() {
    leftPanel.style.flex = ''; leftPanel.style.width = ''; rightPanel.style.flex = '';
  });
})();
</script>
</body>
</html>
