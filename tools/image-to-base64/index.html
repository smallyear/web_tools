<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转Base64 - Web工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.upload-area{border:2px dashed #ccc;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .3s,background .3s;margin-bottom:16px}
.upload-area:hover,.upload-area.dragover{border-color:#4a90d9;background:#f0f6ff}
.upload-area .icon{font-size:48px;margin-bottom:12px}
.upload-area p{color:#666;font-size:14px;margin:4px 0}
.options-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.options-row .form-group{margin-bottom:0}
.range-wrap{display:flex;align-items:center;gap:8px}
.range-wrap input[type=range]{width:140px}
.range-val{min-width:40px;font-size:13px;color:#555}
.preview-box{text-align:center;margin-bottom:16px}
.preview-box img{max-width:100%;max-height:250px;border:1px solid #ddd;border-radius:8px}
.size-info{background:#f5f5f5;border-radius:8px;padding:12px;margin-bottom:16px;font-size:14px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.output-area{margin-bottom:16px}
.output-label{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.output-box{background:#f9f9f9;border:1px solid #ddd;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:200px;overflow:auto;word-break:break-all;line-height:1.6;white-space:pre-wrap;user-select:all}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.hidden{display:none}
@media(max-width:768px){.options-row{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<nav class="navbar"><div class="container"><a href="../../" class="logo">🛠️ Web工具箱</a></div></nav>
<div class="container">
<div class="breadcrumb"><a href="../../">首页</a> &gt; <span>图片转Base64</span></div>
<div class="card tool-header"><h1>🔤 图片转Base64</h1><p>上传图片，转换为 Base64 编码字符串或 Data URI</p></div>
<div class="card">
<div class="upload-area" id="dropZone">
<div class="icon">📤</div>
<p><strong>点击上传</strong> 或 拖拽图片到此处</p>
<p style="color:#999;font-size:12px">支持 PNG、JPEG、WebP、GIF 等格式</p>
<input type="file" id="fileInput" accept="image/*" style="display:none">
</div>
<div id="optionsSection" class="hidden">
<div class="options-row">
<div class="form-group">
<label class="form-label">输出格式</label>
<select id="formatSelect" class="form-select" style="width:130px">
<option value="original">保持原格式</option>
<option value="image/png">PNG</option>
<option value="image/jpeg">JPEG</option>
<option value="image/webp">WebP</option>
</select>
</div>
<div class="form-group">
<label class="form-label">质量</label>
<div class="range-wrap">
<input type="range" id="qualitySlider" min="0.1" max="1" step="0.05" value="0.9">
<span class="range-val" id="qualityVal">0.90</span>
</div>
</div>
<div class="form-group">
<label class="form-label">最大宽度 (px)</label>
<input type="number" id="maxWidth" class="form-input" style="width:100px" placeholder="不限" min="0">
</div>
<div class="form-group">
<label class="form-label">最大高度 (px)</label>
<input type="number" id="maxHeight" class="form-input" style="width:100px" placeholder="不限" min="0">
</div>
<div class="form-group">
<button class="btn btn-primary" onclick="convertToBase64()">🔄 转换</button>
</div>
</div>
</div>
<div id="resultSection" class="hidden">
<div class="size-info">
<span>📄 原始大小: <strong id="origSize">-</strong></span>
<span>🔤 Base64大小: <strong id="b64Size">-</strong></span>
<span>📊 膨胀率: <strong id="ratio">-</strong></span>
</div>
<div class="preview-box"><img id="previewImg" src="" alt="预览"></div>
<div class="output-area">
<div class="output-label"><span>Base64 字符串</span><button class="btn btn-success" style="height:28px;padding:4px 12px;font-size:12px" onclick="copyBase64()">📋 复制</button></div>
<div class="output-box" id="base64Output"></div>
</div>
<div class="output-area">
<div class="output-label"><span>Data URI</span><button class="btn btn-success" style="height:28px;padding:4px 12px;font-size:12px" onclick="copyDataUri()">📋 复制</button></div>
<div class="output-box" id="dataUriOutput"></div>
</div>
<div class="btn-row">
<button class="btn btn-secondary" onclick="resetAll()">🔄 重新上传</button>
</div>
</div>
</div>
</div>
<footer class="footer"><p>Web工具箱 © 2024</p></footer>
<script src="../../assets/js/common.js"></script>
<script>
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const formatSelect=document.getElementById('formatSelect');
const qualitySlider=document.getElementById('qualitySlider');
const qualityVal=document.getElementById('qualityVal');
let currentDataUri='',currentBase64='',originalFile=null;

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});
qualitySlider.addEventListener('input',()=>{qualityVal.textContent=parseFloat(qualitySlider.value).toFixed(2)});

function handleFile(file){
if(!file||!file.type.startsWith('image/')){showMessage('error','请选择图片文件');return}
originalFile=file;
document.getElementById('origSize').textContent=formatFileSize(file.size);
document.getElementById('optionsSection').classList.remove('hidden');
document.getElementById('resultSection').classList.add('hidden');
// Auto convert
convertToBase64();
}

function convertToBase64(){
if(!originalFile)return;
const format=formatSelect.value;
const quality=parseFloat(qualitySlider.value);
const maxW=parseInt(document.getElementById('maxWidth').value)||0;
const maxH=parseInt(document.getElementById('maxHeight').value)||0;
const reader=new FileReader();
reader.onload=function(e){
const img=new Image();
img.onload=function(){
let w=img.width,h=img.height;
if(maxW>0&&w>maxW){h=Math.round(h*maxW/w);w=maxW}
if(maxH>0&&h>maxH){w=Math.round(w*maxH/h);h=maxH}
const canvas=document.createElement('canvas');
canvas.width=w;canvas.height=h;
canvas.getContext('2d').drawImage(img,0,0,w,h);
const outFormat=format==='original'?originalFile.type:format;
const dataUri=canvas.toDataURL(outFormat,quality);
currentDataUri=dataUri;
currentBase64=dataUri.split(',')[1]||'';
document.getElementById('previewImg').src=dataUri;
document.getElementById('base64Output').textContent=currentBase64;
document.getElementById('dataUriOutput').textContent=currentDataUri;
document.getElementById('b64Size').textContent=formatFileSize(currentBase64.length);
const ratio=((currentBase64.length/originalFile.size)*100).toFixed(1);
document.getElementById('ratio').textContent=ratio+'%';
document.getElementById('resultSection').classList.remove('hidden');
showMessage('success','转换完成！');
};
img.src=e.target.result;
};
reader.readAsDataURL(originalFile);
}

function copyBase64(){if(!currentBase64)return;copyToClipboard(currentBase64);showMessage('success','已复制 Base64 字符串')}
function copyDataUri(){if(!currentDataUri)return;copyToClipboard(currentDataUri);showMessage('success','已复制 Data URI')}

function resetAll(){
originalFile=null;currentDataUri='';currentBase64='';
fileInput.value='';
document.getElementById('optionsSection').classList.add('hidden');
document.getElementById('resultSection').classList.add('hidden');
document.getElementById('previewImg').src='';
document.getElementById('base64Output').textContent='';
document.getElementById('dataUriOutput').textContent='';
}
</script>
</body>
</html>
