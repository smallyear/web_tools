<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;line-height:1.6}
.navbar{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:12px 0;position:sticky;top:0;z-index:100}
.navbar .container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.navbar .logo{font-size:1.3rem;font-weight:700;color:#1a73e8;text-decoration:none}
.breadcrumb{max-width:1200px;margin:0 auto;padding:12px 20px;font-size:.9rem;color:#666}
.breadcrumb a{color:#1a73e8;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.header{background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px;text-align:center}
.header h1{font-size:1.8rem;margin-bottom:8px}
.header p{color:#666}
.input-section{background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px}
.parent-select{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px}
.parent-box{text-align:center}
.parent-box h3{margin-bottom:12px;font-size:1.1rem;color:#555}
.blood-options{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.blood-opt{width:56px;height:56px;border:2px solid #e0e0e0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;background:#fff}
.blood-opt:hover{border-color:#e91e63;transform:scale(1.05)}
.blood-opt.selected{border-color:#e91e63;background:#fce4ec;color:#e91e63}
.rh-section{text-align:center;margin-bottom:20px}
.rh-section label{margin:0 12px;cursor:pointer;font-size:.95rem}
.rh-section input[type="checkbox"]{margin-right:4px}
.btn-area{text-align:center}
.btn-area button{padding:12px 40px;background:linear-gradient(135deg,#e91e63,#f06292);color:#fff;border:none;border-radius: 10px;font-size:1.05rem;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-area button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(233,30,99,.3)}
.result-section{background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px;display:none}
.result-section.show{display:block}
.result-title{font-size:1.3rem;text-align:center;margin-bottom:24px}
.parents-display{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.parent-card{background:#fce4ec;border-radius:12px;padding:16px 28px;text-align:center}
.parent-card .label{font-size:.85rem;color:#999;margin-bottom:4px}
.parent-card .type{font-size:1.8rem;font-weight:700;color:#e91e63}
.parent-arrow{font-size:1.5rem;color:#999}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:24px}
.result-card{border-radius:12px;padding:20px;text-align:center;border:2px solid;transition:transform .2s}
.result-card:hover{transform:translateY(-2px)}
.result-card .blood-type{font-size:2rem;font-weight:700;margin-bottom:4px}
.result-card .probability{font-size:1.2rem;font-weight:600;margin-bottom:4px}
.result-card .prob-bar{height:6px;border-radius:3px;background:#e0e0e0;margin-top:8px;overflow:hidden}
.result-card .prob-fill{height:100%;border-radius:3px;transition:width .5s ease}
.rh-results{margin-top:20px}
.rh-title{font-size:1.1rem;margin-bottom:12px;text-align:center;color:#555}
.rh-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px}
.rh-card{border-radius: 10px;padding:12px;text-align:center;background:#f8f9fa}
.rh-card .rh-type{font-weight:700;font-size:1.1rem}
.rh-card .rh-prob{color:#e91e63;font-weight:600}
.info-section{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px}
.info-section h3{margin-bottom:12px}
.info-table{width:100%;border-collapse:collapse;font-size:.9rem}
.info-table th{background:#f8f9fa;padding:10px;text-align:left;border-bottom:2px solid #e0e0e0}
.info-table td{padding:10px;border-bottom:1px solid #f0f0f0}
.info-table tr:hover{background:#f8f9fa}
.punnett{margin:24px auto;border-collapse:collapse;text-align:center}
.punnett td,.punnett th{padding:10px 16px;border:2px solid #e0e0e0;font-size:.95rem;min-width:60px}
.punnett th{background:#fce4ec;color:#c2185b;font-weight:600}
.punnett td.highlight{background:#f3e5f5}
.diagram{display:flex;justify-content:center;align-items:center;gap:20px;margin:20px 0;flex-wrap:wrap}
.diagram-node{background:#fce4ec;border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#c2185b;border:3px solid #e91e63}
.diagram-line{font-size:1.5rem;color:#999}
.footer{text-align:center;padding:30px 20px;color:#999;font-size:.85rem;margin-top:40px}
@media(max-width:600px){
.parent-select{grid-template-columns:1fr}
.result-grid{grid-template-columns:repeat(2,1fr)}
.blood-opt{width:48px;height:48px;font-size:.9rem}
}
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="../../index.html" class="logo">🛠️ 网页工具集</a>
</div>
</nav>
<div class="breadcrumb">
<a href="../../index.html">首页</a> / 血型遗传查询
</div>
<div class="container">
<div class="header">
<h1>🧬 血型遗传查询</h1>
<p>根据父母血型预测子女可能的血型及概率</p>
</div>
<div class="input-section">
<div class="parent-select">
<div class="parent-box">
<h3>👨 父亲血型</h3>
<div class="blood-options" id="fatherOpts"></div>
</div>
<div class="parent-box">
<h3>👩 母亲血型</h3>
<div class="blood-options" id="motherOpts"></div>
</div>
</div>
<div class="rh-section">
<label><input type="checkbox" id="rhCheck" onchange="if(this.checked)rhSection.style.display='block';else rhSection.style.display='none'"> 考虑Rh因子</label>
<div id="rhSection" style="display:none;margin-top:12px">
<label style="margin-right:20px">父亲Rh：<select id="fatherRh"><option value="+">Rh阳性(+)</option><option value="-">Rh阴性(-)</option></select></label>
<label>母亲Rh：<select id="motherRh"><option value="+">Rh阳性(+)</option><option value="-">Rh阴性(-)</option></select></label>
</div>
</div>
<div class="btn-area">
<button onclick="calculate()">🧬 计算遗传结果</button>
</div>
</div>
<div class="result-section" id="resultSection">
<div id="resultContent"></div>
</div>
<div class="info-section">
<h3>📚 ABO血型遗传基础知识</h3>
<p style="margin-bottom:16px;color:#666">ABO血型由第9对染色体上的A、B、O三个等位基因决定。A和B为显性基因，O为隐性基因。</p>
<table class="info-table">
<thead><tr><th>血型</th><th>基因型</th><th>红细胞抗原</th><th>血浆抗体</th><th>中国人口占比</th></tr></thead>
<tbody>
<tr><td><strong>A型</strong></td><td>IAIA 或 IAi</td><td>A抗原</td><td>抗B抗体</td><td>~28%</td></tr>
<tr><td><strong>B型</strong></td><td>IBIB 或 IBi</td><td>B抗原</td><td>抗A抗体</td><td>~24%</td></tr>
<tr><td><strong>AB型</strong></td><td>IAIB</td><td>A和B抗原</td><td>无</td><td>~7%</td></tr>
<tr><td><strong>O型</strong></td><td>ii</td><td>无</td><td>抗A和抗B抗体</td><td>~41%</td></tr>
</tbody>
</table>
</div>
</div>
<div class="footer">网页工具集 &copy; 2026 | 纯前端实现，无需安装</div>
<script src="../../assets/js/common.js"></script>
<script>
const BLOOD_TYPES=['A','B','AB','O'];
const COLORS={'A':'#e91e63','B':'#9c27b0','AB':'#ff5722','O':'#2196F3'};

let selectedFather=null,selectedMother=null;

function buildOpts(containerId,setter){
const c=document.getElementById(containerId);
BLOOD_TYPES.forEach(t=>{
const btn=document.createElement('div');
btn.className='blood-opt';
btn.textContent=t+'型';
btn.onclick=()=>{
c.querySelectorAll('.blood-opt').forEach(b=>b.classList.remove('selected'));
btn.classList.add('selected');
setter(t);
};
c.appendChild(btn);
});
}
buildOpts('fatherOpts',t=>selectedFather=t);
buildOpts('motherOpts',t=>selectedMother=t);

// Full genetic cross table with probabilities
// Based on possible genotype crosses
const GENETIC_TABLE={
'A-A':{genotypes:['IAIA×IAIA','IAIA×IAi','IAi×IAIA','IAi×IAi'],results:{A:75,O:25}},
'A-B':{genotypes:['IAi×IBi','IAIA×IBi','IAi×IBIB','IAIA×IBIB'],results:{A:25,B:25,AB:25,O:25}},
'A-AB':{genotypes:['IAIA×IAIB','IAi×IAIB'],results:{A:50,AB:25,B:25}},
'A-O':{genotypes:['IAIA×ii','IAi×ii'],results:{A:50,O:50}},
'B-B':{genotypes:['IBIB×IBIB','IBIB×IBi','IBi×IBIB','IBi×IBi'],results:{B:75,O:25}},
'B-AB':{genotypes:['IBIB×IAIB','IBi×IAIB'],results:{B:50,AB:25,A:25}},
'B-O':{genotypes:['IBIB×ii','IBi×ii'],results:{B:50,O:50}},
'AB-AB':{genotypes:['IAIB×IAIB'],results:{A:25,B:25,AB:50}},
'AB-O':{genotypes:['IAIB×ii'],results:{A:50,B:50}},
'O-O':{genotypes:['ii×ii'],results:{O:100}}
};

function getKey(f,m){
const pair=[f,m].sort();
if(pair[0]==='A'&&pair[1]==='A')return'A-A';
if(pair[0]==='A'&&pair[1]==='B')return'A-B';
if(pair[0]==='A'&&pair[1]==='AB')return'A-AB';
if(pair[0]==='A'&&pair[1]==='O')return'A-O';
if(pair[0]==='B'&&pair[1]==='B')return'B-B';
if(pair[0]==='B'&&pair[1]==='AB')return'B-AB';
if(pair[0]==='B'&&pair[1]==='O')return'B-O';
if(pair[0]==='AB'&&pair[1]==='AB')return'AB-AB';
if(pair[0]==='AB'&&pair[1]==='O')return'AB-O';
if(pair[0]==='O'&&pair[1]==='O')return'O-O';
return null;
}

function calculate(){
if(!selectedFather||!selectedMother){alert('请选择父母双方的血型');return}
const key=selectedFather+'-'+selectedMother;
const altKey=selectedMother+'-'+selectedFather;
const data=GENETIC_TABLE[key]||GENETIC_TABLE[altKey];
if(!data)return;

const results=data.results;
const sortedTypes=Object.entries(results).sort((a,b)=>b[1]-a[1]);

let html='<div class="result-title">🧬 遗传分析结果</div>';
html+='<div class="parents-display">';
html+=`<div class="parent-card"><div class="label">父亲</div><div class="type">${selectedFather}型</div></div>`;
html+='<div class="diagram-line">✕</div>';
html+=`<div class="parent-card"><div class="label">母亲</div><div class="type">${selectedMother}型</div></div>`;
html+='<div class="diagram-line">→</div>';
html+=`<div class="parent-card" style="background:#e8f5e9"><div class="label">子女</div><div class="type" style="color:#2e7d32">${sortedTypes.map(([t])=>t+'型').join(' / ')}</div></div>`;
html+='</div>';

html+='<div class="result-grid">';
sortedTypes.forEach(([type,prob])=>{
const color=COLORS[type]||'#999';
html+=`<div class="result-card" style="border-color:${color}">
<div class="blood-type" style="color:${color}">${type}型</div>
<div class="probability">${prob}%</div>
<div class="prob-bar"><div class="prob-fill" style="width:${prob}%;background:${color}"></div></div>
</div>`;
});
html+='</div>';

// Rh factor
const rhCheck=document.getElementById('rhCheck');
if(rhCheck.checked){
const fRh=document.getElementById('fatherRh').value;
const mRh=document.getElementById('motherRh').value;
html+='<div class="rh-results"><div class="rh-title">Rh因子遗传分析</div>';
html+='<div class="rh-grid">';
const rhResults=getRhProb(fRh,mRh);
rhResults.forEach(r=>{
html+=`<div class="rh-card"><div class="rh-type">${r.type}</div><div class="rh-prob">${r.prob}%</div></div>`;
});
html+='</div></div>';
}

// Punnett square
html+='<h3 style="text-align:center;margin:24px 0 12px">📐 遗传棋盘（庞氏表）</h3>';
html+=renderPunnett(selectedFather,selectedMother);

document.getElementById('resultContent').innerHTML=html;
document.getElementById('resultSection').classList.add('show');
document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
}

function getRhProb(f,m){
// Rh+: DD or Dd (dominant), Rh-: dd (recessive)
// Assuming both parents could be homozygous or heterozygous
let results=[];
if(f==='+'&&m==='+'){
// Could be DD×DD, DD×Dd, Dd×DD, Dd×Dd
// Average: ~93.75% Rh+, ~6.25% Rh- (assuming equal chance of DD/Dd)
results=[{type:'Rh阳性(+)',prob:93.75},{type:'Rh阴性(-)',prob:6.25}];
}else if(f==='-'&&m==='-'){
results=[{type:'Rh阴性(-)',prob:100}];
}else{
// One Rh+, one Rh-
// Rh+ parent could be DD or Dd
results=[{type:'Rh阳性(+)',prob:75},{type:'Rh阴性(-)',prob:25}];
}
return results;
}

function getAlleles(type){
switch(type){
case'A':return['IA','i'];
case'B':return['IB','i'];
case'AB':return['IA','IB'];
case'O':return['i','i'];
}
}

function renderPunnett(father,mother){
const fAlleles=getAlleles(father);
const mAlleles=getAlleles(mother);
let h='<table class="punnett"><tr><th>父\\母</th>';
mAlleles.forEach(a=>h+=`<th>${a}</th>`);
h+='</tr>';
fAlleles.forEach(fa=>{
h+=`<tr><th>${fa}</th>`;
mAlleles.forEach(ma=>{
const combo=fa+ma;
let display;
if(combo==='IAIA'||combo==='IAi'||combo==='iIA')display='A型';
else if(combo==='IBIB'||combo==='IBi'||combo==='iIB')display='B型';
else if(combo==='IAIB')display='AB型';
else display='O型';
h+=`<td class="highlight">${fa+ma}<br><small>${display}</small></td>`;
});
h+='</tr>';
});
h+='</table>';
return h;
}
</script>
<footer class="footer"><div class="footer-container"><p>&copy; 2026 Web Tools - 纯前端工具，数据安全</p></div></footer>
</body>
