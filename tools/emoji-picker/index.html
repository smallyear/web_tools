.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }

const container = document.getElementById('emojiContainer');
const searchInput = document.getElementById('search');
const toast = document.getElementById('toast');

function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1200);
}

function copyEmoji(emoji) {
  if (typeof copyToClipboard === 'function') copyToClipboard(emoji);
  else navigator.clipboard.writeText(emoji);
  showToast('已复制：' + emoji);
}

function render(filter) {
  container.innerHTML = '';
  const f = (filter || '').toLowerCase();
  Object.entries(emojiData).forEach(([cat, items]) => {
    const filtered = f ? items.filter(item => item.n.includes(f) || item.e.includes(f) || cat.includes(f)) : items;
    if (filtered.length === 0) return;
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `<h3>${cat}（${filtered.length}）</h3>`;
    const grid = document.createElement('div');
    grid.className = 'emoji-grid';
    filtered.forEach(item => {
      const el = document.createElement('div');
      el.className = 'emoji-item';
      el.textContent = item.e;
      el.title = item.n + ' - 点击复制';
      el.onclick = () => copyEmoji(item.e);
      grid.appendChild(el);
    });
    div.appendChild(grid);
    container.appendChild(div);
  });
}

searchInput.addEventListener('input', () => render(searchInput.value));
