<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本处理工作流引擎 - 在线工具箱</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .workflow-layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
    @media (max-width: 768px) { .workflow-layout { grid-template-columns: 1fr; } }

    .ops-sidebar { background: var(--card-bg); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .ops-sidebar-title { padding: 12px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); color: var(--primary-dark); }
    .ops-search { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .ops-search input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; }
    .ops-search input:focus { outline: none; border-color: var(--primary); }
    .ops-list { max-height: 440px; overflow-y: auto; }
    .ops-list-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; font-size: 14px; user-select: none; }
    .ops-list-item:hover { background: #E3F2FD; }
    .ops-list-item .op-icon { font-size: 16px; flex-shrink: 0; }
    .ops-list-item > * { flex: 1; min-width: 0; }

    .pipeline-panel { background: var(--card-bg); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 160px; display: flex; flex-direction: column; }
    .pipeline-header { padding: 12px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); color: var(--primary-dark); display: flex; justify-content: space-between; align-items: center; }
    .pipeline-actions { display: flex; gap: 8px; }
    .pipeline-body { padding: 12px; flex: 1; overflow-y: auto; max-height: 400px; }
    .pipeline-empty { text-align: center; color: var(--text-secondary); padding: 40px 16px; font-size: 14px; }

    .step-card { background: #FAFAFA; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; transition: background 0.15s, box-shadow 0.15s; }
    .step-card.dragging { opacity: 0.5; background: #E3F2FD; }
    .step-card.dragover { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(30,136,229,0.2); }
    .step-card.active-step { border-color: var(--primary); background: #E3F2FD; }
    .step-drag { cursor: grab; font-size: 18px; color: #999; user-select: none; padding: 0 4px; }
    .step-drag:active { cursor: grabbing; }
    .step-name { font-weight: 600; font-size: 14px; color: var(--primary-dark); min-width: 80px; }
    .step-config { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; align-items: center; }
    .step-config input, .step-config select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; height: 30px; }
    .step-config input[type="text"], .step-config input[type="number"] { width: 140px; }
    .step-config select { width: 110px; }
    .step-config label { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .step-delete { background: none; border: none; color: var(--error); cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
    .step-delete:hover { color: #B71C1C; }
    .step-num { background: var(--primary); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

    .preset-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .preset-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; }
    .preset-bar input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; width: 140px; }

    .io-area { display: flex; gap: 16px; margin-top: 16px; }
    @media (max-width: 768px) { .io-area { flex-direction: column; } }
    .io-box textarea { width: 100%; min-height: 200px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Menlo', 'Consolas', monospace; resize: vertical; line-height: 1.6; }
    .io-box textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,136,229,0.15); }
    .io-label { font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .execute-bar { text-align: center; margin: 16px 0; display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; }
    .execute-bar button { font-size: 18px; padding: 12px 48px; }
    .undo-btn { font-size: 14px !important; padding: 10px 20px !important; }

    /* 操作历史 */
    .history-panel { background: var(--card-bg); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 16px; }
    .history-header { padding: 12px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); color: var(--primary-dark); display: flex; justify-content: space-between; align-items: center; }
    .history-body { padding: 12px 16px; max-height: 200px; overflow-y: auto; font-size: 13px; font-family: 'Menlo', 'Consolas', monospace; }
    .history-empty { color: var(--text-secondary); text-align: center; padding: 16px; }
    .history-item { padding: 6px 0; border-bottom: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: baseline; }
    .history-item:last-child { border-bottom: none; }
    .history-time { color: var(--text-secondary); font-size: 11px; flex-shrink: 0; }
    .history-op { color: var(--primary-dark); font-weight: 600; }
    .history-result { color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }

    .resizer {
      width: 12px; cursor: col-resize; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; user-select: none;
    }
    .resizer::after {
      content: ''; width: 4px; height: 48px; background: var(--border);
      border-radius: 2px; transition: background 0.2s, height 0.2s;
    }
    .resizer:hover::after, .resizer.active::after { background: var(--primary); height: 64px; }
    @media (max-width: 768px) {
      .resizer { width: 100%; height: 12px; cursor: row-resize; }
      .resizer::after { width: 48px; height: 4px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ 在线工具箱</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <p style="color:var(--text-secondary);margin-bottom:4px;font-size:13px;">
        <a href="../../index.html" style="color:var(--primary);text-decoration:none;">首页</a> / 文本处理工作流引擎
      </p>
      <h2 style="margin-bottom:20px;">🔄 文本处理工作流引擎</h2>

      <!-- 预设管理 -->
      <div class="preset-bar">
        <select id="presetSelect"><option value="">-- 加载预设 --</option></select>
        <button class="btn btn-secondary" onclick="loadPreset()">加载</button>
        <button class="btn btn-secondary" onclick="deletePreset()">删除</button>
        <span style="color:var(--border);">|</span>
        <input type="text" id="presetName" placeholder="预设名称">
        <button class="btn btn-primary" onclick="savePreset()">💾 保存预设</button>
        <span style="color:var(--border);">|</span>
        <button class="btn btn-secondary" onclick="exportWorkflow()">📤 导出JSON</button>
        <button class="btn btn-secondary" onclick="importWorkflow()">📥 导入JSON</button>
      </div>

      <!-- 主布局 -->
      <div class="workflow-layout">
        <!-- 操作列表 -->
        <div class="ops-sidebar">
          <div class="ops-sidebar-title">📋 可用操作</div>
          <div class="ops-search"><input type="text" id="opsSearch" placeholder="搜索操作..." oninput="filterOps()"></div>
          <div class="ops-list" id="opsList"></div>
        </div>

        <!-- 流水线 -->
        <div class="pipeline-panel">
          <div class="pipeline-header">
            <span>🔗 工作流流水线 (<span id="stepCount">0</span> 步)</span>
            <div class="pipeline-actions">
              <button class="btn btn-secondary" style="height:30px;padding:0 12px;font-size:12px;" onclick="clearWorkflow()">🗑️ 清空</button>
            </div>
          </div>
          <div class="pipeline-body" id="pipelineBody">
            <div class="pipeline-empty" id="pipelineEmpty">点击左侧操作添加到工作流</div>
          </div>
        </div>
      </div>

      <!-- 执行按钮 -->
      <div class="execute-bar">
        <button class="btn btn-success" onclick="executeWorkflow()" style="font-size:18px;padding:14px 56px;">🚀 执行工作流</button>
        <button class="btn btn-secondary undo-btn" onclick="undoLast()" title="撤销上一步执行">↩️ 撤销</button>
      </div>

      <!-- 输入输出 -->
      <div class="io-area">
        <div class="io-box">
          <div class="io-label"><span>📝 输入文本</span><button class="btn btn-secondary" style="height:26px;padding:0 10px;font-size:12px;" onclick="clearInput()">清空</button></div>
          <textarea id="inputText" placeholder="在此输入文本..."></textarea>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="io-box">
          <div class="io-label"><span>📤 输出结果</span><button class="btn btn-secondary" style="height:26px;padding:0 10px;font-size:12px;" onclick="copyOutput()">复制</button></div>
          <textarea id="outputText" placeholder="执行工作流后结果将显示在这里..." readonly></textarea>
        </div>
      </div>

      <!-- 操作历史 -->
      <div class="history-panel">
        <div class="history-header">
          <span>📜 操作历史</span>
          <button class="btn btn-secondary" style="height:28px;padding:0 12px;font-size:12px;" onclick="clearHistory()">清空历史</button>
        </div>
        <div class="history-body" id="historyBody">
          <div class="history-empty">暂无操作历史</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container"><p>🛠️ 在线工具箱 - 文本处理工作流引擎</p></div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    // 操作定义
    const OPERATIONS = [
      { id: 'replace', name: '文本替换', icon: '🔍', config: [
        { key: 'find', type: 'text', placeholder: '查找文本' },
        { key: 'repl', type: 'text', placeholder: '替换为' },
        { key: 'useRegex', type: 'checkbox', label: '正则' }
      ]},
      { id: 'regex', name: '正则替换', icon: '🔤', config: [
        { key: 'pattern', type: 'text', placeholder: '正则表达式' },
        { key: 'repl', type: 'text', placeholder: '替换为' }
      ]},
      { id: 'regexExtract', name: '正则提取', icon: '🎯', config: [
        { key: 'pattern', type: 'text', placeholder: '正则表达式' },
        { key: 'joinSep', type: 'text', placeholder: '分隔符(默认换行)', default: '' }
      ]},
      { id: 'prefix', name: '添加前缀', icon: '⬅️', config: [
        { key: 'text', type: 'text', placeholder: '前缀文本' }
      ]},
      { id: 'suffix', name: '添加后缀', icon: '➡️', config: [
        { key: 'text', type: 'text', placeholder: '后缀文本' }
      ]},
      { id: 'insert', name: '插入内容', icon: '📌', config: [
        { key: 'position', type: 'select', options: [{ value: 'start', label: '行首' }, { value: 'end', label: '行末' }] },
        { key: 'content', type: 'text', placeholder: '插入内容' }
      ]},
      { id: 'removeEmpty', name: '删除空行', icon: '🧹', config: [] },
      { id: 'dedupe', name: '文本去重', icon: '♐', config: [] },
      { id: 'dedupeLines', name: '行去重(保持顺序)', icon: '♐', config: [] },
      { id: 'sort', name: '排序', icon: '📊', config: [
        { key: 'order', type: 'select', options: [{ value: 'asc', label: '升序' }, { value: 'desc', label: '降序' }, { value: 'random', label: '随机' }] }
      ]},
      { id: 'sortByLength', name: '按长度排序', icon: '📏', config: [
        { key: 'order', type: 'select', options: [{ value: 'asc', label: '短→长' }, { value: 'desc', label: '长→短' }] }
      ]},
      { id: 'addLineNum', name: '增加行号', icon: '🔢', config: [
        { key: 'start', type: 'number', placeholder: '起始号', default: 1 },
        { key: 'format', type: 'select', options: [{ value: 'dot', label: '1. 2. 3.' }, { value: 'paren', label: '1) 2) 3)' }, { value: 'hash', label: '#1 #2' }, { value: 'plain', label: '1 2 3' }] }
      ]},
      { id: 'removeLineNum', name: '删除行号', icon: '🔠', config: [] },
      { id: 'caseConvert', name: '大小写转换', icon: '🔡', config: [
        { key: 'mode', type: 'select', options: [{ value: 'upper', label: '全部大写' }, { value: 'lower', label: '全部小写' }, { value: 'capitalize', label: '首字母大写' }, { value: 'swap', label: '大小写互换' }] }
      ]},
      { id: 'trim', name: '修剪空格', icon: '✂️', config: [] },
      { id: 'lineBreak', name: '换行符转换', icon: '↩️', config: [
        { key: 'target', type: 'select', options: [{ value: 'lf', label: '→ LF (\\n)' }, { value: 'crlf', label: '→ CRLF (\\r\\n)' }, { value: 'comma', label: '→ 逗号' }, { value: 'space', label: '→ 空格' }] }
      ]},
      { id: 'sliceLines', name: '截取行', icon: '📐', config: [
        { key: 'from', type: 'number', placeholder: '从第N行', default: 1 },
        { key: 'to', type: 'number', placeholder: '到第M行' }
      ]},
      { id: 'reverse', name: '反转', icon: '🔃', config: [
        { key: 'mode', type: 'select', options: [{ value: 'lines', label: '反转行序' }, { value: 'each', label: '反转每行' }] }
      ]},
      { id: 'base64enc', name: 'Base64编码', icon: '🔐', config: [] },
      { id: 'base64dec', name: 'Base64解码', icon: '🔓', config: [] },
      { id: 'urlencode', name: 'URL编码', icon: '🌐', config: [] },
      { id: 'urldecode', name: 'URL解码', icon: '🔗', config: [] },
      { id: 'countOccurrences', name: '统计出现次数', icon: '📈', config: [
        { key: 'target', type: 'text', placeholder: '要统计的文本' },
        { key: 'mode', type: 'select', options: [{ value: 'text', label: '按文本' }, { value: 'line', label: '按行统计' }] }
      ]},
      { id: 'reverseEachLine', name: '反转每行', icon: '🔄', config: [] }
    ];

    let workflow = [];
    let dragIdx = null;
    let history = [];
    let undoStack = []; // {inputText, outputText, workflow}

    // 初始化操作列表
    function initOpsList() {
      renderOpsList(OPERATIONS);
    }

    function renderOpsList(ops) {
      const list = document.getElementById('opsList');
      list.innerHTML = ops.map(op =>
        `<div class="ops-list-item" onclick="addStep('${op.id}')"><span class="op-icon">${op.icon}</span><span>${op.name}</span></div>`
      ).join('');
    }

    function filterOps() {
      const q = document.getElementById('opsSearch').value.toLowerCase();
      const filtered = OPERATIONS.filter(op => op.name.toLowerCase().includes(q) || op.id.toLowerCase().includes(q));
      renderOpsList(filtered);
    }

    // 添加步骤
    function addStep(opId) {
      const op = OPERATIONS.find(o => o.id === opId);
      if (!op) return;
      const config = {};
      op.config.forEach(c => {
        config[c.key] = c.default !== undefined ? c.default : (c.type === 'checkbox' ? false : (c.type === 'select' ? c.options[0].value : ''));
      });
      workflow.push({ op: opId, config });
      renderPipeline();
    }

    // 删除步骤
    function removeStep(idx) {
      workflow.splice(idx, 1);
      renderPipeline();
    }

    // 清空工作流
    function clearWorkflow() {
      workflow = [];
      renderPipeline();
    }

    // 渲染流水线
    function renderPipeline() {
      const body = document.getElementById('pipelineBody');
      document.getElementById('stepCount').textContent = workflow.length;

      if (workflow.length === 0) {
        body.innerHTML = '<div class="pipeline-empty">点击左侧操作添加到工作流</div>';
        return;
      }

      body.innerHTML = workflow.map((step, i) => {
        const op = OPERATIONS.find(o => o.id === step.op);
        let configHtml = '';
        op.config.forEach(c => {
          if (c.type === 'text') {
            configHtml += `<input type="text" placeholder="${c.placeholder || ''}" value="${escHtml(step.config[c.key] || '')}" onchange="updateConfig(${i},'${c.key}',this.value)">`;
          } else if (c.type === 'number') {
            configHtml += `<input type="number" placeholder="${c.placeholder || ''}" value="${step.config[c.key] || ''}" style="width:80px" onchange="updateConfig(${i},'${c.key}',this.value)">`;
          } else if (c.type === 'select') {
            configHtml += `<select onchange="updateConfig(${i},'${c.key}',this.value)">${c.options.map(o => `<option value="${o.value}" ${step.config[c.key]===o.value?'selected':''}>${o.label}</option>`).join('')}</select>`;
          } else if (c.type === 'checkbox') {
            configHtml += `<label><input type="checkbox" ${step.config[c.key]?'checked':''} onchange="updateConfig(${i},'${c.key}',this.checked)">${c.label||''}</label>`;
          }
        });
        return `<div class="step-card" draggable="true" data-idx="${i}"
          ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event,${i})" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)">
          <span class="step-drag">☰</span>
          <span class="step-num">${i+1}</span>
          <span class="step-name">${op.icon} ${op.name}</span>
          <div class="step-config">${configHtml}</div>
          <button class="step-delete" onclick="removeStep(${i})" title="删除">×</button>
        </div>`;
      }).join('');
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function updateConfig(idx, key, value) {
      workflow[idx].config[key] = value;
    }

    // 拖拽排序
    function onDragStart(e, idx) { dragIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.closest('.step-card').classList.add('dragging'); }
    function onDragOver(e, idx) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.target.closest('.step-card')?.classList.add('dragover'); }
    function onDragLeave(e) { e.target.closest('.step-card')?.classList.remove('dragover'); }
    function onDrop(e, idx) {
      e.preventDefault();
      e.target.closest('.step-card')?.classList.remove('dragover');
      if (dragIdx !== null && dragIdx !== idx) {
        const item = workflow.splice(dragIdx, 1)[0];
        workflow.splice(idx, 0, item);
        renderPipeline();
      }
      dragIdx = null;
    }
    function onDragEnd(e) { e.target.closest('.step-card')?.classList.remove('dragging'); dragIdx = null; }

    // 执行工作流
    function executeWorkflow() {
      if (workflow.length === 0) { showMessage('warning', '请先添加操作步骤'); return; }
      let text = document.getElementById('inputText').value;
      const inputSnapshot = text;

      for (let si = 0; si < workflow.length; si++) {
        const step = workflow[si];
        const c = step.config;
        try {
          switch (step.op) {
            case 'replace':
              if (c.useRegex) {
                text = text.split('\n').map(line => line.replace(new RegExp(c.find, 'g'), c.repl)).join('\n');
              } else {
                text = text.split(c.find).join(c.repl);
              }
              break;
            case 'regex':
              text = text.replace(new RegExp(c.pattern, 'g'), c.repl);
              break;
            case 'regexExtract': {
              const re = new RegExp(c.pattern, 'g');
              const matches = [];
              let m;
              while ((m = re.exec(text)) !== null) {
                matches.push(m[1] !== undefined ? m[1] : m[0]);
              }
              const sep = c.joinSep || '\n';
              text = matches.join(sep);
              break;
            }
            case 'prefix':
              text = text.split('\n').map(line => c.text + line).join('\n');
              break;
            case 'suffix':
              text = text.split('\n').map(line => line + c.text).join('\n');
              break;
            case 'insert':
              text = text.split('\n').map(line => c.position === 'start' ? c.content + line : line + c.content).join('\n');
              break;
            case 'removeEmpty':
              text = text.split('\n').filter(line => line.trim() !== '').join('\n');
              break;
            case 'dedupe': {
              const seen = new Set();
              text = text.split('\n').filter(line => { if (seen.has(line)) return false; seen.add(line); return true; }).join('\n');
              break;
            }
            case 'dedupeLines': {
              const seen2 = new Set();
              const result = [];
              text.split('\n').forEach(line => { if (!seen2.has(line)) { seen2.add(line); result.push(line); } });
              text = result.join('\n');
              break;
            }
            case 'sort': {
              let lines = text.split('\n');
              if (c.order === 'asc') lines.sort((a,b) => a.localeCompare(b));
              else if (c.order === 'desc') lines.sort((a,b) => b.localeCompare(a));
              else { for (let i = lines.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [lines[i], lines[j]] = [lines[j], lines[i]]; } }
              text = lines.join('\n');
              break;
            }
            case 'sortByLength': {
              let lines = text.split('\n');
              lines.sort((a, b) => c.order === 'desc' ? b.length - a.length : a.length - b.length);
              text = lines.join('\n');
              break;
            }
            case 'addLineNum': {
              let start = parseInt(c.start) || 1;
              const fmt = c.format || 'dot';
              text = text.split('\n').map((line, i) => {
                const n = start + i;
                if (fmt === 'dot') return n + '. ' + line;
                if (fmt === 'paren') return n + ') ' + line;
                if (fmt === 'hash') return '#' + n + ' ' + line;
                return n + ' ' + line;
              }).join('\n');
              break;
            }
            case 'removeLineNum':
              text = text.split('\n').map(line => line.replace(/^\s*#?\d+[\.\)\]\s:：]+/, '')).join('\n');
              break;
            case 'caseConvert':
              if (c.mode === 'upper') text = text.toUpperCase();
              else if (c.mode === 'lower') text = text.toLowerCase();
              else if (c.mode === 'capitalize') text = text.split('\n').map(l => l.replace(/\b\w/g, ch => ch.toUpperCase())).join('\n');
              else text = text.split('').map(ch => ch === ch.toUpperCase() ? ch.toLowerCase() : ch.toUpperCase()).join('');
              break;
            case 'trim':
              text = text.split('\n').map(line => line.trim()).join('\n');
              break;
            case 'lineBreak':
              text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
              if (c.target === 'crlf') text = text.replace(/\n/g, '\r\n');
              else if (c.target === 'comma') text = text.replace(/\n/g, ', ');
              else if (c.target === 'space') text = text.replace(/\n/g, ' ');
              break;
            case 'sliceLines': {
              let lines = text.split('\n');
              let from = Math.max(1, parseInt(c.from) || 1);
              let to = c.to ? Math.min(lines.length, parseInt(c.to)) : lines.length;
              text = lines.slice(from - 1, to).join('\n');
              break;
            }
            case 'reverse':
              if (c.mode === 'each') text = text.split('\n').map(line => [...line].reverse().join('')).join('\n');
              else text = text.split('\n').reverse().join('\n');
              break;
            case 'reverseEachLine':
              text = text.split('\n').map(line => [...line].reverse().join('')).join('\n');
              break;
            case 'base64enc':
              text = btoa(unescape(encodeURIComponent(text)));
              break;
            case 'base64dec':
              text = decodeURIComponent(escape(atob(text)));
              break;
            case 'urlencode':
              text = encodeURIComponent(text);
              break;
            case 'urldecode':
              text = decodeURIComponent(text);
              break;
            case 'countOccurrences': {
              const opName = OPERATIONS.find(o => o.id === step.op).name;
              if (c.mode === 'line') {
                const freq = {};
                text.split('\n').forEach(line => { if (line.trim()) freq[line] = (freq[line] || 0) + 1; });
                text = Object.entries(freq).sort((a,b) => b[1] - a[1]).map(([line, count]) => `${count}次\t${line}`).join('\n');
              } else {
                const needle = c.target || '';
                if (!needle) { text = '请指定要统计的文本'; break; }
                const count = text.split(needle).length - 1;
                text = `"${needle}" 出现了 ${count} 次`;
              }
              break;
            }
          }
        } catch (err) {
          showMessage('error', `步骤 ${si+1} (${OPERATIONS.find(o=>o.id===step.op).name}) 执行出错: ${err.message}`);
          return;
        }
      }

      document.getElementById('outputText').value = text;

      // 保存到撤销栈
      undoStack.push({ inputText: inputSnapshot, outputText: text, workflow: JSON.parse(JSON.stringify(workflow)) });
      if (undoStack.length > 20) undoStack.shift();

      // 记录历史
      addHistory(workflow, text);

      showMessage('success', '工作流执行完成！');
    }

    // 撤销
    function undoLast() {
      if (undoStack.length === 0) { showMessage('warning', '没有可撤销的操作'); return; }
      const last = undoStack.pop();
      document.getElementById('inputText').value = last.inputText;
      document.getElementById('outputText').value = '';
      showMessage('success', '已撤销上一步操作');
    }

    // 操作历史
    function addHistory(wf, result) {
      const opNames = wf.map(s => OPERATIONS.find(o => o.id === s.op)?.name || s.op).join(' → ');
      const time = new Date().toLocaleTimeString('zh-CN');
      history.unshift({ time, opNames, result: result.substring(0, 200) });
      if (history.length > 50) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const body = document.getElementById('historyBody');
      if (history.length === 0) {
        body.innerHTML = '<div class="history-empty">暂无操作历史</div>';
        return;
      }
      body.innerHTML = history.map(h =>
        `<div class="history-item"><span class="history-time">${h.time}</span><span class="history-op">${escHtml(h.opNames)}</span><span class="history-result">${escHtml(h.result)}</span></div>`
      ).join('');
    }

    function clearHistory() {
      history = [];
      renderHistory();
    }

    function clearInput() { document.getElementById('inputText').value = ''; }
    function copyOutput() {
      const text = document.getElementById('outputText').value;
      if (!text) { showMessage('warning', '没有可复制的内容'); return; }
      copyToClipboard(text).then(() => showMessage('success', '已复制到剪贴板'));
    }

    // 预设管理
    function getPresets() { try { return JSON.parse(localStorage.getItem('textWorkflowPresets') || '{}'); } catch { return {}; } }
    function savePresets(presets) { localStorage.setItem('textWorkflowPresets', JSON.stringify(presets)); }
    function refreshPresetSelect() {
      const presets = getPresets();
      const sel = document.getElementById('presetSelect');
      sel.innerHTML = '<option value="">-- 加载预设 --</option>' + Object.keys(presets).map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');
    }
    function savePreset() {
      const name = document.getElementById('presetName').value.trim();
      if (!name) { showMessage('warning', '请输入预设名称'); return; }
      const presets = getPresets();
      presets[name] = JSON.parse(JSON.stringify(workflow));
      savePresets(presets);
      refreshPresetSelect();
      showMessage('success', `预设"${name}"已保存`);
    }
    function loadPreset() {
      const name = document.getElementById('presetSelect').value;
      if (!name) { showMessage('warning', '请选择预设'); return; }
      const presets = getPresets();
      if (presets[name]) { workflow = presets[name]; renderPipeline(); showMessage('success', `已加载预设"${name}"`); }
    }
    function deletePreset() {
      const name = document.getElementById('presetSelect').value;
      if (!name) { showMessage('warning', '请选择要删除的预设'); return; }
      const presets = getPresets();
      delete presets[name];
      savePresets(presets);
      refreshPresetSelect();
      showMessage('success', `预设"${name}"已删除`);
    }

    // 导出/导入
    function exportWorkflow() {
      if (workflow.length === 0) { showMessage('warning', '工作流为空'); return; }
      const json = JSON.stringify(workflow, null, 2);
      copyToClipboard(json).then(() => showMessage('success', '工作流JSON已复制到剪贴板'));
    }
    function importWorkflow() {
      const json = prompt('请粘贴工作流JSON:');
      if (!json) return;
      try {
        const data = JSON.parse(json);
        if (!Array.isArray(data)) throw new Error('格式错误');
        workflow = data;
        renderPipeline();
        showMessage('success', '工作流已导入');
      } catch (err) { showMessage('error', 'JSON解析失败: ' + err.message); }
    }

    // 初始化
    initOpsList();
    refreshPresetSelect();
    (function() {
      var resizer = document.getElementById('resizer');
      if (!resizer) return;
      var layout = resizer.parentElement;
      var children = layout.children;
      var leftPanel = null, rightPanel = null;
      for (var i = 0; i < children.length; i++) {
        if (children[i] === resizer) { leftPanel = children[i-1]; rightPanel = children[i+1]; break; }
      }
      if (!leftPanel || !rightPanel) return;
      var isResizing = false, startX = 0, startLeftWidth = 0;
      resizer.addEventListener('mousedown', function(e) {
        isResizing = true; startX = e.clientX;
        startLeftWidth = leftPanel.getBoundingClientRect().width;
        resizer.classList.add('active'); document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none'; e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        var totalWidth = layout.getBoundingClientRect().width - resizer.getBoundingClientRect().width;
        var delta = e.clientX - startX;
        var newLeftWidth = Math.max(200, Math.min(startLeftWidth + delta, totalWidth - 200));
        leftPanel.style.flex = 'none';
        leftPanel.style.width = (newLeftWidth / totalWidth * 100) + '%';
        rightPanel.style.flex = '1';
      });
      document.addEventListener('mouseup', function() {
        if (isResizing) { isResizing = false; resizer.classList.remove('active');
        document.body.style.cursor = ''; document.body.style.userSelect = ''; }
      });
      resizer.addEventListener('dblclick', function() {
        leftPanel.style.flex = ''; leftPanel.style.width = ''; rightPanel.style.flex = '';
      });
    })();
  </script>
</body>
</html>
