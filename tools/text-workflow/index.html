<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ж–Үжң¬еӨ„зҗҶе·ҘдҪңжөҒеј•ж“Һ - еңЁзәҝе·Ҙе…·з®ұ</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .workflow-layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
    @media (max-width: 768px) { .workflow-layout { grid-template-columns: 1fr; } }

    /* ж“ҚдҪңдҫ§иҫ№ж Ҹ */
    .ops-sidebar { background: var(--card-bg); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .ops-sidebar-title { padding: 12px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); color: var(--primary-dark); }
    .ops-list { max-height: 480px; overflow-y: auto; }
    .ops-list-item {
    .ops-list-item > * { flex: 1; min-width: 0; }
    .ops-list-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; font-size: 14px; user-select: none; }
    .ops-list-item:hover { background: #E3F2FD; }
    .ops-list-item .op-icon { font-size: 16px; flex-shrink: 0; }

    /* жөҒж°ҙзәҝйқўжқҝ */
    .pipeline-panel { background: var(--card-bg); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 160px; display: flex; flex-direction: column; }
    .pipeline-header { padding: 12px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); color: var(--primary-dark); display: flex; justify-content: space-between; align-items: center; }
    .pipeline-actions { display: flex; gap: 8px; }
    .pipeline-body { padding: 12px; flex: 1; overflow-y: auto; max-height: 400px; }
    .pipeline-empty { text-align: center; color: var(--text-secondary); padding: 40px 16px; font-size: 14px; }

    /* жөҒж°ҙзәҝжӯҘйӘӨеҚЎзүҮ */
    .step-card { background: #FAFAFA; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; transition: background 0.15s, box-shadow 0.15s; }
    .step-card.dragging { opacity: 0.5; background: #E3F2FD; }
    .step-card.dragover { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(30,136,229,0.2); }
    .step-card.active-step { border-color: var(--primary); background: #E3F2FD; }
    .step-drag { cursor: grab; font-size: 18px; color: #999; user-select: none; padding: 0 4px; }
    .step-drag:active { cursor: grabbing; }
    .step-name { font-weight: 600; font-size: 14px; color: var(--primary-dark); min-width: 80px; }
    .step-config { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; align-items: center; }
    .step-config input, .step-config select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; height: 30px; }
    .step-config input[type="text"], .step-config input[type="number"] { width: 140px; }
    .step-config select { width: 110px; }
    .step-config label { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .step-delete { background: none; border: none; color: var(--error); cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
    .step-delete:hover { color: #B71C1C; }
    .step-num { background: var(--primary); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

    /* йў„и®ҫж Ҹ */
    .preset-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .preset-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; }
    .preset-bar input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; width: 140px; }

    /* иҫ“е…Ҙиҫ“еҮәеҢә */
    .io-area { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 768px) { .io-area { grid-template-columns: 1fr; } }
    .io-box textarea { width: 100%; min-height: 200px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Menlo', 'Consolas', monospace; resize: vertical; line-height: 1.6; }
    .io-box textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,136,229,0.15); }
    .io-label { font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .execute-bar { text-align: center; margin: 16px 0; }
    .execute-bar button { font-size: 18px; padding: 12px 48px; }
  
    /* жӢ–жӢҪеҲҶйҡ”жқЎ */
    .resizer {
      width: 12px; cursor: col-resize; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; user-select: none;
    }
    .resizer::after {
      content: ''; width: 4px; height: 48px; background: var(--border);
      border-radius: 2px; transition: background 0.2s, height 0.2s;
    }
    .resizer:hover::after, .resizer.active::after { background: var(--primary); height: 64px; }
    @media (max-width: 768px) {
      .resizer { width: 100%; height: 12px; cursor: row-resize; }
      .resizer::after { width: 48px; height: 4px; }
    }

  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">рҹӣ пёҸ еңЁзәҝе·Ҙе…·з®ұ</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">йҰ–йЎө</a>
      </div>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <p style="color:var(--text-secondary);margin-bottom:4px;font-size:13px;">
        <a href="../../index.html" style="color:var(--primary);text-decoration:none;">йҰ–йЎө</a> / ж–Үжң¬еӨ„зҗҶе·ҘдҪңжөҒеј•ж“Һ
      </p>
      <h2 style="margin-bottom:20px;">рҹ”„ ж–Үжң¬еӨ„зҗҶе·ҘдҪңжөҒеј•ж“Һ</h2>

      <!-- йў„и®ҫз®ЎзҗҶ -->
      <div class="preset-bar">
        <select id="presetSelect"><option value="">-- еҠ иҪҪйў„и®ҫ --</option></select>
        <button class="btn btn-secondary" onclick="loadPreset()">еҠ иҪҪ</button>
        <button class="btn btn-secondary" onclick="deletePreset()">еҲ йҷӨ</button>
        <span style="color:var(--border);">|</span>
        <input type="text" id="presetName" placeholder="йў„и®ҫеҗҚз§°">
        <button class="btn btn-primary" onclick="savePreset()">рҹ’ҫ дҝқеӯҳйў„и®ҫ</button>
        <span style="color:var(--border);">|</span>
        <button class="btn btn-secondary" onclick="exportWorkflow()">рҹ“Ө еҜјеҮәJSON</button>
        <button class="btn btn-secondary" onclick="importWorkflow()">рҹ“Ҙ еҜје…ҘJSON</button>
      </div>

      <!-- дё»еёғеұҖ -->
      <div class="workflow-layout">
        <!-- ж“ҚдҪңеҲ—иЎЁ -->
        <div class="ops-sidebar">
          <div class="ops-sidebar-title">рҹ“Ӣ еҸҜз”Ёж“ҚдҪң</div>
          <div class="ops-list" id="opsList"></div>
        </div>

        <!-- жөҒж°ҙзәҝ -->
        <div class="pipeline-panel">
          <div class="pipeline-header">
            <span>рҹ”— е·ҘдҪңжөҒжөҒж°ҙзәҝ (<span id="stepCount">0</span> жӯҘ)</span>
            <div class="pipeline-actions">
              <button class="btn btn-secondary" style="height:30px;padding:0 12px;font-size:12px;" onclick="clearWorkflow()">рҹ—‘пёҸ жё…з©ә</button>
            </div>
          </div>
          <div class="pipeline-body" id="pipelineBody">
            <div class="pipeline-empty" id="pipelineEmpty">зӮ№еҮ»е·Ұдҫ§ж“ҚдҪңж·»еҠ еҲ°е·ҘдҪңжөҒ</div>
          </div>
        </div>
      </div>

      <!-- жү§иЎҢжҢүй’® -->
      <div class="execute-bar">
        <button class="btn btn-success" onclick="executeWorkflow()" style="font-size:18px;padding:14px 56px;">рҹҡҖ жү§иЎҢе·ҘдҪңжөҒ</button>
      </div>

      <!-- иҫ“е…Ҙиҫ“еҮә -->
      <div class="io-area">
        <div class="io-box">
          <div class="io-label"><span>рҹ“қ иҫ“е…Ҙж–Үжң¬</span><button class="btn btn-secondary" style="height:26px;padding:0 10px;font-size:12px;" onclick="clearInput()">жё…з©ә</button></div>
          <textarea id="inputText" placeholder="еңЁжӯӨиҫ“е…Ҙж–Үжң¬..."></textarea>
        </div>
        <div class="io-box">
          <div class="io-label"><span>рҹ“Ө иҫ“еҮәз»“жһң</span><button class="btn btn-secondary" style="height:26px;padding:0 10px;font-size:12px;" onclick="copyOutput()">еӨҚеҲ¶</button></div>
          <textarea id="outputText" placeholder="жү§иЎҢе·ҘдҪңжөҒеҗҺз»“жһңе°ҶжҳҫзӨәеңЁиҝҷйҮҢ..." readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container"><p>рҹӣ пёҸ еңЁзәҝе·Ҙе…·з®ұ - ж–Үжң¬еӨ„зҗҶе·ҘдҪңжөҒеј•ж“Һ</p></div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    // ж“ҚдҪңе®ҡд№ү
    const OPERATIONS = [
      { id: 'replace', name: 'ж–Үжң¬жӣҝжҚў', icon: 'рҹ”Қ', config: [
        { key: 'find', type: 'text', placeholder: 'жҹҘжүҫж–Үжң¬' },
        { key: 'repl', type: 'text', placeholder: 'жӣҝжҚўдёә' },
        { key: 'useRegex', type: 'checkbox', label: 'жӯЈеҲҷ' }
      ]},
      { id: 'regex', name: 'жӯЈеҲҷжӣҝжҚў', icon: 'рҹ”Ө', config: [
        { key: 'pattern', type: 'text', placeholder: 'жӯЈеҲҷиЎЁиҫҫејҸ' },
        { key: 'repl', type: 'text', placeholder: 'жӣҝжҚўдёә' }
      ]},
      { id: 'prefix', name: 'ж·»еҠ еүҚзјҖ', icon: 'в¬…пёҸ', config: [
        { key: 'text', type: 'text', placeholder: 'еүҚзјҖж–Үжң¬' }
      ]},
      { id: 'suffix', name: 'ж·»еҠ еҗҺзјҖ', icon: 'вһЎпёҸ', config: [
        { key: 'text', type: 'text', placeholder: 'еҗҺзјҖж–Үжң¬' }
      ]},
      { id: 'insert', name: 'жҸ’е…ҘеҶ…е®№', icon: 'рҹ“Ң', config: [
        { key: 'position', type: 'select', options: [{ value: 'start', label: 'иЎҢйҰ–' }, { value: 'end', label: 'иЎҢжң«' }] },
        { key: 'content', type: 'text', placeholder: 'жҸ’е…ҘеҶ…е®№' }
      ]},
      { id: 'removeEmpty', name: 'еҲ йҷӨз©әиЎҢ', icon: 'рҹ§№', config: [] },
      { id: 'dedupe', name: 'ж–Үжң¬еҺ»йҮҚ', icon: 'вҷҗ', config: [] },
      { id: 'sort', name: 'жҺ’еәҸ', icon: 'рҹ“Ҡ', config: [
        { key: 'order', type: 'select', options: [{ value: 'asc', label: 'еҚҮеәҸ' }, { value: 'desc', label: 'йҷҚеәҸ' }, { value: 'random', label: 'йҡҸжңә' }] }
      ]},
      { id: 'addLineNum', name: 'еўһеҠ иЎҢеҸ·', icon: 'рҹ”ў', config: [
        { key: 'start', type: 'number', placeholder: 'иө·е§ӢеҸ·', default: 1 },
        { key: 'format', type: 'select', options: [{ value: 'dot', label: '1. 2. 3.' }, { value: 'paren', label: '1) 2) 3)' }, { value: 'hash', label: '#1 #2' }, { value: 'plain', label: '1 2 3' }] }
      ]},
      { id: 'removeLineNum', name: 'еҲ йҷӨиЎҢеҸ·', icon: 'рҹ” ', config: [] },
      { id: 'caseConvert', name: 'еӨ§е°ҸеҶҷиҪ¬жҚў', icon: 'рҹ”Ў', config: [
        { key: 'mode', type: 'select', options: [{ value: 'upper', label: 'е…ЁйғЁеӨ§еҶҷ' }, { value: 'lower', label: 'е…ЁйғЁе°ҸеҶҷ' }, { value: 'capitalize', label: 'йҰ–еӯ—жҜҚеӨ§еҶҷ' }, { value: 'swap', label: 'еӨ§е°ҸеҶҷдә’жҚў' }] }
      ]},
      { id: 'trim', name: 'дҝ®еүӘз©әж ј', icon: 'вңӮпёҸ', config: [] },
      { id: 'lineBreak', name: 'жҚўиЎҢз¬ҰиҪ¬жҚў', icon: 'вҶ©пёҸ', config: [
        { key: 'target', type: 'select', options: [{ value: 'lf', label: 'вҶ’ LF (\\n)' }, { value: 'crlf', label: 'вҶ’ CRLF (\\r\\n)' }, { value: 'comma', label: 'вҶ’ йҖ—еҸ·' }, { value: 'space', label: 'вҶ’ з©әж ј' }] }
      ]},
      { id: 'sliceLines', name: 'жҲӘеҸ–иЎҢ', icon: 'рҹ“җ', config: [
        { key: 'from', type: 'number', placeholder: 'д»Һз¬¬NиЎҢ', default: 1 },
        { key: 'to', type: 'number', placeholder: 'еҲ°з¬¬MиЎҢ' }
      ]},
      { id: 'reverse', name: 'еҸҚиҪ¬', icon: 'рҹ”ғ', config: [
        { key: 'mode', type: 'select', options: [{ value: 'lines', label: 'еҸҚиҪ¬иЎҢеәҸ' }, { value: 'each', label: 'еҸҚиҪ¬жҜҸиЎҢ' }] }
      ]}
    ];

    let workflow = []; // [{op: string, config: object}, ...]
    let dragIdx = null;

    // еҲқе§ӢеҢ–ж“ҚдҪңеҲ—иЎЁ
    function initOpsList() {
      const list = document.getElementById('opsList');
      list.innerHTML = OPERATIONS.map(op =>
        `<div class="ops-list-item" onclick="addStep('${op.id}')"><span class="op-icon">${op.icon}</span><span>${op.name}</span></div>`
      ).join('');
    }

    // ж·»еҠ жӯҘйӘӨ
    function addStep(opId) {
      const op = OPERATIONS.find(o => o.id === opId);
      if (!op) return;
      const config = {};
      op.config.forEach(c => {
        config[c.key] = c.default !== undefined ? c.default : (c.type === 'checkbox' ? false : (c.type === 'select' ? c.options[0].value : ''));
      });
      workflow.push({ op: opId, config });
      renderPipeline();
    }

    // еҲ йҷӨжӯҘйӘӨ
    function removeStep(idx) {
      workflow.splice(idx, 1);
      renderPipeline();
    }

    // жё…з©әе·ҘдҪңжөҒ
    function clearWorkflow() {
      workflow = [];
      renderPipeline();
    }

    // жёІжҹ“жөҒж°ҙзәҝ
    function renderPipeline() {
      const body = document.getElementById('pipelineBody');
      const empty = document.getElementById('pipelineEmpty');
      document.getElementById('stepCount').textContent = workflow.length;

      if (workflow.length === 0) {
        body.innerHTML = '<div class="pipeline-empty">зӮ№еҮ»е·Ұдҫ§ж“ҚдҪңж·»еҠ еҲ°е·ҘдҪңжөҒ</div>';
        return;
      }

      body.innerHTML = workflow.map((step, i) => {
        const op = OPERATIONS.find(o => o.id === step.op);
        let configHtml = '';
        op.config.forEach(c => {
          if (c.type === 'text') {
            configHtml += `<input type="text" placeholder="${c.placeholder || ''}" value="${escHtml(step.config[c.key] || '')}" onchange="updateConfig(${i},'${c.key}',this.value)">`;
          } else if (c.type === 'number') {
            configHtml += `<input type="number" placeholder="${c.placeholder || ''}" value="${step.config[c.key] || ''}" style="width:80px" onchange="updateConfig(${i},'${c.key}',this.value)">`;
          } else if (c.type === 'select') {
            configHtml += `<select onchange="updateConfig(${i},'${c.key}',this.value)">${c.options.map(o => `<option value="${o.value}" ${step.config[c.key]===o.value?'selected':''}>${o.label}</option>`).join('')}</select>`;
          } else if (c.type === 'checkbox') {
            configHtml += `<label><input type="checkbox" ${step.config[c.key]?'checked':''} onchange="updateConfig(${i},'${c.key}',this.checked)">${c.label||''}</label>`;
          }
        });
        return `<div class="step-card" draggable="true" data-idx="${i}"
          ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event,${i})" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)">
          <span class="step-drag">вҳ°</span>
          <span class="step-num">${i+1}</span>
          <span class="step-name">${op.icon} ${op.name}</span>
          <div class="step-config">${configHtml}</div>
          <button class="step-delete" onclick="removeStep(${i})" title="еҲ йҷӨ">Г—</button>
        </div>`;
      }).join('');
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function updateConfig(idx, key, value) {
      workflow[idx].config[key] = value;
    }

    // жӢ–жӢҪжҺ’еәҸ
    function onDragStart(e, idx) { dragIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.closest('.step-card').classList.add('dragging'); }
    function onDragOver(e, idx) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.target.closest('.step-card')?.classList.add('dragover'); }
    function onDragLeave(e) { e.target.closest('.step-card')?.classList.remove('dragover'); }
    function onDrop(e, idx) {
      e.preventDefault();
      e.target.closest('.step-card')?.classList.remove('dragover');
      if (dragIdx !== null && dragIdx !== idx) {
        const item = workflow.splice(dragIdx, 1)[0];
        workflow.splice(idx, 0, item);
        renderPipeline();
      }
      dragIdx = null;
    }
    function onDragEnd(e) { e.target.closest('.step-card')?.classList.remove('dragging'); dragIdx = null; }

    // жү§иЎҢе·ҘдҪңжөҒ
    function executeWorkflow() {
      if (workflow.length === 0) { showMessage('warning', 'иҜ·е…Ҳж·»еҠ ж“ҚдҪңжӯҘйӘӨ'); return; }
      let text = document.getElementById('inputText').value;

      for (let si = 0; si < workflow.length; si++) {
        const step = workflow[si];
        const c = step.config;
        try {
          switch (step.op) {
            case 'replace':
              if (c.useRegex) {
                text = text.split('\n').map(line => line.replace(new RegExp(c.find, 'g'), c.repl)).join('\n');
              } else {
                text = text.split(c.find).join(c.repl);
              }
              break;
            case 'regex':
              text = text.replace(new RegExp(c.pattern, 'g'), c.repl);
              break;
            case 'prefix':
              text = text.split('\n').map(line => c.text + line).join('\n');
              break;
            case 'suffix':
              text = text.split('\n').map(line => line + c.text).join('\n');
              break;
            case 'insert':
              text = text.split('\n').map(line => c.position === 'start' ? c.content + line : line + c.content).join('\n');
              break;
            case 'removeEmpty':
              text = text.split('\n').filter(line => line.trim() !== '').join('\n');
              break;
            case 'dedupe': {
              const seen = new Set();
              text = text.split('\n').filter(line => { if (seen.has(line)) return false; seen.add(line); return true; }).join('\n');
              break;
            }
            case 'sort': {
              let lines = text.split('\n');
              if (c.order === 'asc') lines.sort((a,b) => a.localeCompare(b));
              else if (c.order === 'desc') lines.sort((a,b) => b.localeCompare(a));
              else { for (let i = lines.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [lines[i], lines[j]] = [lines[j], lines[i]]; } }
              text = lines.join('\n');
              break;
            }
            case 'addLineNum': {
              let start = parseInt(c.start) || 1;
              const fmt = c.format || 'dot';
              text = text.split('\n').map((line, i) => {
                const n = start + i;
                if (fmt === 'dot') return n + '. ' + line;
                if (fmt === 'paren') return n + ') ' + line;
                if (fmt === 'hash') return '#' + n + ' ' + line;
                return n + ' ' + line;
              }).join('\n');
              break;
            }
            case 'removeLineNum':
              text = text.split('\n').map(line => line.replace(/^\s*#?\d+[\.\)\]\s:пјҡ]+/, '')).join('\n');
              break;
            case 'caseConvert':
              if (c.mode === 'upper') text = text.toUpperCase();
              else if (c.mode === 'lower') text = text.toLowerCase();
              else if (c.mode === 'capitalize') text = text.split('\n').map(l => l.replace(/\b\w/g, ch => ch.toUpperCase())).join('\n');
              else text = text.split('').map(ch => ch === ch.toUpperCase() ? ch.toLowerCase() : ch.toUpperCase()).join('');
              break;
            case 'trim':
              text = text.split('\n').map(line => line.trim()).join('\n');
              break;
            case 'lineBreak':
              text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
              if (c.target === 'crlf') text = text.replace(/\n/g, '\r\n');
              else if (c.target === 'comma') text = text.replace(/\n/g, ', ');
              else if (c.target === 'space') text = text.replace(/\n/g, ' ');
              break;
            case 'sliceLines': {
              let lines = text.split('\n');
              let from = Math.max(1, parseInt(c.from) || 1);
              let to = c.to ? Math.min(lines.length, parseInt(c.to)) : lines.length;
              text = lines.slice(from - 1, to).join('\n');
              break;
            }
            case 'reverse':
              if (c.mode === 'each') text = text.split('\n').map(line => [...line].reverse().join('')).join('\n');
              else text = text.split('\n').reverse().join('\n');
              break;
          }
        } catch (err) {
          showMessage('error', `жӯҘйӘӨ ${si+1} (${OPERATIONS.find(o=>o.id===step.op).name}) жү§иЎҢеҮәй”ҷ: ${err.message}`);
          return;
        }
      }

      document.getElementById('outputText').value = text;
      showMessage('success', 'е·ҘдҪңжөҒжү§иЎҢе®ҢжҲҗпјҒ');
    }

    function clearInput() { document.getElementById('inputText').value = ''; }
    function copyOutput() {
      const text = document.getElementById('outputText').value;
      if (!text) { showMessage('warning', 'жІЎжңүеҸҜеӨҚеҲ¶зҡ„еҶ…е®№'); return; }
      copyToClipboard(text).then(() => showMessage('success', 'е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ'));
    }

    // йў„и®ҫз®ЎзҗҶ
    function getPresets() { try { return JSON.parse(localStorage.getItem('textWorkflowPresets') || '{}'); } catch { return {}; } }
    function savePresets(presets) { localStorage.setItem('textWorkflowPresets', JSON.stringify(presets)); }
    function refreshPresetSelect() {
      const presets = getPresets();
      const sel = document.getElementById('presetSelect');
      sel.innerHTML = '<option value="">-- еҠ иҪҪйў„и®ҫ --</option>' + Object.keys(presets).map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');
    }
    function savePreset() {
      const name = document.getElementById('presetName').value.trim();
      if (!name) { showMessage('warning', 'иҜ·иҫ“е…Ҙйў„и®ҫеҗҚз§°'); return; }
      const presets = getPresets();
      presets[name] = JSON.parse(JSON.stringify(workflow));
      savePresets(presets);
      refreshPresetSelect();
      showMessage('success', `йў„и®ҫ"${name}"е·Ідҝқеӯҳ`);
    }
    function loadPreset() {
      const name = document.getElementById('presetSelect').value;
      if (!name) { showMessage('warning', 'иҜ·йҖүжӢ©йў„и®ҫ'); return; }
      const presets = getPresets();
      if (presets[name]) { workflow = presets[name]; renderPipeline(); showMessage('success', `е·ІеҠ иҪҪйў„и®ҫ"${name}"`); }
    }
    function deletePreset() {
      const name = document.getElementById('presetSelect').value;
      if (!name) { showMessage('warning', 'иҜ·йҖүжӢ©иҰҒеҲ йҷӨзҡ„йў„и®ҫ'); return; }
      const presets = getPresets();
      delete presets[name];
      savePresets(presets);
      refreshPresetSelect();
      showMessage('success', `йў„и®ҫ"${name}"е·ІеҲ йҷӨ`);
    }

    // еҜјеҮә/еҜје…Ҙ
    function exportWorkflow() {
      if (workflow.length === 0) { showMessage('warning', 'е·ҘдҪңжөҒдёәз©ә'); return; }
      const json = JSON.stringify(workflow, null, 2);
      copyToClipboard(json).then(() => showMessage('success', 'е·ҘдҪңжөҒJSONе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ'));
    }
    function importWorkflow() {
      const json = prompt('иҜ·зІҳиҙҙе·ҘдҪңжөҒJSON:');
      if (!json) return;
      try {
        const data = JSON.parse(json);
        if (!Array.isArray(data)) throw new Error('ж јејҸй”ҷиҜҜ');
        workflow = data;
        renderPipeline();
        showMessage('success', 'е·ҘдҪңжөҒе·ІеҜје…Ҙ');
      } catch (err) { showMessage('error', 'JSONи§ЈжһҗеӨұиҙҘ: ' + err.message); }
    }

    // еҲқе§ӢеҢ–
    initOpsList();
    refreshPresetSelect();
  </script>
</body>
</html>
