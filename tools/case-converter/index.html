<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文字母大小写转换 - Web Tools</title>
  <meta name="description" content="英文大小写一键转换：全部大写、小写、首字母大写、大小写翻转等">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .convert-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 600px) { .convert-grid { grid-template-columns: 1fr; } }
    .result-card {
      background: #FAFAFA;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .result-card:hover { border-color: var(--primary); }
    .result-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .result-text {
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 120px;
      overflow: auto;
      user-select: all;
    }
    .result-card .copied-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 11px;
      color: var(--success);
      display: none;
    }
    .input-area {
      width: 100%;
      height: 150px;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
    }
    .input-area:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.15);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ Web Tools</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="tool-header">
      <div class="breadcrumb"><a href="../../index.html">首页</a> / 大小写转换</div>
      <h1>🔤 英文字母大小写转换</h1>
      <p style="color: var(--text-secondary); margin-top: 8px;">一键转换为多种大小写格式，点击卡片即可复制</p>
    </div>

    <div class="card">
      <div class="card-title">输入文本</div>
      <textarea class="input-area" id="inputArea" placeholder="输入或粘贴英文文本..."></textarea>
    </div>

    <div class="convert-grid" id="results"></div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Web Tools - 纯前端工具，数据安全</p>
    </div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function() {
      const inputArea = document.getElementById('inputArea');
      const results = document.getElementById('results');

      const transforms = [
        { label: '全部大写', fn: s => s.toUpperCase() },
        { label: '全部小写', fn: s => s.toLowerCase() },
        { label: '首字母大写', fn: s => s.replace(/\b[a-z]/g, c => c.toUpperCase()) },
        { label: '句首大写', fn: s => s.replace(/(^|[.!?]\s+)[a-z]/g, m => m.toUpperCase()) },
        { label: '大小写翻转', fn: s => s.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('') },
        { label: '每个单词首字母大写', fn: s => s.replace(/\b\w/g, c => c.toUpperCase()) },
        { label: '交替大小写', fn: s => s.split('').map((c, i) => i % 2 === 0 ? c.toUpperCase() : c.toLowerCase()).join('') },
        { label: '全角转半角', fn: s => s.replace(/[\uFF01-\uFF5E]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/\u3000/g, ' ') },
      ];

      function render() {
        const text = inputArea.value;
        if (!text) {
          results.innerHTML = '';
          return;
        }
        results.innerHTML = transforms.map(t => {
          const val = t.fn(text);
          return `<div class="result-card" data-copy="${val.replace(/"/g, '&quot;')}">
            <div class="result-label">${t.label}</div>
            <div class="result-text">${val}</div>
            <span class="copied-badge">✅ 已复制</span>
          </div>`;
        }).join('');
      }

      inputArea.addEventListener('input', render);

      results.addEventListener('click', async (e) => {
        const card = e.target.closest('.result-card');
        if (!card) return;
        const text = card.getAttribute('data-copy');
        await copyToClipboard(text);
        const badge = card.querySelector('.copied-badge');
        badge.style.display = 'inline';
        setTimeout(() => { badge.style.display = 'none'; }, 1500);
      });
    })();
  </script>
</body>
</html>
