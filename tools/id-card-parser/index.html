// GB 11643-1999 check digit algorithm
function calcCheckDigit(id17){
const weights=[7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2];
const checkChars=['1','0','X','9','8','7','6','5','4','3','2'];
let sum=0;
for(let i=0;i<17;i++){
sum+=parseInt(id17[i])*weights[i];
}
return checkChars[sum%11];
}
function parseId(){
const input=document.getElementById('id-input');
const id=input.value.trim().toUpperCase();
const resultBox=document.getElementById('result');
const errorMsg=document.getElementById('error-msg');
const checkResults=document.getElementById('check-results');
const infoResults=document.getElementById('info-results');
if(!id){resultBox.classList.remove('show');return;}
let errors=[];
// Basic format check
if(!/^\d{17}[\dX]$/i.test(id)){
errors.push('❌ 格式错误：应为18位数字（最后一位可为X）');
}
if(errors.length===0){
// Check digit validation
const expectedCheck=calcCheckDigit(id.substring(0,17));
const actualCheck=id[17].toUpperCase();
if(expectedCheck!==actualCheck){
errors.push(`❌ 校验位错误：期望 ${expectedCheck}，实际 ${actualCheck}`);
}
}
if(errors.length>0){
input.classList.add('error');
input.classList.remove('success');
errorMsg.innerHTML=errors.map(e=>`<div class="error-msg">${e}</div>`).join('');
checkResults.innerHTML='';
infoResults.innerHTML='';
resultBox.classList.add('show');
resultBox.classList.add('error');
return;
}
input.classList.remove('error');
input.classList.add('success');
resultBox.classList.remove('error');
// Parse area code
const areaCode=id.substring(0,6);
const cityCode=id.substring(0,4);
const provinceCode=id.substring(0,2);
const province=AREAS[provinceCode]||'未知省份';
const city=AREAS[cityCode]||'';
const district=AREAS[areaCode]||'';
const areaStr=province+(city?' '+city:'')+(district?' '+district:'');
// Parse birthdate
const year=id.substring(6,10);
const month=id.substring(10,12);
const day=id.substring(12,14);
const birthDate=`${year}年${month}月${day}日`;
// Calculate age
const today=new Date();
const birth=new Date(parseInt(year),parseInt(month)-1,parseInt(day));
let age=today.getFullYear()-birth.getFullYear();
if(today.getMonth()<birth.getMonth()||(today.getMonth()===birth.getMonth()&&today.getDate()<birth.getDate()))age--;
// Gender
const genderDigit=parseInt(id[16]);
const gender=genderDigit%2===1?'男':'女';
const genderIcon=genderDigit%2===1?'♂':'♀';
// Check results
checkResults.innerHTML=`
<div class="check-item"><span class="icon">✅</span><span>格式验证通过</span></div>
<div class="check-item"><span class="icon">✅</span><span>校验位验证通过（GB 11643-1999）</span></div>
`;
infoResults.innerHTML=`
<div class="result-item"><span class="label">📍 籍贯地区</span><span class="value highlight">${areaStr}</span></div>
<div class="result-item"><span class="label">🎂 出生日期</span><span class="value">${birthDate}</span></div>
<div class="result-item"><span class="label">📅 年龄</span><span class="value">${age} 岁</span></div>
<div class="result-item"><span class="label">${genderIcon} 性别</span><span class="value">${gender}</span></div>
<div class="result-item"><span class="label">🔢 地区编码</span><span class="value">${areaCode}</span></div>
`;
resultBox.classList.add('show');
}
function copyResult(){
const items=document.querySelectorAll('#info-results .result-item .value');
let text='身份证解析结果：\n';
const labels=document.querySelectorAll('#info-results .result-item .label');
labels.forEach((l,i)=>{text+=l.textContent+'：'+items[i].textContent+'\n'});
if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>{const d=document.createElement('div');d.textContent='已复制';d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;z-index:999';document.body.appendChild(d);setTimeout(()=>d.remove(),2000)});
}
</script>
