<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:0;background:#f5f7fa;color:#333}
.navbar{background:#2c3e50;padding:12px 20px;display:flex;align-items:center}
.navbar a{color:#fff;text-decoration:none;font-size:18px;font-weight:bold}
.breadcrumb{padding:10px 20px;font-size:14px;color:#666;background:#fff;border-bottom:1px solid #eee}
.breadcrumb a{color:#3498db;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.container{max-width:700px;margin:20px auto;padding:0 15px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:30px;margin-bottom:20px}
.card h2{margin-top:0;color:#2c3e50}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:#555}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius: 10px;font-size:16px;box-sizing:border-box;transition:border .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#3498db}
.btn{background:#3498db;color:#fff;border:none;padding:12px 30px;border-radius: 10px;font-size:16px;cursor:pointer;transition:background .2s;width:100%}
.btn:hover{background:#2980b9}

.result-item.full-width{grid-column:1/-1}
.bar-container{background:#e0e0e0;border-radius:10px;height:20px;margin-top:8px;overflow:hidden;position:relative}
.bar{height:100%;border-radius:10px;transition:width .5s}
.bar-label{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:11px;line-height:20px;color:#fff;font-weight:bold}
.footer{text-align:center;padding:20px;color:#999;font-size:13px;margin-top:40px}
@media(max-width:600px){.result-grid{grid-template-columns:1fr}.container{padding:0 10px}.card{padding:20px}}
</style>

<body>
<nav class="navbar"><div class="navbar-container"><a href="../../index.html" class="navbar-brand">🛠️ Web Tools</a><div class="navbar-links"><a href="../../index.html" class="navbar-link">首页</a></div></div></nav>
<div class="navbar"><a href="../../index.html">🧰 在线工具箱</a></div>
<div class="breadcrumb"><a href="../../index.html">首页</a> / <a href="../../index.html">工具列表</a> / 体脂率/BMR计算器</div>
<div class="container">
<div class="card">
<h2>💪 体脂率 / BMR 计算器</h2>
<div class="form-group">
<label>性别</label>
<select id="gender"><option value="male">男 👨</option><option value="female">女 👩</option></select>
</div>
<div class="form-group">
<label>年龄（岁）</label>
<input type="number" id="age" min="10" max="120" placeholder="请输入年龄">
</div>
<div class="form-group">
<label>身高（cm）</label>
<input type="number" id="height" min="100" max="250" placeholder="请输入身高">
</div>
<div class="form-group">
<label>体重（kg）</label>
<input type="number" id="weight" min="20" max="300" step="0.1" placeholder="请输入体重">
</div>
<div class="form-group">
<label>活动水平</label>
<select id="activity">
<option value="1.2">久坐不动（几乎不运动）</option>
<option value="1.375">轻度活动（每周1-3次）</option>
<option value="1.55" selected>中度活动（每周3-5次）</option>
<option value="1.725">高度活动（每周6-7次）</option>
<option value="1.9">极高活动（体力劳动/专业运动员）</option>
</select>
</div>
<button class="btn" onclick="calculate()">开始计算</button>
<div class="result-section" id="results">
<div class="result-grid">
<div class="result-item">
<div class="label">BMI 指数</div>
<div class="value" id="bmiVal">-</div>
<div class="desc" id="bmiCat">-</div>
</div>
<div class="result-item">
<div class="label">体脂率</div>
<div class="value" id="bfVal">-</div>
<div class="desc" id="bfCat">-</div>
</div>
<div class="result-item">
<div class="label">基础代谢率 (BMR)</div>
<div class="value" id="bmrVal">-</div>
<div class="desc">千卡/天</div>
</div>
<div class="result-item">
<div class="label">每日所需热量</div>
<div class="value" id="calVal">-</div>
<div class="desc">千卡/天</div>
</div>
<div class="result-item full-width">
<div class="label">BMI 范围</div>
<div class="bar-container"><div class="bar" id="bmiBar" style="width:0;background:#27ae60"></div><span class="bar-label" id="bmiBarLabel"></span></div>
</div>
</div>
</div>
</div>
</div>
<div class="footer">© 2026 在线工具箱 | 纯前端计算，数据不上传</div>
<script src="../../assets/js/common.js"></script>
<script>
function calculate(){
const g=document.getElementById('gender').value;
const age=parseFloat(document.getElementById('age').value);
const h=parseFloat(document.getElementById('height').value);
const w=parseFloat(document.getElementById('weight').value);
const af=parseFloat(document.getElementById('activity').value);
if(!age||!h||!w){alert('请填写完整信息');return;}
const bmi=w/((h/100)*(h/100));
let bmiCategory='';
if(bmi<18.5)bmiCategory='偏瘦 🟡';
else if(bmi<24)bmiCategory='正常 🟢';
else if(bmi<28)bmiCategory='偏胖 🟠';
else bmiCategory='肥胖 🔴';
document.getElementById('bmiVal').textContent=bmi.toFixed(1);
document.getElementById('bmiCat').textContent=bmiCategory;
const bf=g==='male'?1.2*bmi+0.23*age-16.2:1.2*bmi+0.23*age-5.4;
let bfCategory='';
if(g==='male'){
if(bf<10)bfCategory='必需脂肪 🟡';
else if(bf<14)bfCategory='运动员 🟢';
else if(bf<18)bfCategory='健康 🟢';
else if(bf<25)bfCategory='可接受 🟠';
else bfCategory='肥胖 🔴';
}else{
if(bf<14)bfCategory='必需脂肪 🟡';
else if(bf<21)bfCategory='运动员 🟢';
else if(bf<25)bfCategory='健康 🟢';
else if(bf<32)bfCategory='可接受 🟠';
else bfCategory='肥胖 🔴';
}
document.getElementById('bfVal').textContent=bf.toFixed(1)+'%';
document.getElementById('bfCat').textContent=bfCategory;
const bmr=g==='male'?88.362+13.397*w+4.799*h-5.677*age:447.593+9.247*w+3.098*h-4.330*age;
document.getElementById('bmrVal').textContent=Math.round(bmr);
document.getElementById('calVal').textContent=Math.round(bmr*af);
const bmiPct=Math.min(Math.max((bmi-10)/(40-10)*100,0),100);
const barEl=document.getElementById('bmiBar');
barEl.style.width=bmiPct+'%';
barEl.style.background=bmi<18.5?'#f1c40f':bmi<24?'#27ae60':bmi<28?'#e67e22':'#e74c3c';
document.getElementById('bmiBarLabel').textContent=bmi.toFixed(1);
document.getElementById('results').style.display='block';
}
</script>
