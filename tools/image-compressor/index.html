<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片压缩工具 - Web Tools</title>
  <meta name="description" content="在线图片压缩，支持JPG、PNG格式，纯前端处理，保护隐私">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .compressor-layout {
      display: grid;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .compressor-layout {
        grid-template-columns: 1fr 1fr;
      }
    }

    .upload-area-large {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 60px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #FAFAFA;
    }

    .upload-area-large:hover,
    .upload-area-large.dragover {
      border-color: var(--primary);
      background: #F0F7FF;
    }

    .upload-icon-large {
      font-size: 72px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .upload-text-large {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .upload-hint-large {
      font-size: 14px;
      color: var(--text-secondary);
    }

    #fileInput {
      display: none;
    }

    .preview-container {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .image-comparison {
      display: grid;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .image-comparison {
        grid-template-columns: 1fr 1fr;
      }
    }

    .image-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
    }

    .image-box-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .image-preview-wrapper {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .image-preview-wrapper img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
    }

    .image-info {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .image-info .highlight {
      color: var(--primary-dark);
      font-weight: 600;
    }

    .image-info .saved {
      color: var(--success);
      font-weight: 600;
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    .quality-value {
      font-weight: 600;
      color: var(--primary-dark);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      outline: none;
      background: var(--border);
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .btn-group-vertical {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .btn-group-vertical {
        flex-direction: row;
      }
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      border-radius: 8px;
    }

    .spinner-large {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .format-badge {
      display: inline-block;
      padding: 4px 8px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ Web Tools</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="tool-header">
      <div class="breadcrumb">
        <a href="../../index.html">首页</a> / 图片压缩工具
      </div>
      <h1>🗜️ 图片压缩工具</h1>
      <p style="color: var(--text-secondary); margin-top: 8px;">在线压缩JPG、PNG图片，降低文件大小，纯前端处理，保护隐私</p>
    </div>

    <!-- 上传区域 -->
    <div class="upload-area-large" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp">
      <div class="upload-icon-large">📤</div>
      <div class="upload-text-large">点击或拖拽上传图片</div>
      <div class="upload-hint-large">支持 JPG、PNG、WebP 格式，最大 20MB</div>
    </div>

    <!-- 压缩结果 -->
    <div class="preview-container" id="resultContainer">
      <!-- 压缩控制 -->
      <div class="controls">
        <div class="control-group">
          <div class="control-label">
            <span>压缩质量</span>
            <span class="quality-value" id="qualityValue">80%</span>
          </div>
          <input type="range" id="qualityRange" min="10" max="100" value="80">
        </div>
        <div class="btn-group-vertical" style="justify-content: center;">
          <button class="btn btn-primary" id="compressBtn">✨ 重新压缩</button>
          <button class="btn btn-secondary" id="downloadBtn">📥 下载压缩图</button>
          <button class="btn btn-secondary" id="resetBtn">🔄 重新选择</button>
        </div>
      </div>

      <!-- 图片对比 -->
      <div class="image-comparison">
        <!-- 原图 -->
        <div class="image-box">
          <div class="image-box-title">📷 原图 <span class="format-badge" id="originalFormat"></span></div>
          <div class="image-preview-wrapper">
            <img id="originalPreview" alt="原图预览">
          </div>
          <div class="image-info">
            <div>尺寸: <span class="highlight" id="originalDimensions">-</span></div>
            <div>文件大小: <span class="highlight" id="originalSize">-</span></div>
          </div>
        </div>

        <!-- 压缩后 -->
        <div class="image-box">
          <div class="image-box-title">✨ 压缩后 <span class="format-badge" id="compressedFormat"></span></div>
          <div class="image-preview-wrapper" style="position: relative;">
            <img id="compressedPreview" alt="压缩后预览">
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
              <div class="spinner-large"></div>
              <div>压缩中...</div>
            </div>
          </div>
          <div class="image-info">
            <div>尺寸: <span class="highlight" id="compressedDimensions">-</span></div>
            <div>文件大小: <span class="highlight" id="compressedSize">-</span></div>
            <div style="margin-top: 4px;">
              节省空间: <span class="saved" id="savedPercent">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Web Tools - 纯前端工具，数据安全</p>
    </div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function() {
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const resultContainer = document.getElementById('resultContainer');
      const qualityRange = document.getElementById('qualityRange');
      const qualityValue = document.getElementById('qualityValue');
      const compressBtn = document.getElementById('compressBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const resetBtn = document.getElementById('resetBtn');
      const loadingOverlay = document.getElementById('loadingOverlay');

      // 图片元素
      const originalPreview = document.getElementById('originalPreview');
      const compressedPreview = document.getElementById('compressedPreview');

      // 信息元素
      const originalFormat = document.getElementById('originalFormat');
      const compressedFormat = document.getElementById('compressedFormat');
      const originalDimensions = document.getElementById('originalDimensions');
      const compressedDimensions = document.getElementById('compressedDimensions');
      const originalSize = document.getElementById('originalSize');
      const compressedSize = document.getElementById('compressedSize');
      const savedPercent = document.getElementById('savedPercent');

      let originalFile = null;
      let originalImage = null;

      // 格式化文件大小
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // 拖拽上传
      initDropArea(uploadArea, () => fileInput.click());

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFileSelect(file);
      });

      // 处理文件选择
      function handleFileSelect(file) {
        if (!file.type.startsWith('image/')) {
          showMessage('error', '请选择图片文件');
          return;
        }

        if (file.size > 20 * 1024 * 1024) {
          showMessage('error', '图片大小不能超过 20MB');
          return;
        }

        originalFile = file;
        originalFormat.textContent = file.type.split('/')[1].toUpperCase();
        compressedFormat.textContent = file.type.split('/')[1].toUpperCase();

        const reader = new FileReader();
        reader.onload = (e) => {
          originalPreview.src = e.target.result;
          const img = new Image();
          img.onload = () => {
            originalImage = img;
            originalDimensions.textContent = `${img.width} × ${img.height} px`;
            originalSize.textContent = formatFileSize(file.size);
            uploadArea.style.display = 'none';
            resultContainer.style.display = 'block';
            compressImage();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // 压缩图片
      function compressImage() {
        if (!originalImage) return;

        loadingOverlay.style.display = 'flex';
        const quality = qualityRange.value / 100;

        setTimeout(() => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0);

            canvas.toBlob(
              (blob) => {
                const url = URL.createObjectURL(blob);
                compressedPreview.src = url;

                compressedDimensions.textContent = `${originalImage.width} × ${originalImage.height} px`;
                compressedSize.textContent = formatFileSize(blob.size);

                const saved = ((originalFile.size - blob.size) / originalFile.size * 100).toFixed(1);
                savedPercent.textContent = saved > 0 ? `-${saved}%` : '未减小';
                savedPercent.className = saved > 0 ? 'saved' : '';

                loadingOverlay.style.display = 'none';
                showMessage('success', '压缩完成');

                // 保存 blob 供下载
                compressedBlob = blob;
              },
              originalFile.type,
              quality
            );
          } catch (err) {
            loadingOverlay.style.display = 'none';
            showMessage('error', '压缩失败: ' + err.message);
          }
        }, 100);
      }

      let compressedBlob = null;

      // 质量滑块
      qualityRange.addEventListener('input', () => {
        qualityValue.textContent = qualityRange.value + '%';
      });

      qualityRange.addEventListener('change', () => {
        compressImage();
      });

      // 重新压缩
      compressBtn.addEventListener('click', compressImage);

      // 下载
      downloadBtn.addEventListener('click', () => {
        if (!compressedBlob) {
          showMessage('warning', '请先压缩');
          return;
        }
        const url = URL.createObjectURL(compressedBlob);
        const a = document.createElement('a');
        a.href = url;
        const ext = originalFile.type.split('/')[1];
        a.download = `compressed-${Date.now()}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage('success', '已下载');
      });

      // 重置
      resetBtn.addEventListener('click', () => {
        originalFile = null;
        originalImage = null;
        compressedBlob = null;
        fileInput.value = '';
        uploadArea.style.display = 'block';
        resultContainer.style.display = 'none';
        originalPreview.src = '';
        compressedPreview.src = '';
      });

      // 清除消息
      showMessage('info', '请选择要压缩的图片');
    })();
  </script>
</body>
</html>
