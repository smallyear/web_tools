// Parse dictionary
const PY={};
(function(){
let i=0;
const s=PY_RAW;
while(i<s.length){
const code=s.charCodeAt(i);
if(code>=0x4e00&&code<=0x9fff){
const ch=s[i];
i++;
let py='';
while(i<s.length){
const c=s[i];
const cc=s.charCodeAt(i);
if((c>='a'&&c<='z')||(c>='1'&&c<='5')||c==='ü'){
py+=c;
i++;
}else{
break;
}
}
if(py){
// Remove trailing digits to get tone, store full like "hao3"
PY[ch]=py;
}
}else{
i++;
}
}
})();

// Tone mark conversion
const TONES={
'a':'āáǎà',
'e':'ēéěè',
'i':'īíǐì',
'o':'ōóǒò',
'u':'ūúǔù',
'ü':'ǖǘǚǜ'
};

function pinyinWithTone(py){
const tone=parseInt(py.slice(-1));
const base=py.slice(0,-1);
if(!tone||tone<1||tone>5)return base;
if(tone===5)return base;
// Find which vowel gets the tone mark
// Rules: a > o > e > i/u (when together, the 2nd gets it)
if(base.includes('a')){
return base.replace('a',TONES['a'][tone-1]);
}
if(base.includes('o')){
return base.replace('o',TONES['o'][tone-1]);
}
if(base.includes('e')){
return base.replace('e',TONES['e'][tone-1]);
}
// Special: iu - tone on u
if(base.includes('iu')){
return base.replace('u',TONES['u'][tone-1]);
}
if(base.includes('ui')){
return base.replace('i',TONES['i'][tone-1]);
}
if(base.includes('i')){
return base.replace('i',TONES['i'][tone-1]);
}
if(base.includes('u')){
return base.replace('u',TONES['u'][tone-1]);
}
if(base.includes('ü')){
return base.replace('ü',TONES['ü'][tone-1]);
}
return base;
}

function getPy(char){
return PY[char]||'';
}

function convert(){
const text=document.getElementById('input').value;
const withTone=document.getElementById('opt-tone').checked;
const withNumber=document.getElementById('opt-number').checked;
const capFirst=document.getElementById('opt-cap').checked;
const out=document.getElementById('output');
let isFirstChar=true;
let html='';
for(const char of text){
if(/[\u4e00-\u9fff]/.test(char)){
const raw=getPy(char);
if(raw){
const tone=parseInt(raw.slice(-1));
let display='';
if(withNumber){
display=raw;
}else if(withTone){
display=pinyinWithTone(raw);
}else{
display=raw.replace(/[1-5]/,'');
}
if(capFirst&&isFirstChar){
display=display.charAt(0).toUpperCase()+display.slice(1);
isFirstChar=false;
}
const tc='tone'+(tone||0);
html+='<span class="'+tc+'">'+display+'</span> ';
continue;
}
}
if(char===' '||char==='\n'){
html+=char;
}else if(/[，。！？、；：""''（）—…\s]/.test(char)){
html+=char;
isFirstChar=true;
}else if(/[a-zA-Z0-9]/.test(char)){
html+=char;
isFirstChar=false;
}else{
html+=char;
isFirstChar=true;
}
}
out.innerHTML=html||'<span style="color:#999">请输入中文文本</span>';
}

function copyResult(){
const text=document.getElementById('output').innerText;
if(navigator.clipboard){
navigator.clipboard.writeText(text).then(()=>{
const d=document.createElement('div');
d.textContent='已复制';
d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;z-index:999';
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
});
}
}

convert();
