let currentYear=new Date().getFullYear();
if(currentYear<2020)currentYear=2020;
if(currentYear>2030)currentYear=2030;

const today=new Date();
today.setHours(0,0,0,0);

// Build year selector
const yearSel=document.getElementById('yearSelector');
for(let y=2020;y<=2030;y++){
const btn=document.createElement('button');
btn.className='year-btn'+(y===currentYear?' active':'');
btn.textContent=y+'年';
btn.onclick=()=>selectYear(y);
yearSel.appendChild(btn);
}

// Find current solar term
function findCurrentTerm(){
let currentTerm=null;
for(let y=2020;y<=2030;y++){
const dates=DATES[y];
if(!dates)continue;
for(let i=0;i<24;i++){
const d=new Date(dates[i]);
const next=i<23?new Date(dates[i+1]):new Date(y+1,1,4);
if(today>=d&&today<next){
currentTerm={year:y,index:i,date:dates[i]};
break;
}
}
if(currentTerm)break;
}
return currentTerm;
}

function formatDate(str){
const d=new Date(str);
return`${d.getMonth()+1}月${d.getDate()}日`;
}

function renderYear(year){
const dates=DATES[year];
if(!dates)return;
const ct=findCurrentTerm();
const currentInfo=document.getElementById('currentInfo');
if(ct&&ct.year===year){
const t=TERMS[ct.index];
currentInfo.innerHTML=`📍 今日节气：${t.emoji} ${t.name}（${formatDate(ct.date)}）`;
}else if(ct){
currentInfo.innerHTML=`📍 当前节气：${TERMS[ct.index].emoji} ${TERMS[ct.index].name}（${ct.year}年${formatDate(ct.date)}）`;
}

let html='';

// Season cards
const seasons=[
{key:"spring",name:"🌸 春季（立春-谷雨）",range:[0,5]},
{key:"summer",name:"☀️ 夏季（立夏-大暑）",range:[6,11]},
{key:"autumn",name:"🍂 秋季（立秋-霜降）",range:[12,17]},
{key:"winter",name:"❄️ 冬季（立冬-大寒）",range:[18,23]}
];

html+='<div class="section-title">📅 四季节气卡片</div>';
html+='<div class="season-grid">';
seasons.forEach(s=>{
html+=`<div class="season-card"><div class="season-header ${s.key}">${s.name}</div><div class="term-list">`;
for(let i=s.range[0];i<=s.range[1];i++){
const t=TERMS[i];const d=dates[i];
const isCurrent=ct&&ct.year===year&&ct.index===i;
html+=`<div class="term-item${isCurrent?' current':''}"><span class="term-name"><span class="emoji">${t.emoji}</span>${t.name}</span><span class="term-date">${formatDate(d)}</span></div>`;
}
html+='</div></div>';
});
html+='</div>';

// Full table
html+='<div class="section-title">📊 完整节气表</div>';
html+='<div class="table-container"><table><thead><tr><th>序号</th><th>节气</th><th>日期</th><th>季节</th><th>描述</th></tr></thead><tbody>';
const seasonLabels={spring:"春",summer:"夏",autumn:"秋",winter:"冬"};
TERMS.forEach((t,i)=>{
const d=dates[i];
const isCurrent=ct&&ct.year===year&&ct.index===i;
html+=`<tr class="${isCurrent?'highlight':''}"><td>${i+1}</td><td>${t.emoji} ${t.name}</td><td>${formatDate(d)}</td><td><span class="season-badge ${t.season}">${seasonLabels[t.season]}</span></td><td>${t.desc}</td></tr>`;
});
html+='</tbody></table></div>';

document.getElementById('contentArea').innerHTML=html;
}

function selectYear(y){
currentYear=y;
document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.year-btn')[y-2020].classList.add('active');
renderYear(y);
}

renderYear(currentYear);
</script>
