<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON对比工具 - Web工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.diff-container{display:flex;gap:12px;margin-bottom:12px}
.diff-container textarea{flex:1;min-height:200px;font-family:monospace;font-size:13px;padding:10px;border:1px solid #ddd;border-radius:10px;resize:vertical}
.options{display:flex;gap:16px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.options label{display:flex;align-items:center;gap:4px;cursor:pointer}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#4a90d9;color:#fff}.btn-primary:hover{background:#357abd}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
.btn-secondary{background:#6c757d;color:#fff}.btn-secondary:hover{background:#5a6268}
.btn-outline{background:#fff;color:#4a90d9;border:1px solid #4a90d9}.btn-outline:hover{background:#e8f0fe}
.diff-view{border:1px solid #ddd;border-radius:10px;overflow:hidden}
.diff-header{background:#f5f5f5;padding:8px 12px;font-weight:600;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}
.diff-body{max-height:600px;overflow:auto;font-family:monospace;font-size:13px}
.diff-line{padding:2px 12px;border-bottom:1px solid #f0f0f0;white-space:pre-wrap;word-break:break-all}
.diff-line.added{background:#e6ffe6}.diff-line.removed{background:#ffe6e6}
.diff-line.modified{background:#fff8e1}.diff-line.unchanged{color:#999}
.diff-line .label{font-weight:700;margin-right:6px}
.diff-line .line-num{color:#999;min-width:30px;display:inline-block;text-align:right;margin-right:8px;user-select:none}
.diff-line .path-display{color:#6a737d;font-size:11px;margin-left:8px}
.diff-tree{padding:12px;font-family:monospace;font-size:13px;max-height:600px;overflow:auto}
.diff-tree .node{padding:3px 0;padding-left:calc(var(--depth,0) * 20px)}
.diff-tree .key{font-weight:600}.diff-tree .arrow{color:#888;margin:0 4px}
.diff-tree .collapsible{cursor:pointer;user-select:none;color:#4a90d9}
.diff-tree .collapsed .children{display:none}
.diff-tree .path-hint{color:#999;font-size:10px;margin-left:4px;font-style:italic}
.tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid #4a90d9}
.tab{padding:8px 18px;cursor:pointer;border:1px solid #ddd;border-bottom:none;border-radius:10px 6px 0 0;background:#f5f5f5;margin-right:2px;font-size:13px}
.tab.active{background:#fff;font-weight:600;border-color:#4a90d9;color:#4a90d9}
.tab-content{display:none}.tab-content.active{display:block}
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:8px 12px;background:#f8f9fa;border-radius:10px;border:1px solid #e0e0e0}
.search-bar input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:monospace;outline:none}
.search-bar input:focus{border-color:#4a90d9}
.search-bar .search-count{font-size:12px;color:#666;white-space:nowrap}
.search-bar button{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
.search-bar button:hover{background:#f0f0f0}
.diff-line.search-match{outline:2px solid #fbbc04;outline-offset:-2px}
.diff-line.search-current{outline:2px solid #ea4335;outline-offset:-2px;background:#fff3cd !important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;opacity:0;transition:opacity .3s}.toast.show{opacity:1}
.toolbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.toolbar-row .sep{width:1px;height:20px;background:#ddd}
@media(max-width:768px){.diff-container{flex-direction:column}.diff-container textarea{min-height:150px}}
</style>
</head>
<body>
<nav class="navbar"><div class="container"><a href="../../" class="logo">🛠️ Web工具箱</a></div></nav>
<div class="container">
<div class="breadcrumb"><a href="../../">首页</a> &gt; <span>JSON对比工具</span></div>
<div class="card tool-header"><h1>JSON对比工具</h1><p>比较两个JSON数据的差异，以结构化方式展示，支持路径显示和搜索</p></div>
<div class="card">
<div class="diff-container">
<textarea id="jsonA" placeholder="粘贴 JSON A...">{
  "name": "张三",
  "age": 25,
  "city": "北京"
}</textarea>
<textarea id="jsonB" placeholder="粘贴 JSON B...">{
  "name": "张三",
  "age": 26,
  "email": "zhangsan@example.com",
  "city": "上海"
}</textarea>
</div>
<div class="options">
<label><input type="checkbox" id="ignoreOrder" checked> 忽略键顺序</label>
<label><input type="checkbox" id="ignoreWhitespace"> 忽略空白差异</label>
<label><input type="checkbox" id="showPath" checked> 显示JSON路径</label>
</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="doDiff()">🔍 对比</button>
<button class="btn btn-success" onclick="copyDiff()">📋 复制差异</button>
<button class="btn btn-outline" onclick="copyPatch()">📄 复制Patch</button>
<button class="btn btn-secondary" onclick="clearAll()">清空</button>
</div>
<div id="stats" style="margin-bottom:12px;font-size:14px;color:#555"></div>
<div class="tabs">
<div class="tab active" onclick="switchTab(0)">🌳 结构视图</div>
<div class="tab" onclick="switchTab(1)">📝 统一差异</div>
</div>
<div class="toolbar-row" id="toolbarRow" style="display:none">
<button class="btn btn-outline" onclick="expandAll()" style="padding:4px 10px;font-size:12px">🔽 全部展开</button>
<button class="btn btn-outline" onclick="collapseAll()" style="padding:4px 10px;font-size:12px">🔼 全部折叠</button>
<span class="sep"></span>
<div class="search-bar" id="searchBar" style="flex:1;margin:0;padding:4px 8px;background:transparent;border:none">
<input type="text" id="searchInput" placeholder="🔍 搜索差异内容或路径..." oninput="searchDiff()">
<button onclick="searchPrev()">▲</button>
<button onclick="searchNext()">▼</button>
<span class="search-count" id="searchCount"></span>
</div>
</div>
<div class="diff-view">
<div id="treeView" class="diff-tree tab-content active"><p style="color:#999;padding:12px">点击"对比"查看结果</p></div>
<div id="unifiedView" class="diff-body tab-content"><p style="color:#999;padding:12px">点击"对比"查看结果</p></div>
</div>
</div>
</div>
<footer class="footer"><p>Web工具箱 © 2024</p></footer>
<script src="../../assets/js/common.js"></script>
<script>
let lastUnifiedDiff='';
let lastPatchDiff='';
let lastDiffs=[];
let searchMatches=[];
let searchIndex=-1;

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.querySelectorAll('.tab-content').forEach((t,idx)=>t.classList.toggle('active',idx===i));
}

function diffJson(a,b,path='',ignoreOrder,ignoreWS){
  const results=[];
  if(a===null||a===undefined){if(b!==null&&b!==undefined)results.push({type:'added',path,value:b});return results}
  if(b===null||b===undefined){results.push({type:'removed',path,value:a});return results}
  if(typeof a!==typeof b||typeof a!=='object'||Array.isArray(a)!==Array.isArray(b)){results.push({type:'modified',path,oldVal:a,newVal:b});return results}
  if(Array.isArray(a)){
    const maxLen=Math.max(a.length,b.length);
    for(let i=0;i<maxLen;i++){
      const p=path?`${path}[${i}]`:`[${i}]`;
      if(i>=a.length)results.push({type:'added',path:p,value:b[i]});
      else if(i>=b.length)results.push({type:'removed',path:p,value:a[i]});
      else results.push(...diffJson(a[i],b[i],p,ignoreOrder,ignoreWS));
    }
    return results;
  }
  const allKeys=new Set([...Object.keys(a),...Object.keys(b)]);
  const keys=ignoreOrder?[...allKeys].sort():[...allKeys];
  for(const k of keys){
    const p=path?`${path}.${k}`:k;
    if(!(k in a))results.push({type:'added',path:p,value:b[k]});
    else if(!(k in b))results.push({type:'removed',path:p,value:a[k]});
    else{
      const va=a[k],vb=b[k];
      if(typeof va==='object'&&va!==null&&typeof vb==='object'&&vb!==null)results.push(...diffJson(va,vb,p,ignoreOrder,ignoreWS));
      else{
        if(ignoreWS&&typeof va==='string'&&typeof vb==='string'&&va.trim()===vb.trim())results.push({type:'unchanged',path:p,value:va});
        else if(va===vb)results.push({type:'unchanged',path:p,value:va});
        else results.push({type:'modified',path:p,oldVal:va,newVal:vb});
      }
    }
  }
  return results;
}

function buildTree(diffs){
  const root={children:{},diffs:[]};
  for(const d of diffs){
    const parts=d.path.replace(/\[(\d+)\]/g,'.$1').split('.');
    let node=root;
    for(let i=0;i<parts.length-1;i++){
      if(!node.children[parts[i]])node.children[parts[i]]={children:{},diffs:[]};
      node=node.children[parts[i]];
    }
    const leaf=parts[parts.length-1];
    if(!node.children[leaf])node.children[leaf]={children:{},diffs:[]};
    node.children[leaf].diffs.push(d);
  }
  return root;
}

function renderTreeNode(name,node,depth,container){
  const hasChildren=Object.keys(node.children).length>0;
  const types=[...new Set(node.diffs.map(d=>d.type))];
  const type=types.includes('removed')?'removed':types.includes('added')?'added':types.includes('modified')?'modified':'unchanged';
  const div=document.createElement('div');
  div.className='node';div.style.setProperty('--depth',depth);
  let bg=type==='added'?'#e6ffe6':type==='removed'?'#ffe6e6':type==='modified'?'#fff8e1':'transparent';
  if(type==='unchanged')div.style.color='#999';
  div.style.background=bg;

  const showPaths=document.getElementById('showPath').checked;
  let label=`<span class="key">${escapeHtml(name)}</span>`;

  if(!hasChildren&&node.diffs.length){
    const d=node.diffs[0];
    if(d.type==='modified')label+=` <span class="arrow">→</span> <span style="color:#c00">${escapeHtml(JSON.stringify(d.oldVal))}</span> <span class="arrow">→</span> <span style="color:#0a0">${escapeHtml(JSON.stringify(d.newVal))}</span>`;
    else if(d.type==='added')label+=`: <span style="color:#0a0">${escapeHtml(JSON.stringify(d.value))}</span>`;
    else if(d.type==='removed')label+=`: <span style="color:#c00">${escapeHtml(JSON.stringify(d.value))}</span>`;
    else label+=`: <span>${escapeHtml(JSON.stringify(d.value))}</span>`;
    if(showPaths&&d.path)label+=` <span class="path-hint">${escapeHtml(d.path)}</span>`;
  }

  if(hasChildren&&type==='unchanged'){
    div.innerHTML=`<span class="collapsible" onclick="this.parentElement.classList.toggle('collapsed')">▸ ${label}</span>`;
    const childDiv=document.createElement('div');childDiv.className='children';
    for(const [k,v] of Object.entries(node.children))renderTreeNode(k,v,depth+1,childDiv);
    div.appendChild(childDiv);
  }else{
    if(hasChildren)div.innerHTML=`<span class="collapsible" onclick="this.parentElement.classList.toggle('collapsed')">▾ ${label}</span>`;
    else div.innerHTML=label;
    if(hasChildren){
      const childDiv=document.createElement('div');childDiv.className='children';
      for(const [k,v] of Object.entries(node.children))renderTreeNode(k,v,depth+1,childDiv);
      div.appendChild(childDiv);
    }
  }
  container.appendChild(div);
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function buildUnified(diffs){
  let lines=[];
  for(const d of diffs){
    if(d.type==='added')lines.push({prefix:'+',text:`${d.path}: ${JSON.stringify(d.value)}`});
    else if(d.type==='removed')lines.push({prefix:'-',text:`${d.path}: ${JSON.stringify(d.value)}`});
    else if(d.type==='modified'){
      lines.push({prefix:'-',text:`${d.path}: ${JSON.stringify(d.oldVal)}`});
      lines.push({prefix:'+',text:`${d.path}: ${JSON.stringify(d.newVal)}`});
    }
  }
  return lines;
}

function buildPatch(diffs){
  let patch='--- JSON A\n+++ JSON B\n';
  let hunkLines=[];
  let lineOld=1,lineNew=1;
  for(const d of diffs){
    if(d.type==='added'){
      hunkLines.push({prefix:'+',text:JSON.stringify(d.value),path:d.path});
      lineNew++;
    }else if(d.type==='removed'){
      hunkLines.push({prefix:'-',text:JSON.stringify(d.value),path:d.path});
      lineOld++;
    }else if(d.type==='modified'){
      hunkLines.push({prefix:'-',text:JSON.stringify(d.oldVal),path:d.path});
      hunkLines.push({prefix:'+',text:JSON.stringify(d.newVal),path:d.path});
      lineOld++;lineNew++;
    }
  }
  if(hunkLines.length>0){
    patch+=`@@ -1,${lineOld} +1,${lineNew} @@\n`;
    hunkLines.forEach(l=>{patch+=`${l.prefix} ${l.path}: ${l.text}\n`});
  }
  return patch;
}

function doDiff(){
  const aStr=document.getElementById('jsonA').value.trim();
  const bStr=document.getElementById('jsonB').value.trim();
  if(!aStr||!bStr){showMessage('warning','请输入两个JSON');return}
  let a,b;
  try{a=JSON.parse(aStr)}catch(e){showMessage('error','JSON A 格式错误: '+e.message);return}
  try{b=JSON.parse(bStr)}catch(e){showMessage('error','JSON B 格式错误: '+e.message);return}
  const ignoreOrder=document.getElementById('ignoreOrder').checked;
  const ignoreWS=document.getElementById('ignoreWhitespace').checked;
  const diffs=diffJson(a,b,'',ignoreOrder,ignoreWS);
  lastDiffs=diffs;
  const added=diffs.filter(d=>d.type==='added').length;
  const removed=diffs.filter(d=>d.type==='removed').length;
  const modified=diffs.filter(d=>d.type==='modified').length;
  const unchanged=diffs.filter(d=>d.type==='unchanged').length;
  document.getElementById('stats').innerHTML=`<span style="color:#0a0">新增 ${added}</span> · <span style="color:#c00">删除 ${removed}</span> · <span style="color:#c90">修改 ${modified}</span> · <span style="color:#999">未变 ${unchanged}</span>`;

  // Show toolbar
  document.getElementById('toolbarRow').style.display='flex';

  // Tree view
  const treeDiv=document.getElementById('treeView');treeDiv.innerHTML='';
  const tree=buildTree(diffs);
  for(const [k,v] of Object.entries(tree.children))renderTreeNode(k,v,0,treeDiv);

  // Unified view
  const unifiedLines=buildUnified(diffs);
  lastUnifiedDiff=unifiedLines.map(l=>l.prefix+' '+l.text).join('\n');
  lastPatchDiff=buildPatch(diffs);
  const uniDiv=document.getElementById('unifiedView');uniDiv.innerHTML='';
  if(unifiedLines.length===0){uniDiv.innerHTML='<p style="padding:12px;color:#999">两个JSON完全相同</p>';return}
  const showPaths=document.getElementById('showPath').checked;
  unifiedLines.forEach((l,idx)=>{
    const d=document.createElement('div');
    d.className='diff-line '+(l.prefix==='+'?'added':l.prefix==='-'?'removed':'');
    d.dataset.lineIdx=idx;
    d.innerHTML=`<span class="line-num">${idx+1}</span>${escapeHtml(l.prefix+' '+l.text)}${showPaths?'<span class="path-display">'+escapeHtml(l.text.split(':')[0])+'</span>':''}`;
    uniDiv.appendChild(d);
  });
}

function expandAll(){
  document.querySelectorAll('.diff-tree .node.collapsed').forEach(n=>n.classList.remove('collapsed'));
}
function collapseAll(){
  document.querySelectorAll('.diff-tree .node').forEach(n=>{
    if(n.querySelector('.children'))n.classList.add('collapsed');
  });
}

function searchDiff(){
  const query=document.getElementById('searchInput').value.trim().toLowerCase();
  searchMatches=[];
  searchIndex=-1;
  document.querySelectorAll('.diff-line.search-match,.diff-line.search-current').forEach(el=>{
    el.classList.remove('search-match','search-current');
  });
  if(!query){document.getElementById('searchCount').textContent='';return}
  document.querySelectorAll('.diff-line').forEach(el=>{
    if(el.textContent.toLowerCase().includes(query)){
      el.classList.add('search-match');
      searchMatches.push(el);
    }
  });
  document.getElementById('searchCount').textContent=`${searchMatches.length} 个匹配`;
  if(searchMatches.length>0){searchIndex=0;highlightSearch();}
}
function highlightSearch(){
  document.querySelectorAll('.diff-line.search-current').forEach(el=>el.classList.remove('search-current'));
  if(searchIndex>=0&&searchIndex<searchMatches.length){
    searchMatches[searchIndex].classList.add('search-current');
    searchMatches[searchIndex].scrollIntoView({behavior:'smooth',block:'center'});
    document.getElementById('searchCount').textContent=`${searchIndex+1}/${searchMatches.length}`;
  }
}
function searchNext(){
  if(searchMatches.length===0)return;
  searchIndex=(searchIndex+1)%searchMatches.length;
  highlightSearch();
}
function searchPrev(){
  if(searchMatches.length===0)return;
  searchIndex=(searchIndex-1+searchMatches.length)%searchMatches.length;
  highlightSearch();
}

function copyDiff(){
  if(!lastUnifiedDiff){showMessage('warning','没有可复制的差异');return}
  copyToClipboard(lastUnifiedDiff);showMessage('success','已复制差异内容');
}

function copyPatch(){
  if(!lastPatchDiff){showMessage('warning','没有可复制的差异');return}
  copyToClipboard(lastPatchDiff);showMessage('success','已复制Patch格式');
}

function clearAll(){
  document.getElementById('jsonA').value='';document.getElementById('jsonB').value='';
  document.getElementById('treeView').innerHTML='<p style="color:#999;padding:12px">点击"对比"查看结果</p>';
  document.getElementById('unifiedView').innerHTML='<p style="color:#999;padding:12px">点击"对比"查看结果</p>';
  document.getElementById('stats').innerHTML='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchCount').textContent='';
  document.getElementById('toolbarRow').style.display='none';
  lastUnifiedDiff='';lastPatchDiff='';lastDiffs=[];searchMatches=[];
}
</script>
</body>
</html>
