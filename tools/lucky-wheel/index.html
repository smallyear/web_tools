<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线抽奖转盘 - 在线工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
.wheel-wrap { text-align: center; margin: 20px 0; position: relative; display: inline-block; }
canvas { max-width: 100%; }
.pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 36px solid #e53e3e; z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
.prize-textarea { width: 100%; height: 120px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; resize: vertical; }
.btn { padding: 12px 32px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; color: #fff; margin-top: 12px; }
.btn-primary { background: #e53e3e; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
#result { font-size: 28px; font-weight: 700; margin: 16px 0; min-height: 40px; color: #e53e3e; }
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti { position: absolute; width: 10px; height: 10px; top: -20px; animation: confetti-fall 3s ease-in forwards; border-radius: 2px; }
@keyframes confetti-fall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg); } }
</style>
</head>
<body>
<nav class="navbar"><a href="../../index.html" class="nav-brand">🛠️ 在线工具箱</a></nav>
<div class="container">
    <div class="breadcrumb"><a href="../../index.html">首页</a> &gt; <span>在线抽奖转盘</span></div>
    <div class="card">
        <h2>在线抽奖转盘</h2>
        <div class="wheel-wrap">
            <div class="pointer"></div>
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>
        <div id="result"></div>
        <div style="text-align:center"><button class="btn btn-primary" id="spinBtn">🎰 开始抽奖</button></div>
        <div style="margin-top:20px">
            <label style="font-weight:600">奖品列表（每行一个）：</label>
            <textarea class="prize-textarea" id="prizes">一等奖
二等奖
三等奖
谢谢参与
再来一次
幸运奖</textarea>
        </div>
    </div>
    <footer class="footer">© 2024 在线工具箱 | <a href="../../index.html">返回首页</a></footer>
</div>
<script src="../../assets/js/common.js"></script>
<script>
(function(){
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const prizesEl = document.getElementById('prizes');
    const spinBtn = document.getElementById('spinBtn');
    const resultEl = document.getElementById('result');
    const colors = ['#e53e3e','#f59e0b','#22c55e','#4a6cf7','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    let prizes = [], spinning = false, angle = 0;

    function getPrizes(){ return prizesEl.value.split('\n').map(s=>s.trim()).filter(Boolean); }

    function drawWheel(){
        prizes = getPrizes();
        if(!prizes.length) return;
        const cx = 200, cy = 200, r = 180, n = prizes.length;
        const arc = 2 * Math.PI / n;
        ctx.clearRect(0,0,400,400);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        for(let i = 0; i < n; i++){
            const startAngle = i * arc;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, r, startAngle, startAngle + arc);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.save();
            ctx.rotate(startAngle + arc / 2);
            ctx.fillStyle = '#fff';
            ctx.font = n > 8 ? 'bold 14px sans-serif' : 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(prizes[i], r * 0.6, 6);
            ctx.restore();
        }
        ctx.restore();
        // center circle
        ctx.beginPath();
        ctx.arc(cx, cy, 25, 0, 2*Math.PI);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#ccc';
        ctx.stroke();
    }

    function spin(){
        if(spinning || prizes.length < 2) return;
        spinning = true;
        spinBtn.disabled = true;
        resultEl.textContent = '';
        let velocity = 0.3 + Math.random() * 0.2;
        const friction = 0.995;
        const minV = 0.001;
        function step(){
            velocity *= friction;
            angle += velocity;
            drawWheel();
            if(velocity > minV){
                requestAnimationFrame(step);
            } else {
                spinning = false;
                spinBtn.disabled = false;
                // pointer at top (angle 0 = right, top = -PI/2)
                const n = prizes.length;
                const arc = 2 * Math.PI / n;
                let normalized = ((-angle - Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
                let idx = Math.floor(normalized / arc) % n;
                resultEl.textContent = '🎉 恭喜获得：' + prizes[idx];
                showConfetti();
            }
        }
        requestAnimationFrame(step);
    }

    function showConfetti(){
        const container = document.createElement('div');
        container.className = 'confetti-container';
        document.body.appendChild(container);
        const c = ['#e53e3e','#f59e0b','#22c55e','#4a6cf7','#8b5cf6','#ec4899'];
        for(let i = 0; i < 80; i++){
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random()*100+'%';
            el.style.background = c[Math.floor(Math.random()*c.length)];
            el.style.animationDelay = Math.random()*2+'s';
            el.style.width = (6+Math.random()*8)+'px';
            el.style.height = (6+Math.random()*8)+'px';
            container.appendChild(el);
        }
        setTimeout(()=>container.remove(), 4000);
    }

    spinBtn.onclick = spin;
    prizesEl.addEventListener('input', drawWheel);
    drawWheel();
})();
</script>
</body>
</html>
