<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年龄/生肖/星座计算器 - 在线工具箱</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:0;background:#f5f7fa;color:#333}
.navbar{background:#2c3e50;padding:12px 20px;display:flex;align-items:center}
.navbar a{color:#fff;text-decoration:none;font-size:18px;font-weight:bold}
.breadcrumb{padding:10px 20px;font-size:14px;color:#666;background:#fff;border-bottom:1px solid #eee}
.breadcrumb a{color:#3498db;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.container{max-width:700px;margin:20px auto;padding:0 15px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:30px;margin-bottom:20px}
.card h2{margin-top:0;color:#2c3e50}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:#555}
.form-group input{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;box-sizing:border-box;transition:border .2s}
.form-group input:focus{outline:none;border-color:#3498db}
.btn{background:#3498db;color:#fff;border:none;padding:12px 30px;border-radius:8px;font-size:16px;cursor:pointer;transition:background .2s;width:100%}
.btn:hover{background:#2980b9}
.result-section{margin-top:20px;display:none}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.result-item{background:#f8f9fa;border-radius:8px;padding:14px;text-align:center;border-left:4px solid #3498db}
.result-item .label{font-size:13px;color:#888;margin-bottom:4px}
.result-item .value{font-size:20px;font-weight:bold;color:#2c3e50}
.result-item.highlight{border-left-color:#e74c3c;background:#fff5f5}
.result-item.zodiac{border-left-color:#f39c12}
.result-item.constellation{border-left-color:#9b59b6}
.full-width{grid-column:1/-1}
.footer{text-align:center;padding:20px;color:#999;font-size:13px;margin-top:40px}
@media(max-width:600px){.result-grid{grid-template-columns:1fr}.container{padding:0 10px}.card{padding:20px}}
</style>
</head>
<body>
<div class="navbar"><a href="../../index.html">🧰 在线工具箱</a></div>
<div class="breadcrumb"><a href="../../index.html">首页</a> / <a href="../../index.html">工具列表</a> / 年龄/生肖/星座计算器</div>
<div class="container">
<div class="card">
<h2>🎂 年龄/生肖/星座计算器</h2>
<div class="form-group">
<label>请选择出生日期</label>
<input type="date" id="birthdate" max="">
</div>
<button class="btn" onclick="calculate()">开始计算</button>
<div class="result-section" id="results">
<div class="result-grid">
<div class="result-item full-width highlight">
<div class="label">实际年龄</div>
<div class="value" id="actualAge">-</div>
</div>
<div class="result-item">
<div class="label">虚岁</div>
<div class="value" id="virtualAge">-</div>
</div>
<div class="result-item">
<div class="label">出生天数</div>
<div class="value" id="totalDays">-</div>
</div>
<div class="result-item">
<div class="label">距离下一个生日</div>
<div class="value" id="nextBirthday">-</div>
</div>
<div class="result-item zodiac">
<div class="label">生肖</div>
<div class="value" id="zodiac">-</div>
</div>
<div class="result-item constellation">
<div class="label">星座</div>
<div class="value" id="constellation">-</div>
</div>
</div>
</div>
</div>
</div>
<div class="footer">© 2026 在线工具箱 | 纯前端计算，数据不上传</div>
<script src="../../assets/js/common.js"></script>
<script>
document.getElementById('birthdate').max=new Date().toISOString().split('T')[0];
const zodiacs=['鼠🐭','牛🐂','虎🐅','兔🐇','龙🐉','蛇🐍','马🐎','羊🐑','猴🐒','鸡🐓','狗🐕','猪🐖'];
const constellations=[
{name:'摩羯座♑',emoji:'♑',start:[12,22],end:[1,19]},
{name:'水瓶座♒',emoji:'♒',start:[1,20],end:[2,18]},
{name:'双鱼座♓',emoji:'♓',start:[2,19],end:[3,20]},
{name:'白羊座♈',emoji:'♈',start:[3,21],end:[4,19]},
{name:'金牛座♉',emoji:'♉',start:[4,20],end:[5,20]},
{name:'双子座♊',emoji:'♊',start:[5,21],end:[6,21]},
{name:'巨蟹座♋',emoji:'♋',start:[6,22],end:[7,22]},
{name:'狮子座♌',emoji:'♌',start:[7,23],end:[8,22]},
{name:'处女座♍',emoji:'♍',start:[8,23],end:[9,22]},
{name:'天秤座♎',emoji:'♎',start:[9,23],end:[10,23]},
{name:'天蝎座♏',emoji:'♏',start:[10,24],end:[11,22]},
{name:'射手座♐',emoji:'♐',start:[11,23],end:[12,21]}
];
function calculate(){
const bd=document.getElementById('birthdate').value;
if(!bd){alert('请选择出生日期');return;}
const birth=new Date(bd+'T00:00:00');
const today=new Date();
if(birth>today){alert('出生日期不能晚于今天');return;}
let y=today.getFullYear()-birth.getFullYear();
let m=today.getMonth()-birth.getMonth();
let d=today.getDate()-birth.getDate();
if(d<0){m--;const prev=new Date(today.getFullYear(),today.getMonth(),0);d+=prev.getDate();}
if(m<0){y--;m+=12;}
document.getElementById('actualAge').textContent=y+'岁 '+m+'个月 '+d+'天';
const lunarAge=today.getFullYear()-birth.getFullYear()+1;
document.getElementById('virtualAge').textContent=lunarAge+'岁';
const diffMs=today-birth;
const totalDays=Math.floor(diffMs/(1000*60*60*24));
document.getElementById('totalDays').textContent=totalDays.toLocaleString()+' 天';
let nextB=new Date(today.getFullYear(),birth.getMonth(),birth.getDate());
if(nextB<=today)nextB=new Date(today.getFullYear()+1,birth.getMonth(),birth.getDate());
const daysToNext=Math.ceil((nextB-today)/(1000*60*60*24));
document.getElementById('nextBirthday').textContent=daysToNext+' 天';
const zIdx=(birth.getFullYear()-4)%12;
document.getElementById('zodiac').textContent=zodiacs[zIdx];
const mon=birth.getMonth()+1,day=birth.getDate();
let cIdx=0;
if((mon==1&&day>=20)||(mon==2&&day<=18))cIdx=1;
else if((mon==2&&day>=19)||(mon==3&&day<=20))cIdx=2;
else if((mon==3&&day>=21)||(mon==4&&day<=19))cIdx=3;
else if((mon==4&&day>=20)||(mon==5&&day<=20))cIdx=4;
else if((mon==5&&day>=21)||(mon==6&&day<=21))cIdx=5;
else if((mon==6&&day>=22)||(mon==7&&day<=22))cIdx=6;
else if((mon==7&&day>=23)||(mon==8&&day<=22))cIdx=7;
else if((mon==8&&day>=23)||(mon==9&&day<=22))cIdx=8;
else if((mon==9&&day>=23)||(mon==10&&day<=23))cIdx=9;
else if((mon==10&&day>=24)||(mon==11&&day<=22))cIdx=10;
else if((mon==11&&day>=23)||(mon==12&&day<=21))cIdx=11;
const c=constellations[cIdx];
document.getElementById('constellation').textContent=c.name+' ('+c.start[0]+'/'+c.start[1]+'-'+c.end[0]+'/'+c.end[1]+')';
document.getElementById('results').style.display='block';
}
</script>
</body>
</html>
