<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON格式化工具 - Web Tools</title>
  <meta name="description" content="JSON在线格式化、压缩、语法校验、高亮显示">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .json-layout {
      display: grid;
      gap: 24px;
    }
    @media (min-width: 768px) {
      .json-layout { grid-template-columns: 1fr 1fr; }
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .editor-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .editor-title .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .badge-success { background: #e8f5e9; color: #2e7d32; }
    .badge-error { background: #ffebee; color: #c62828; }
    .badge-info { background: #e3f2fd; color: #1565c0; }
    .editor-actions {
      display: flex;
      gap: 6px;
    }
    .editor-actions .btn {
      padding: 6px 12px;
      height: 32px;
      font-size: 12px;
    }

    /* 输入区 */
    .code-area {
      width: 100%;
      height: 500px;
      font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      tab-size: 2;
      background: #fff;
      color: #1e293b;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .code-area:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.1);
    }
    .code-area::placeholder {
      color: #94a3b8;
    }

    /* 输出区 - 语法高亮 */
    .output-area {
      width: 100%;
      height: 500px;
      font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow-x: auto;
      overflow-y: auto;
      background: #f8fafc;
      white-space: pre;
      tab-size: 2;
      color: #1e293b;
    }
    .output-area:empty::before {
      content: '格式化结果将在这里显示...';
      color: #94a3b8;
      font-style: italic;
    }

    /* JSON 语法高亮颜色 */
    .json-key { color: #0550ae; font-weight: 500; }
    .json-string { color: #0a3069; }
    .json-number { color: #953800; }
    .json-boolean { color: #cf222e; font-weight: 600; }
    .json-null { color: #cf222e; font-weight: 600; }
    .json-brace { color: #6e7781; }
    .json-bracket { color: #6e7781; }
    .json-colon { color: #6e7781; }
    .json-comma { color: #6e7781; }

    /* 行号 */
    .output-wrapper {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #f8fafc;
    }
    .line-numbers {
      position: absolute;
      left: 0;
      top: 0;
      width: 48px;
      padding: 16px 8px 16px 0;
      text-align: right;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #94a3b8;
      background: #f1f5f9;
      border-right: 1px solid var(--border);
      user-select: none;
      white-space: pre;
      z-index: 1;
      pointer-events: none;
    }
    .output-area.with-lines {
      margin-left: 49px;
      border: none;
      border-radius: 0;
      background: transparent;
    }

    /* 操作栏 */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .action-bar .spacer { flex: 1; }

    /* 统计信息 */
    .stats-bar {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .stats-bar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 暗黑模式语法颜色 */
    body.dark-mode .json-key { color: #79c0ff; }
    body.dark-mode .json-string { color: #a5d6ff; }
    body.dark-mode .json-number { color: #ffa657; }
    body.dark-mode .json-boolean { color: #ff7b72; }
    body.dark-mode .json-null { color: #ff7b72; }
    body.dark-mode .json-brace, body.dark-mode .json-bracket,
    body.dark-mode .json-colon, body.dark-mode .json-comma { color: #8b949e; }
    body.dark-mode .output-area { background: #0d1117; color: #c9d1d9; }
    body.dark-mode .line-numbers { background: #161b22; border-color: #30363d; color: #484f58; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../../index.html" class="navbar-brand">🛠️ Web Tools</a>
      <div class="navbar-links">
        <a href="../../index.html" class="navbar-link">首页</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="tool-header">
      <div class="breadcrumb">
        <a href="../../index.html">首页</a> / JSON格式化工具
      </div>
      <h1>📝 JSON格式化工具</h1>
      <p style="color: var(--text-secondary); margin-top: 8px;">JSON格式化、压缩、语法校验、高亮显示，支持大文件</p>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
      <button class="btn btn-primary" id="formatBtn">✨ 格式化</button>
      <button class="btn btn-secondary" id="compressBtn">📦 压缩</button>
      <button class="btn btn-secondary" id="escapeBtn">🔒 转义</button>
      <button class="btn btn-secondary" id="unescapeBtn">🔓 去转义</button>
      <select class="form-select" id="indentSelect" style="width:auto;height:40px;font-size:13px;padding:8px 32px 8px 12px;">
        <option value="2">2 空格</option>
        <option value="4">4 空格</option>
        <option value="tab">Tab</option>
      </select>
      <div class="spacer"></div>
      <button class="btn btn-secondary" id="clearBtn">🗑️ 清空</button>
    </div>

    <!-- 提示消息 -->
    <div id="errorMessage" class="message message-error" style="display: none; margin-bottom: 16px;"></div>
    <div id="successMessage" class="message message-success" style="display: none; margin-bottom: 16px;"></div>

    <!-- 编辑器布局 -->
    <div class="json-layout">
      <!-- 输入 -->
      <div class="card" style="padding-bottom: 0;">
        <div class="editor-header">
          <span class="editor-title">
            📥 输入
            <span class="badge badge-info" id="inputSize"></span>
          </span>
          <div class="editor-actions">
            <button class="btn btn-secondary" id="uploadJsonBtn">📂 上传</button>
            <button class="btn btn-secondary" id="pasteBtn">📋 粘贴</button>
            <input type="file" id="fileInput" accept=".json,application/json" style="display: none;">
          </div>
        </div>
        <textarea class="code-area" id="jsonInput" placeholder='在此粘贴或输入 JSON 文本...&#10;&#10;例如：{"name": "test", "value": 123}'></textarea>
      </div>

      <!-- 输出 -->
      <div class="card" style="padding-bottom: 0;">
        <div class="editor-header">
          <span class="editor-title">
            📤 输出
            <span class="badge badge-success" id="outputInfo" style="display:none;"></span>
          </span>
          <div class="editor-actions">
            <button class="btn btn-secondary" id="copyBtn">📋 复制</button>
            <button class="btn btn-secondary" id="downloadJsonBtn">📥 下载</button>
          </div>
        </div>
        <div class="output-wrapper">
          <div class="line-numbers" id="lineNumbers"></div>
          <div class="output-area with-lines" id="jsonOutput"></div>
        </div>
        <div class="stats-bar" id="statsBar" style="display:none;">
          <span>📊 行数: <strong id="statLines">0</strong></span>
          <span>📏 字符: <strong id="statChars">0</strong></span>
          <span>📦 大小: <strong id="statSize">0 B</strong></span>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Web Tools - 纯前端工具，数据安全</p>
    </div>
  </footer>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function() {
      const jsonInput = document.getElementById('jsonInput');
      const jsonOutput = document.getElementById('jsonOutput');
      const lineNumbers = document.getElementById('lineNumbers');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const indentSelect = document.getElementById('indentSelect');
      const fileInput = document.getElementById('fileInput');
      const inputSize = document.getElementById('inputSize');
      const outputInfo = document.getElementById('outputInfo');
      const statsBar = document.getElementById('statsBar');

      function showMsg(el, type, text) {
        el.textContent = `${type === 'error' ? '❌' : '✅'} ${text}`;
        el.className = `message message-${type}`;
        el.style.display = 'flex';
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
      }

      function getIndent() {
        const val = indentSelect.value;
        return val === 'tab' ? '\t' : parseInt(val);
      }

      function parseJSON(input) {
        try {
          const obj = JSON.parse(input);
          return { obj, error: null };
        } catch (err) {
          return { obj: null, error: err.message };
        }
      }

      // JSON 语法高亮
      function highlightJSON(json) {
        // 对大文件做性能优化：分段处理
        if (json.length > 500000) {
          return escapeHtml(json);
        }
        return json.replace(
          /("(?:\\.|[^"\\])*")\s*:/g,  // keys
          '<span class="json-key">$1</span><span class="json-colon">:</span>'
        ).replace(
          /:\s*("(?:\\.|[^"\\])*")/g,   // string values
          ': <span class="json-string">$1</span>'
        ).replace(
          /:\s*(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g,  // numbers
          ': <span class="json-number">$1</span>'
        ).replace(
          /:\s*(true|false)/g,  // booleans
          ': <span class="json-boolean">$1</span>'
        ).replace(
          /:\s*(null)/g,  // null
          ': <span class="json-null">$1</span>'
        ).replace(
          /([{}])/g,  // braces
          '<span class="json-brace">$1</span>'
        ).replace(
          /([\[\]])/g,  // brackets
          '<span class="json-bracket">$1</span>'
        ).replace(
          /,\s*$/gm,  // trailing commas
          '<span class="json-comma">,</span>'
        );
      }

      function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      function updateLineNumbers(text) {
        const count = text.split('\n').length;
        const nums = [];
        for (let i = 1; i <= count; i++) nums.push(i);
        lineNumbers.textContent = nums.join('\n');
      }

      function updateStats(text) {
        const lines = text.split('\n').length;
        const chars = text.length;
        const bytes = new Blob([text]).size;
        document.getElementById('statLines').textContent = lines.toLocaleString();
        document.getElementById('statChars').textContent = chars.toLocaleString();
        document.getElementById('statSize').textContent = formatFileSize(bytes);
        statsBar.style.display = 'flex';
      }

      // 输入大小实时更新
      function updateInputSize() {
        const text = jsonInput.value;
        if (!text) {
          inputSize.style.display = 'none';
          return;
        }
        const size = new Blob([text]).size;
        inputSize.textContent = formatFileSize(size);
        inputSize.style.display = 'inline';
      }

      function setOutput(text, highlighted) {
        if (highlighted) {
          jsonOutput.innerHTML = highlighted;
        } else {
          jsonOutput.textContent = text;
        }
        updateLineNumbers(text);
        updateStats(text);
      }

      function formatJSON() {
        const input = jsonInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入JSON文本');
          return;
        }
        const { obj, error } = parseJSON(input);
        if (error) {
          showMsg(errorMessage, 'error', `JSON语法错误: ${error}`);
          return;
        }
        const indent = getIndent();
        const formatted = JSON.stringify(obj, null, indent);
        const highlighted = highlightJSON(formatted);
        setOutput(formatted, highlighted);

        outputInfo.textContent = '✅ 格式化成功';
        outputInfo.className = 'badge badge-success';
        outputInfo.style.display = 'inline';
        showMsg(successMessage, 'success', 'JSON格式化成功');
      }

      function compressJSON() {
        const input = jsonInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入JSON文本');
          return;
        }
        const { obj, error } = parseJSON(input);
        if (error) {
          showMsg(errorMessage, 'error', `JSON语法错误: ${error}`);
          return;
        }
        const compressed = JSON.stringify(obj);
        setOutput(compressed, null);
        showMsg(successMessage, 'success', `JSON压缩成功 (${formatFileSize(compressed.length)})`);
      }

      function escapeJSON() {
        const input = jsonInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入JSON文本');
          return;
        }
        const escaped = JSON.stringify(input);
        setOutput(escaped, null);
        showMsg(successMessage, 'success', '转义成功');
      }

      function unescapeJSON() {
        const input = jsonInput.value.trim();
        if (!input) {
          showMsg(errorMessage, 'error', '请先输入JSON文本');
          return;
        }
        try {
          const unescaped = JSON.parse(input);
          if (typeof unescaped === 'object' && unescaped !== null) {
            const formatted = JSON.stringify(unescaped, null, 2);
            setOutput(formatted, highlightJSON(formatted));
          } else {
            setOutput(String(unescaped), null);
          }
          showMsg(successMessage, 'success', '去转义成功');
        } catch (err) {
          showMsg(errorMessage, 'error', `去转义失败: ${err.message}`);
        }
      }

      // 同步滚动：输出区滚动时，行号跟着动
      jsonOutput.addEventListener('scroll', () => {
        lineNumbers.style.transform = `translateY(-${jsonOutput.scrollTop}px)`;
      });

      // 事件绑定
      document.getElementById('formatBtn').addEventListener('click', formatJSON);
      document.getElementById('compressBtn').addEventListener('click', compressJSON);
      document.getElementById('escapeBtn').addEventListener('click', escapeJSON);
      document.getElementById('unescapeBtn').addEventListener('click', unescapeJSON);

      document.getElementById('clearBtn').addEventListener('click', () => {
        jsonInput.value = '';
        jsonOutput.innerHTML = '';
        lineNumbers.textContent = '';
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
        statsBar.style.display = 'none';
        outputInfo.style.display = 'none';
        inputSize.style.display = 'none';
      });

      document.getElementById('copyBtn').addEventListener('click', () => {
        const text = jsonOutput.textContent;
        if (!text) {
          showMsg(errorMessage, 'error', '输出为空，无法复制');
          return;
        }
        copyToClipboard(text);
        showMsg(successMessage, 'success', '已复制到剪贴板');
      });

      document.getElementById('downloadJsonBtn').addEventListener('click', () => {
        const text = jsonOutput.textContent;
        if (!text) {
          showMsg(errorMessage, 'error', '输出为空，无法下载');
          return;
        }
        const blob = new Blob([text], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `formatted-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showMsg(successMessage, 'success', 'JSON已下载');
      });

      document.getElementById('pasteBtn').addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          jsonInput.value = text;
          updateInputSize();
          showMsg(successMessage, 'success', '已粘贴');
        } catch (err) {
          showMsg(errorMessage, 'error', '无法读取剪贴板内容');
        }
      });

      document.getElementById('uploadJsonBtn').addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        handleFileUpload(file, '.json,application/json', 10 * 1024 * 1024, (validFile) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            jsonInput.value = ev.target.result;
            updateInputSize();
            showMsg(successMessage, 'success', `文件读取成功 (${formatFileSize(file.size)})`);
          };
          reader.readAsText(file);
        });
      });

      // 快捷键
      jsonInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          formatJSON();
        }
        // Tab 缩进
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = jsonInput.selectionStart;
          const end = jsonInput.selectionEnd;
          jsonInput.value = jsonInput.value.substring(0, start) + '  ' + jsonInput.value.substring(end);
          jsonInput.selectionStart = jsonInput.selectionEnd = start + 2;
        }
      });

      // 实时显示输入大小
      jsonInput.addEventListener('input', updateInputSize);
    })();
  </script>
</body>
</html>
