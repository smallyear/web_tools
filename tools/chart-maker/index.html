<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图表生成器 - 网页工具集</title>
  <meta name="description" content="柱状图/饼图/折线图/环形图在线生成">
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;line-height:1.6}
.navbar{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:12px 0;position:sticky;top:0;z-index:100}
.navbar .container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.navbar .logo{font-size:1.3rem;font-weight:700;color:#1a73e8;text-decoration:none}
.breadcrumb{max-width:1200px;margin:0 auto;padding:12px 20px;font-size:.9rem;color:#666}
.breadcrumb a{color:#1a73e8;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.header{background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px;text-align:center}
.header h1{font-size:1.8rem;margin-bottom:8px}
.header p{color:#666}
.main-grid{display:grid;grid-template-columns:340px 1fr;gap:24px;margin-bottom:24px}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.panel h3{margin-bottom:16px;font-size:1.1rem}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.9rem;color:#555;margin-bottom:6px;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius: 10px;font-size:.9rem;outline:none;transition:border .3s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#1a73e8}
.form-group textarea{height:160px;resize:vertical}
.chart-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.chart-tab{padding:8px 16px;border:2px solid #e0e0e0;background:#fff;border-radius: 10px;cursor:pointer;font-size:.85rem;transition:all .2s}
.chart-tab:hover{border-color:#1a73e8}
.chart-tab.active{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8;font-weight:600}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.toggle-row label{font-size:.9rem;color:#555}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:12px;transition:.3s}
.toggle .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:#1a73e8}
.toggle input:checked+.slider:before{transform:translateX(20px)}
.color-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.color-swatch{width:28px;height:28px;border-radius: 10px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-swatch:hover,.color-swatch.active{border-color:#333;transform:scale(1.1)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row button{flex:1;padding:10px;border:none;border-radius: 10px;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#f5f5f5;color:#333}
.btn-secondary:hover{background:#e0e0e0}
.btn-success{background:#4CAF50;color:#fff}
.btn-success:hover{background:#388E3C}
.chart-area{min-height:400px;display:flex;align-items:center;justify-content:center}
.chart-area canvas{max-width:100%;border-radius: 10px}
.footer{text-align:center;padding:30px 20px;color:#999;font-size:.85rem;margin-top:40px}
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="../../index.html" class="logo">🛠️ 网页工具集</a>
</div>
</nav>
<div class="breadcrumb">
<a href="../../index.html">首页</a> / 图表生成器
</div>
<div class="container">
<div class="header">
<h1>📊 图表生成器</h1>
<p>输入数据，选择图表类型，一键生成可视化图表</p>
</div>
<div class="main-grid">
<div class="panel">
<h3>📝 数据输入</h3>
<div class="form-group">
<label>图表标题</label>
<input type="text" id="chartTitle" value="2024年季度销售数据" placeholder="输入图表标题">
</div>
<div class="form-group">
<label>数据（每行：标签,数值）</label>
<textarea id="dataInput">一季度,1200
二季度,1800
三季度,1500
四季度,2200</textarea>
</div>
<div class="form-group">
<label>图表类型</label>
<div class="chart-tabs" id="chartTabs">
<div class="chart-tab active" data-type="bar">📊 柱状图</div>
<div class="chart-tab" data-type="pie">🥧 饼图</div>
<div class="chart-tab" data-type="line">📈 折线图</div>
<div class="chart-tab" data-type="donut">🍩 环形图</div>
</div>
</div>
<div class="form-group">
<label>配色方案</label>
<div class="color-presets" id="colorPresets"></div>
</div>
<div class="toggle-row">
<label>显示数值</label>
<div class="toggle"><input type="checkbox" id="showValues" checked><span class="slider"></span></div>
</div>
<div class="toggle-row">
<label>动画效果</label>
<div class="toggle"><input type="checkbox" id="showAnim" checked><span class="slider"></span></div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="renderChart()">🎨 生成图表</button>
<button class="btn-success" onclick="downloadPNG()">💾 下载PNG</button>
</div>
<div class="btn-row">
<button class="btn-secondary" onclick="loadExample('sales')">📦 销售示例</button>
<button class="btn-secondary" onclick="loadExample('population')">👥 人口示例</button>
</div>
</div>
<div class="panel chart-area">
<canvas id="chartCanvas" width="700" height="500"></canvas>
</div>
</div>
</div>
<div class="footer">网页工具集 &copy; 2026 | 纯前端实现，无需安装</div>
<script src="../../assets/js/common.js"></script>
<script>
const COLOR_SCHEMES=[
{name:'经典蓝',colors:['#1a73e8','#34a853','#fbbc04','#ea4335','#9c27b0','#00bcd4','#ff9800','#795548']},
{name:'彩虹',colors:['#e91e63','#9c27b0','#3f51b5','#00bcd4','#4CAF50','#ffeb3b','#ff9800','#f44336']},
{name:'柔和',colors:['#64b5f6','#81c784','#ffb74d','#e57373','#ba68c8','#4dd0e1','#fff176','#a1887f']},
{name:'深沉',colors:['#1565c0','#2e7d32','#e65100','#b71c1c','#4a148c','#006064','#f57f17','#3e2723']},
{name:'莫兰迪',colors:['#b5838d','#6d6875','#e5989b','#ffb4a2','#ffcdb2','#a3b18a','#58815d','#344e41']},
{name:'单色蓝',colors:['#0d47a1','#1565c0','#1976d2','#1e88e5','#2196f3','#42a5f5','#64b5f6','#90caf9']}
];

let currentScheme=0;
let currentType='bar';
let animFrame=null;

// Build color presets
const presetDiv=document.getElementById('colorPresets');
COLOR_SCHEMES.forEach((s,i)=>{
const swatch=document.createElement('div');
swatch.className='color-swatch'+(i===0?' active':'');
swatch.style.background=`linear-gradient(135deg,${s.colors[0]},${s.colors[1]})`;
swatch.title=s.name;
swatch.onclick=()=>{
presetDiv.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
swatch.classList.add('active');
currentScheme=i;
renderChart();
};
presetDiv.appendChild(swatch);
});

// Chart type tabs
document.getElementById('chartTabs').addEventListener('click',e=>{
const tab=e.target.closest('.chart-tab');
if(!tab)return;
document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');
currentType=tab.dataset.type;
renderChart();
});

function parseData(){
const raw=document.getElementById('dataInput').value.trim();
const lines=raw.split('\n').filter(l=>l.trim());
const data=[];
lines.forEach(line=>{
const parts=line.split(/[,，]/);
if(parts.length>=2){
const label=parts[0].trim();
const value=parseFloat(parts[1].trim());
if(label&&!isNaN(value))data.push({label,value});
}
});
return data;
}

function renderChart(){
const canvas=document.getElementById('chartCanvas');
const ctx=canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
canvas.width=700*dpr;canvas.height=500*dpr;
canvas.style.width='700px';canvas.style.height='500px';
ctx.scale(dpr,dpr);

const data=parseData();
if(!data.length){ctx.clearRect(0,0,700,500);ctx.fillStyle='#999';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('请输入有效数据',350,250);return}

const title=document.getElementById('chartTitle').value;
const colors=COLOR_SCHEMES[currentScheme].colors;
const showValues=document.getElementById('showValues').checked;
const showAnim=document.getElementById('showAnim').checked;

if(animFrame)cancelAnimationFrame(animFrame);

if(showAnim){
let progress=0;
function animStep(){
progress+=0.03;
if(progress>1)progress=1;
drawChart(ctx,data,title,colors,showValues,progress);
if(progress<1)animFrame=requestAnimationFrame(animStep);
}
animStep();
}else{
drawChart(ctx,data,title,colors,showValues,1);
}
}

function drawChart(ctx,data,title,colors,showValues,progress){
ctx.clearRect(0,0,700,500);
switch(currentType){
case'bar':drawBar(ctx,data,title,colors,showValues,progress);break;
case'pie':drawPie(ctx,data,title,colors,showValues,progress);break;
case'line':drawLine(ctx,data,title,colors,showValues,progress);break;
case'donut':drawDonut(ctx,data,title,colors,showValues,progress);break;
}
}

function drawBar(ctx,data,title,colors,showValues,progress){
const W=700,H=500;
const pad={top:60,right:40,bottom:80,left:60};
const cw=W-pad.left-pad.right;
const ch=H-pad.top-pad.bottom;
const maxVal=Math.max(...data.map(d=>d.value))*1.15;
const barW=Math.min(60,cw/data.length*0.6);
const gap=(cw-barW*data.length)/(data.length+1);

// Title
ctx.fillStyle='#333';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(title,W/2,35);

// Y-axis
ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;
const steps=5;
for(let i=0;i<=steps;i++){
const y=pad.top+ch-ch*(i/steps);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText(Math.round(maxVal*i/steps),pad.left-8,y+4);
}

// X-axis line
ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(W-pad.right,pad.top+ch);ctx.stroke();

// Bars
data.forEach((d,i)=>{
const x=pad.left+gap*(i+1)+barW*i;
const fullH=ch*(d.value/maxVal);
const h=fullH*progress;
const color=colors[i%colors.length];

ctx.fillStyle=color;
// Rounded top
const r=4;
const y=pad.top+ch-h;
ctx.beginPath();
ctx.moveTo(x,pad.top+ch);
ctx.lineTo(x,y+r);
ctx.quadraticCurveTo(x,y,x+r,y);
ctx.lineTo(x+barW-r,y);
ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);
ctx.lineTo(x+barW,pad.top+ch);
ctx.closePath();
ctx.fill();

// Value label
if(showValues&&progress>0.9){
ctx.fillStyle='#333';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
ctx.fillText(d.value,x+barW/2,y-6);
}

// X label
ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText(d.label,x+barW/2,pad.top+ch+20);
});

// Legend
drawLegend(ctx,data,colors,H-25);
}

function drawPie(ctx,data,title,colors,showValues,progress){
const W=700,H=500;
const cx=W/2,cy=H/2+10;
const r=Math.min(W,H)*0.3;
const total=data.reduce((s,d)=>s+d.value,0);

ctx.fillStyle='#333';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(title,W/2,35);

let startAngle=-Math.PI/2;
data.forEach((d,i)=>{
const sliceAngle=2*Math.PI*(d.value/total)*progress;
const color=colors[i%colors.length];
ctx.beginPath();ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,startAngle,startAngle+sliceAngle);
ctx.closePath();
ctx.fillStyle=color;ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

// Label
if(progress>0.9){
const midAngle=startAngle+sliceAngle/2;
const lx=cx+r*0.65*Math.cos(midAngle);
const ly=cy+r*0.65*Math.sin(midAngle);
ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
ctx.fillText(d.label,lx,ly-2);
if(showValues){
ctx.font='11px sans-serif';
ctx.fillText((d.value/total*100).toFixed(1)+'%',lx,ly+14);
}
}
startAngle+=sliceAngle;
});

drawLegend(ctx,data,colors,H-25);
}

function drawLine(ctx,data,title,colors,showValues,progress){
const W=700,H=500;
const pad={top:60,right:40,bottom:80,left:60};
const cw=W-pad.left-pad.right;
const ch=H-pad.top-pad.bottom;
const maxVal=Math.max(...data.map(d=>d.value))*1.15;

ctx.fillStyle='#333';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(title,W/2,35);

// Grid
ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;
const steps=5;
for(let i=0;i<=steps;i++){
const y=pad.top+ch-ch*(i/steps);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText(Math.round(maxVal*i/steps),pad.left-8,y+4);
}

// X-axis
ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(W-pad.right,pad.top+ch);ctx.stroke();

// Points and lines
const points=data.map((d,i)=>{
const x=pad.left+cw*(i/(data.length-1||1));
const y=pad.top+ch-ch*(d.value/maxVal)*progress;
return{x,y};
});

// Area fill
if(points.length>1){
ctx.beginPath();ctx.moveTo(points[0].x,pad.top+ch);
points.forEach(p=>ctx.lineTo(p.x,p.y));
ctx.lineTo(points[points.length-1].x,pad.top+ch);
ctx.closePath();
const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
grad.addColorStop(0,colors[0]+'40');
grad.addColorStop(1,colors[0]+'05');
ctx.fillStyle=grad;ctx.fill();
}

// Line
if(points.length>1){
ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);
for(let i=1;i<points.length;i++){
ctx.lineTo(points[i].x,points[i].y);
}
ctx.strokeStyle=colors[0];ctx.lineWidth=3;ctx.lineJoin='round';ctx.stroke();
}

// Points
points.forEach((p,i)=>{
ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
ctx.fillStyle='#fff';ctx.fill();
ctx.strokeStyle=colors[0];ctx.lineWidth=3;ctx.stroke();

if(showValues&&progress>0.9){
ctx.fillStyle='#333';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
ctx.fillText(data[i].value,p.x,p.y-14);
}
ctx.fillStyle='#555';ctx.font='12px sans-serif';
ctx.fillText(data[i].label,p.x,pad.top+ch+20);
});
}

function drawDonut(ctx,data,title,colors,showValues,progress){
const W=700,H=500;
const cx=W/2,cy=H/2+10;
const outerR=Math.min(W,H)*0.3;
const innerR=outerR*0.55;
const total=data.reduce((s,d)=>s+d.value,0);

ctx.fillStyle='#333';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(title,W/2,35);

let startAngle=-Math.PI/2;
data.forEach((d,i)=>{
const sliceAngle=2*Math.PI*(d.value/total)*progress;
const color=colors[i%colors.length];
ctx.beginPath();ctx.arc(cx,cy,outerR,startAngle,startAngle+sliceAngle);
ctx.arc(cx,cy,innerR,startAngle+sliceAngle,startAngle,true);
ctx.closePath();
ctx.fillStyle=color;ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

if(progress>0.9){
const midAngle=startAngle+sliceAngle/2;
const lx=cx*(1-0)+((outerR+innerR)/2)*Math.cos(midAngle);
const ly=cy+((outerR+innerR)/2)*Math.sin(midAngle);
ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
if(showValues){
ctx.fillText((d.value/total*100).toFixed(1)+'%',lx,ly+4);
}
}
startAngle+=sliceAngle;
});

// Center text
ctx.fillStyle='#333';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
ctx.fillText('总计',cx,cy-6);
ctx.font='bold 20px sans-serif';
ctx.fillText(total.toLocaleString(),cx,cy+18);

drawLegend(ctx,data,colors,H-25);
}

function drawLegend(ctx,data,colors,y){
const totalW=data.length*100;
let x=(700-totalW)/2;
data.forEach((d,i)=>{
ctx.fillStyle=colors[i%colors.length];
ctx.fillRect(x,y-8,12,12);
ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='left';
ctx.fillText(d.label,x+16,y+2);
x+=100;
});
}

function downloadPNG(){
const canvas=document.getElementById('chartCanvas');
const link=document.createElement('a');
link.download=(document.getElementById('chartTitle').value||'chart')+'.png';
link.href=canvas.toDataURL('image/png');
link.click();
}

function loadExample(type){
const input=document.getElementById('dataInput');
const title=document.getElementById('chartTitle');
if(type==='sales'){
title.value='2024年月度销售数据';
input.value='一月,1200\n二月,980\n三月,1350\n四月,1580\n五月,1420\n六月,1800\n七月,2100\n八月,1950\n九月,1700\n十月,1600\n十一月,2200\n十二月,2800';
}else{
title.value='世界各国人口（百万）';
input.value='中国,1412\n印度,1408\n美国,332\n印尼,274\n巴基斯坦,221\n巴西,214\n尼日利亚,211\n孟加拉,167';
}
renderChart();
}

// Initial render
renderChart();
</script>
